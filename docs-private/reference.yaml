# ============================================================
# 34. ROADMAP
# ============================================================
# Aligné sur la doctrine du pivot 2026-05-20 (cf. §3 + §5 + §7 + §20 +
# §21 + §22 + §26 + §28 + §29 + §31 + §32 + §33 + docs-doctrine).
# §34 transforme la roadmap en MATRICE D'HYPOTHÈSES, PAS engagements
# produit. Aucune date, phase ou priorité n'est un engagement
# contractuel. §34 N'EST PAS un script commercial public, ni une
# rétro-justification de l'état actuel (§31 est l'état observable).
# Items à pricing / API / webhooks / sécurité / export / conformité /
# billing / métriques portent blocked_until_audit vers §21+§22+§29+
# §32+§33.
# Bannis dans §34 : "Audit trail compliance (IR-PME, EIS)", "Big4",
# "dealbreaker", "compliance-ready / compliance-grade / compliance
# export / regulatory-ready", "automatisée" suggérant remplacement,
# claims chiffrés "10x" non sourcés, "Lancement" sans qualification
# §26, claims de complétude.
roadmap:
  positioning_rule: >
    §34 documente des HYPOTHÈSES roadmap, PAS des engagements produit.
    Aucune date, phase ou priorité n'est un engagement contractuel.
    §34 N'EST PAS un script commercial public, ni une
    rétro-justification de l'état actuel (§31 est l'état observable).
    Items à pricing / API / webhooks / sécurité / export / conformité
    / billing / métriques portent `blocked_until_audit` vers les
    matrices §21 + §22 + §29 + §32 + §33.
  not_a_commitment: true
  not_for_public_copy: true

  roadmap_items_to_audit:
    all_items_require_code_or_doctrine_evidence_before_public_use: true
    note: >
      Chaque item est un objet structuré : public_label (formulation
      doctrine-alignée) / internal_or_legacy_name (label in-app si
      pertinent) / status / evidence_required / cross_reference. Les
      termes bannis (Big4, dealbreaker, IR-PME, EIS, compliance-ready)
      vivent uniquement dans retired_wording / banned_or_retired /
      banned_roadmap_claims.

    existing_to_verify:
      note: >
        Items déjà observables côté code. Chaque item porte un statut
        explicite (runtime_to_verify / doctrinal_claim_only /
        unknown_until_code_audit) ET un evidence_required. Le mot
        *"completed"* du v0 est retiré — observable ≠ complet ;
        20 items ≠ catalogue validé.
      items:
        - public_label: "Architecture en 4 couches"
          internal_name: "44 agents / composants selon convention §7 (3 + 13 + 22 + 6 ; thesis-reconciler conditionnel hors total)"
          status: doctrinal_claim_only
          evidence_required: "Audit agent par agent vs convention §7"
          cross_reference: "§31 product_claims_to_audit.doctrinal_claim_only"
          retired_wording: "*44 agents avec orchestration complète* — claim de complétude banni."

