# ============================================================
# 29. UNIT ECONOMICS DÉTAILLÉS
# ============================================================
# Aligné sur la doctrine du pivot 2026-05-20 (couple §21 + §22 + §29).
# §29 transforme la section en MATRICE D'AUDIT pour les hypothèses
# d'unit economics (coûts LLM, coûts par analyse, infrastructure,
# break-even). §29 N'EST PAS un document de copy publique.
unit_economics:
  positioning_rule: >
    §29 documente les hypothèses INTERNES d'unit economics. §29 N'EST
    PAS un document de copy commerciale. Aucun claim chiffré §29
    n'est autorisé en surface publique sans : (a) audit runtime sur
    cohorte représentative ; (b) snapshot daté des tarifs LLM
    providers (les tarifs changent) ; (c) cohérence avec §28
    banned_in_gtm + §21 tax_vat_currency_policy_to_audit (FX EUR/USD).

  cost_per_llm_call_to_audit:
    note: >
      Tarifs providers LLM HISTORIQUES, à snapshoter régulièrement.
      Les tarifs changent — toute mention publique doit citer la
      date du snapshot.
    snapshot_required_per_provider: "Capture datée des pricing pages publiques par provider, versionnée."
    items:
      haiku_4_5: {input_estimate: "$1/M tokens", output_estimate: "$5/M tokens", typical_call_estimate: "~$0.05-0.10", snapshot_date_to_verify: "À documenter"}
      sonnet_3_5: {input_estimate: "$3/M tokens", output_estimate: "$15/M tokens", typical_call_estimate: "~$0.10-0.30", snapshot_date_to_verify: "À documenter"}
      opus: {input_estimate: "$15/M tokens", output_estimate: "$75/M tokens", typical_call_estimate: "~$1-3", snapshot_date_to_verify: "À documenter"}
      gpt4o: {input_estimate: "$5/M tokens", output_estimate: "$15/M tokens", typical_call_estimate: "~$0.15-0.40", snapshot_date_to_verify: "À documenter"}
    audit_required:
      - "Capturer les pricing pages OpenRouter + Anthropic + OpenAI + Google datées."
      - "Documenter le tarif effectif réellement payé (OpenRouter prend une marge ; tarif final ≠ tarif publié provider)."

  cost_per_analysis_to_audit:
    note: >
      Estimations historiques de coût par action. À AUDITER vs
      consommation runtime réelle (logs LLM, factures OpenRouter).
    quick_scan_tier1:
      agents_estimate: "13 agents × ~8K tokens in + ~3.5K out each"
      total_tokens_estimate: "~160K in / ~45K out"
      llm_cost_estimate: "~$0.80-1.00"
      context_engine_estimate: "~$0.10"
      infra_estimate: "~$0.05"
      total_estimate: "~$0.80-1.00"
      audit_required: "Mesurer la consommation tokens runtime sur 30 jours et comparer (cf. §32 llm_logging_policy)."
    deep_dive_full:
      agents_estimate: "~20 agents (Tier 1+2+3)"
      llm_cost_estimate: "~$1.50-2.00"
      context_engine_estimate: "~$0.20"
      infra_estimate: "~$0.10"
      total_estimate: "~$2.00-2.50"
      audit_required: "Idem."
    ai_board:
      models_estimate: "4 modèles × 3 rounds"
      llm_cost_estimate: "~$8-15"
      total_estimate: "~$10-14"
      audit_required: "Idem. Variance importante selon les modèles routés (Opus vs Sonnet vs Haiku)."
    live_coaching_30min:
      transcription_estimate: "Deepgram ~$0.13"
      visual_processing_estimate: "Gemini/Haiku ~$1-3"
      coaching_llm_estimate: "~$2-5"
      total_estimate: "~$3-8 (moyenne ~$5-7)"
      audit_required: "Mesurer sur cohorte de sessions Live réelles."

  infrastructure_monthly_to_audit:
    note: >
      Coûts mensuels infrastructure estimés. À auditer vs factures
      réelles par environnement (dev / staging / prod).
    items:
      neon_estimate: "~$50-100 (PostgreSQL)"
      vercel_estimate: "~$50-100 (hosting + blob)"
      redis_estimate: "~$30-50 (rate limiting, caching)"
      ably_estimate: "~$30-50 (WebSocket Live Coaching)"
      clerk_estimate: "~$25-50 (auth)"
      sentry_estimate: "~$25-50 (monitoring)"
      total_estimate: "~$200-400/mois"
    audit_required:
      - "Factures réelles par provider, par mois, par environnement."
      - "Scaling vs volume utilisateurs : à quel volume les estimations actuelles cessent d'être valides ?"

  break_even_model:
    note: >
      Modèle de break-even SIMPLIFIÉ. Hypothèses internes, à ne pas
      reprendre en surface publique.
    not_for_public_copy: true
    simplified_assumptions:
      margins_assumed: "70-85% (cf. §21 margins_to_audit — à auditer)"
      example_model: >
        Si 10 clients Pro (179€/mois × 10 = 1,790€), les revenus
        couvrent l'infrastructure (~400€) + LLM costs (~400€ à
        pleine utilisation). Modèle simplifié — ne prend pas en
        compte CAC, support, dev, taxes, FX EUR/USD, etc.
    audit_required:
      - "Modèle de coût complet (CAC, support, dev, taxes, FX) avant tout claim de break-even."
      - "Cohorte minimale requise avant toute publication."

  banned_in_public_copy:
    note: >
      Phrases / chiffres bannis pour toute copy publique dérivée de §29.
    items:
      - "*Marges 70-85%* en accroche publique (claim financier non sourcé par cohorte runtime)."
      - "*Break-even rapide* (vague + prescriptif)."
      - "*10 clients Pro couvrent l'infra* (modèle simplifié non documenté ; à reprendre seulement si modèle complet validé)."
      - "Tarifs LLM cités sans snapshot daté (les tarifs changent ; obligation de citer la date)."
      - "Tout claim de coût par action présenté comme runtime garanti (les chiffres sont des estimations historiques à auditer)."

  cross_section_alignment:
    upstream_sources:
      - "§21 pricing + runtime_pricing_source_of_truth + tax_vat_currency_policy_to_audit (FX EUR/USD)"
      - "§22 add-ons (couple cohérent §21 + §22 + §29)"
      - "§28 pricing_section_alignment_status + banned_in_gtm"
      - "§32 code_audit_required + llm_logging_policy (audits LLM cost + infrastructure)"
      - "§20 claims_policy (chiffres non sourcés bannis)"
    code_audit_required:
      - "Logs LLM (cf. §32 llm_logging_policy) pour mesurer la consommation tokens runtime par action."
      - "Factures OpenRouter mensuelles vs estimations cost_per_analysis."
      - "Factures infrastructure (Neon / Vercel / Redis / Ably / Clerk / Sentry) vs estimations."
      - "Règle FX EUR/USD datée (cf. §21 tax_vat_currency_policy_to_audit.fx_eur_usd_rule_for_section_29)."

  doctrine_references:
    used_by:
      - "§21 margins_to_audit (couple §21 + §29)"
      - "§22 add-ons paid (couple §21 + §22 + §29)"
      - "§28 measurement_plan.metrics.cac_per_segment (alimente le calcul CAC)"
      - "Pitch deck financials INTERNE (PAS surface publique sans audit)"
    cross_section_updates_applied:
      - "§28 pricing_section_alignment_status passé en aligné (couple §21 + §22 + §29)."


# ============================================================
# 30. OBJECTIONS & RÉPONSES
# ============================================================
# Aligné sur la doctrine du pivot 2026-05-20 (cf. §3 + §5 + §20 + §21 +
# §22 + §26 + §28 + §29 + §32 + docs-doctrine).
# §30 documente une MATRICE DE TALKING POINTS INTERNES. §30 N'EST PAS
# un script de vente prêt à l'emploi. Chaque réponse doit passer les
# audits §21+§22+§29+§26+§32 avant exposition publique.
# Bannis dans §30 : ROI obscène, "4 ans d'abonnement", "DD de qualité
# institutionnelle", nombres bruts (44 agents / 22 experts / 60+
# fichiers / 5000+ deals / <8 secondes) en accroche, noms internes
# Board AI / Live Coaching, claims absolus, métaphores prescriptives,
# caricature concurrentielle.
objections:
  positioning_rule: >
    §30 = matrice de talking points internes pour traiter les
    objections fréquentes. §30 N'EST PAS un script de vente validé.
    Chaque réponse doit être : (a) reformulée selon §26
    banned_phrasings_table + §28 banned_in_gtm + §21/§22/§29
    banned_pricing_claims + §32 regulatory_alignment_claims_policy ;
    (b) auditée avant exposition publique ; (c) jamais réutilisée
    verbatim en marketing public sans passer par §26.
  not_for_public_copy: true

  objections_audit:
    note: >
      Matrice de 7 objections. Chaque doctrine_aligned_answer_draft
      est un BROUILLON interne à finaliser avant tout usage commercial.
      `not_for_public_copy: true` au niveau section ET au niveau de
      chaque draft.
    items:
      - legacy_question: "T'es solo founder, c'est un risque"
        public_question_reframe: "Quelle est la robustesse opérationnelle d'un produit développé en solo ?"
        v0_answer_banned: >
          *Lean by design + AI-augmented development. L'outil est
          construit par quelqu'un qui comprend le problème de
          l'intérieur. Un solo founder qui produit comme une équipe
          de 5.*
        banned_claims_in_v0:
          - "*comme une équipe de 5* : comparaison non sourcée."
          - "*comprend le problème de l'intérieur* : claim émotionnel non vérifiable."
          - "Anglicismes en surface publique (*lean by design*, *AI-augmented development*)."
        doctrine_aligned_answer_draft: >
          Le risque solo founder est réel. La réponse n'est PAS *"je
          produis comme 5"*, c'est : architecture documentée, doctrine
          versionnée (cf. docs-doctrine), audit code traçable (cf.
          §21 + §22 + §29 + §32 matrices d'audit). En cas de
          défaillance opérationnelle, ces matrices FACILITENT l'audit
          par un repreneur ou un partenaire. La pérennité passe par la
          traçabilité, pas par une affirmation de productivité ni une
          garantie de continuité opérationnelle.
        draft_status: "brouillon — non validé pour usage public"
        not_for_public_copy: true

      - legacy_question: "Pourquoi PitchBook/Carta ne rajouterait pas cette feature ?"
        public_question_reframe: "Pourquoi les acteurs data établis ne couvriraient-ils pas le workflow analytique d'investisseur privé ?"
        v0_answer_banned: >
          *L'orchestration IA multi-modèle est une architecture core,
          pas un plugin. C'est comme demander pourquoi Excel ne devient
          pas Figma. Leur DNA c'est la data, pas l'intelligence.*
        banned_claims_in_v0:
          - "*Excel ne devient pas Figma* : caricature concurrentielle bannie §20 banned_framings."
          - "*Leur DNA c'est la data, pas l'intelligence* : claim disqualifiant non sourcé."
        doctrine_aligned_answer_draft: >
          Les acteurs data établis (cf. §20 sober_comparisons :
          PitchBook, Crunchbase, etc.) sont orientés data / sourcing
          institutionnel, pas workflow analytique d'investisseur privé.
          La couche d'orchestration multi-couches (extraction →
          analyses transverses → lentilles sectorielles → synthèse
          et challenge) est l'objet construit ici, pas une
          fonctionnalité ajoutable. Possible qu'ils l'ajoutent — la
          barrière n'est pas technologique, c'est la cohérence
          inter-couches.
        draft_status: "brouillon — non validé pour usage public"
        not_for_public_copy: true

      - legacy_question: "Et si OpenAI construit ça ?"
        public_question_reframe: "Quelle est la défensibilité face à une intégration verticale par un grand fournisseur de modèles ?"
        v0_answer_banned: >
          *On est la couche application, pas la couche modèle. De
          meilleurs modèles nous rendent meilleurs. On est
          model-agnostic via OpenRouter. OpenAI construit des
          fondations, on construit le bâtiment.*
        banned_claims_in_v0:
          - "*OpenAI construit des fondations, on construit le bâtiment* : métaphore prescriptive non sourcée."
          - "*De meilleurs modèles nous rendent meilleurs* : claim absolu sans nuance (cf. §11 confrontation_mechanisms.limits)."
        doctrine_aligned_answer_draft: >
          Angel Desk est positionné en couche workflow / orchestration
          analytique, pas en couche modèle. Le produit est positionné
          comme routage multi-provider via OpenRouter, sous réserve
          des appels directs hors router listés en §32
          llm_data_policies.openrouter_layer.direct_callers_bypassing_router.
          L'amélioration des modèles upstream améliore certaines
          briques mais ne remplace pas la discipline d'orchestration,
          le sourcing exigé sur les affirmations factuelles critiques,
          le recoupement documentaire quand disponible, ni les
          garde-fous evidence-first.
        draft_status: "brouillon — non validé pour usage public"
        not_for_public_copy: true

      - legacy_question: "Et si l'IA se trompe ?"
        public_question_reframe: "Comment le système gère-t-il les erreurs d'un modèle ?"
        canonical_answer_source: "§20 ai_error_response.public_answer (reprendre verbatim depuis cette source)"
        doctrine_aligned_answer_summary: >
          L'erreur d'un modèle n'est pas niée. Le système vise à
          rendre les incertitudes, désaccords et absences de source
          visibles. Aucune garantie de détection systématique. La
          décision finale reste à l'investisseur.
        summary_not_canonical: true
        not_for_public_copy: true
        rule: "Toute reformulation publique de cette objection doit reprendre §20 ai_error_response.public_answer VERBATIM (pas le résumé ci-dessus)."
        v0_answer_banned: >
          *C'est exactement pour ça qu'on a construit la délibération
          multi-modèle, la cross-validation, le sourcing obligatoire
          et les scores de confiance. On n'élimine pas l'erreur IA —
          on la rend visible et traçable.*
        banned_claims_in_v0:
          - "*scores de confiance* comme axe (banni §8 + §11 + §19 — Confiance jamais axe public)."

      - legacy_question: "C'est trop beau, ça doit être du bullshit IA"
        public_question_reframe: "Comment l'outil expose-t-il ses limites et ses incertitudes ?"
        v0_answer_banned: >
          *Honnêteté absolue. On ne ment jamais sur les features. On
          montre tout : les sources, les scores, les calculs, les
          limites. L'outil s'auto-audite. Chaque affirmation est
          classée par niveau de certitude.*
        banned_claims_in_v0:
          - "*Honnêteté absolue* : claim absolu non auditable."
          - "*On ne ment jamais* : claim absolu."
          - "*L'outil s'auto-audite* : claim non sourcé (cf. §19 doctrinal_limits)."
          - "*Chaque affirmation est classée par niveau de certitude* : faux — la classification porte sur les affirmations factuelles critiques, pas *chaque* affirmation."
        doctrine_aligned_answer_draft: >
          L'outil expose ses limites : sources citées, contradictions
          détectées, zones d'incertitude, fraîcheur tracée (cf. §20
          auditability_positioning.public_value). Les affirmations
          factuelles critiques sont classées par fiabilité (6 niveaux
          AUDITED → UNVERIFIABLE — cf. §6). La promesse ne porte pas
          sur 100% des affirmations ni sur une garantie de vérité ;
          elle porte sur un processus de décision plus robuste et
          plus traçable.
        draft_status: "brouillon — non validé pour usage public"
        not_for_public_copy: true

      - legacy_question: "Un concurrent peut répliquer ça facilement"
        public_question_reframe: "Quelle est la friction réelle de réplication par un concurrent ?"
        v0_answer_banned: >
          *44 prompts experts de 200+ lignes chacun, 5 directives
          anti-hallucination dans 60+ fichiers, 22 experts sectoriels,
          un Board AI avec orchestration multi-modèle, du live
          coaching en <8 secondes, une DB de 5,000+ deals enrichis.
          C'est faisable, mais c'est 2 ans de travail et il faut la
          flemme de le faire.*
        banned_claims_in_v0:
          - "*44 prompts experts de 200+ lignes* : nombres bruts en accroche (banni §26)."
          - "*5 directives anti-hallucination dans 60+ fichiers* : claim couverture non audité (cf. §19 coverage_audit + §26 quantified_claims_policy)."
          - "*22 experts sectoriels* sans qualification 21 spécialisées + general-expert fallback (banni §7 reframes)."
          - "*Board AI* : nom interne banni en marketing public (§26 internal_terms_banned_in_public)."
          - "*live coaching en <8 secondes* : claim temps non sourcé banni §26 banned_phrasings_table."
          - "*DB de 5,000+ deals enrichis* : claim sans *cible / en construction* (banni §26 quantified_claims_policy)."
          - "*il faut la flemme de le faire* : vestige §20 non_moats_and_risks."
        doctrine_aligned_answer_draft: >
          La barrière n'est pas une feature isolée. C'est la cohérence
          inter-couches (extraction → analyses transverses → lentilles
          sectorielles → synthèse et challenge), la discipline
          evidence-first (sourcing critique, fiabilité, contradictions
          détectées, fraîcheur), et l'orchestration multi-modèle.
          Toute brique est réplicable ; l'assemblage cohérent ET
          soutenu dans le temps est plus difficile à reproduire (cf.
          §20 durable_differentiators — replication_friction).
        draft_status: "brouillon — non validé pour usage public"
        not_for_public_copy: true

      - legacy_question: "Les BAs ne paieront jamais pour ça"
        public_question_reframe: "Quelle valeur économique défendable pour un investisseur privé, sans claim ROI non audité ?"
        v0_answer_banned: >
          *Un BA qui évite un mauvais deal à 25K€ a rentabilisé 4 ans
          d'abonnement. À 49€ le pack Starter, c'est le prix d'un
          dîner pour une DD de qualité institutionnelle.*
        banned_claims_in_v0:
          - "*Un BA qui évite un mauvais deal à 25K€ a rentabilisé 4 ans d'abonnement* : claim ROI obscène + chiffres non sourcés (banni §20 + §26 + §28 banned_in_gtm)."
          - "*49€ pack Starter* : claim pricing à auditer (cf. §21 packs.runtime_packs)."
          - "*DD de qualité institutionnelle* : claim oraculaire (banni §5 + §26)."
        doctrine_aligned_answer_draft: >
          La question pricing n'est pas tranchée par §30. Le centre
          de revenu stratégique = équipes d'investissement légères /
          Pauline (cf. §4 + §27 primary_strategic_persona), pas Marie
          BA solo (qui reste funnel_entry §27). Les bandes pricing
          publiques sont en §4 ; les packs runtime sont en §21
          packs.runtime_packs. Le ROI individuel n'est PAS un argument
          de §30 — il dépend du volume de dossiers et du ticket moyen
          de l'investisseur, à apprécier au cas par cas. Pas de claim
          *X mois rentabilisés* / *prix d'un dîner*.
        draft_status: "brouillon — non validé pour usage public"
        not_for_public_copy: true

  banned_in_objection_answers:
    note: >
      Liste explicite des phrases interdites dans toute réponse §30,
      pour éviter régression future.
    items:
      - "*Un BA qui évite un mauvais deal à 25K€ a rentabilisé 4 ans d'abonnement* (ROI obscène, banni)."
      - "*DD de qualité institutionnelle* (claim oraculaire, banni)."
      - "*Honnêteté absolue* / *On ne ment jamais* (claims absolus)."
      - "*L'outil s'auto-audite* (claim non sourcé)."
      - "*Chaque affirmation classée par niveau de certitude* (vs §3 'affirmations factuelles critiques')."
      - "*Excel/Figma DNA* (caricature concurrentielle, bannie §20)."
      - "*Comme une équipe de 5* (comparaison non sourcée)."
      - "*44 prompts*, *60+ fichiers*, *22 experts*, *5,000+ deals*, *<8 secondes* en accroche (nombres bruts non qualifiés, bannis §26)."
      - "*Board AI* / *Live Coaching* en marketing public (noms internes bannis §26)."
      - "*Il faut la flemme de le faire* (la flemme n'est pas un moat — banni §20 non_moats)."
      - "*Scores de confiance* comme axe (banni §8 + §11 + §19)."

  cross_section_alignment:
    upstream_sources:
