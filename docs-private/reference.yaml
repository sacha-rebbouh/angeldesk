          evidence_required: "Cible interne non publiable tant que scope + méthodologie + statut ne sont pas documentés. Cf. §4 + §8."
          retired_wording: "*Enrichissement Funding Database vers la cible 5,000+ deals* — formulation engagement de volume retirée."

        - public_label: "Intelligence cross-deal (comparaison entre dossiers en pipeline pour un même investisseur)"
          status: planned_hypothesis
          evidence_required: "Aucun engagement de date. Cohérence §20 living_dossier."

        - public_label: "Modèle financier interne (projections, P&L, unit economics)"
          status: planned_hypothesis
          evidence_required: "Document INTERNE. Cf. §29 unit_economics matrice d'audit."

    blocked_until_audit:
      note: >
        Items dont l'exposition publique ou la mise en production
        dépend de l'achèvement d'audits. Aucune communication publique
        avant levée des blocages.
      items:
        - title: "Pricing page mise à jour (système de crédits)"
          blocked_until_audit: ["§21", "§22", "§29", "§33"]
          rationale: "Audit price_unit_policy_to_audit + credit_pack_dual_source_to_audit + billing_integration_status requis. §33 pour les métriques d'activation/conversion citées."
          status: blocked_until_audit

        - title: "Pilote beta utilisateurs (waitlist + premiers pilotes)"
          blocked_until_audit: ["§21", "§22", "§26", "§28", "§32", "§33"]
          rationale: "Soumis à §26 availability_language_rule + audit pricing + claims juridiques §32 + matrice refund §21 + §33 pour métriques d'activation/conversion."
          retired_wording: "*Lancement beta* sans qualification — cf. §26 availability_language_rule + §28 banned_in_gtm."
          status: blocked_until_audit

        - title: "Hypothèses go-to-market (angel clubs, LinkedIn, partenariats accélérateurs)"
          blocked_until_audit: ["§22", "§26", "§28", "§33"]
          rationale: "Cohérence §28 acquisition_strategy + §22 add-ons + §26 banned_phrasings_table + §33 pour métriques d'acquisition. Aucun partenariat acquis avant accord signé ET autorisation de communication (cf. §28 organization_naming_rule)."
          status: blocked_until_audit

        - title: "Documents startup (pitch deck, exec summary, business plan)"
          blocked_until_audit: ["§20", "§21", "§22", "§26", "§28", "§29", "§31", "§32", "§33"]
          rationale: "Tous documents publics héritent des banned_in_gtm + claims_policy + matrices d'audit pricing + legal + §33 pour métriques traction/business."
          status: blocked_until_audit

    deferred:
      note: >
        Items reportés ou priorités basses, pas activement développés.
      items:
        - public_label: "Amélioration qualité prompts (Tier 1-3)"
          status: deferred
          rationale: "Chantier continu, pas une milestone."

        - public_label: "Exploration de modèles plus économiques selon les besoins"
          status: deferred
          rationale: "Mesure coût/qualité à documenter avant tout switch ; pas de claim chiffré."
          retired_wording: "*Chat switch vers Haiku (réduction coûts 10x)* — claim chiffré multiplicatif non sourcé retiré."

        - public_label: "Cibles institutionnelles plus larges"
          status: deferred
          rationale: "Acteurs institutionnels de due diligence — hypothèse future, non prioritaire, aucun partenariat acquis. Banni *Big4* comme cible / validation / partenariat."

    banned_or_retired:
      note: >
        Items v0 retirés de la roadmap active. Claims explicitement
        bannis ; conservés ici en mémoire pour éviter régression
        future.
      items:
        - banned_item: "Audit trail compliance (IR-PME, EIS)"
          why_banned: "CONTRAIRE §20 auditability_positioning.not_a_legal_claim + §32 regulatory_alignment_claims_policy. Aucun claim de conformité réglementaire spécifique sans base juridique formelle et avis juridique externe."
          replacement: "Aucun. Si la fonctionnalité d'audit trail est étendue, la décrire en fonctionnalité produit observable (cf. §32 auditability_positioning.public_value), PAS comme conformité à un régime."

        - banned_item: "Big4 (auto-critique itérative / cible / validation / partenariat)"
          why_banned: "*Big4* banni §7 reframes (vocabulaire de cabinet d'audit lié à un positionnement remplacement humain)."
          replacement: "Auto-critique itérative des sorties (sans référence Big4) ; *acteurs institutionnels de due diligence* si nécessaire en deferred."

        - banned_item: "Stratégie de négociation automatisée (leverage, points, dealbreakers, tradeoffs)"
          why_banned: "*automatisée* suggère remplacement humain ; *dealbreakers* banni §26 banned_phrasings_table."
          replacement: "Repères de négociation sourcés (cf. §27 banned_in_this_section + §26)."

        - banned_item: "Réduction coûts 10x"
          why_banned: "Claim chiffré multiplicatif non sourcé (§20 claims_policy + §26 quantified_claims_policy + §28 banned_in_gtm)."
          replacement: "Aucune communication chiffrée multiplicative sans cohorte documentée."

        - banned_item: "Lancement (sans qualification)"
          why_banned: "Vocabulaire de disponibilité commerciale (cf. §26 availability_language_rule)."
          replacement: "*Pilote*, *exposition post-gate*, *ouverture restreinte* selon contexte ; jamais *lancement* brut tant que le gate de release actif n'est pas fermé."

        - banned_item: "Claims compliance / regulatory-ready"
          why_banned: "*compliance-ready*, *compliance-grade*, *compliance export*, *regulatory-ready* — variantes du claim juridique IR-PME/EIS banni §20 + §32, même sans citer un régime spécifique."
          replacement: "Aucun claim de conformité réglementaire sans avis juridique externe (cf. §32 regulatory_alignment_claims_policy.banned_regulatory_claims)."

  banned_roadmap_claims:
    note: >
      Phrases / mots interdits dans toute communication §34 dérivée
      (interne ou publique).
    items:
      - "*Audit trail compliance (IR-PME, EIS)* — CONTRAIRE §20 + §32."
      - "*Conformité IR-PME* / *Conformité EIS* / *audit trail officiel* / *outil de référence pour la conformité*."
      - "*compliance-ready* / *compliance-grade* / *compliance export* / *regulatory-ready* — variantes bannies (claim juridique sans avis externe)."
      - "*Big4* (cible / validation / partenariat / auto-critique)."
      - "*Dealbreaker* / *dealbreakers* — banni §26 banned_phrasings_table."
      - "*Stratégie de négociation automatisée* — banni (suggère remplacement humain)."
      - "*Maintenance automatisée* / *DB agents automatisée* — *automatisée* suggère remplacement humain."
      - "*X x moins cher* / *réduction coûts 10x* / comparaisons multiplicatives — banni §28 banned_in_gtm."
      - "*Lancement* brut sans qualification — banni §26 availability_language_rule."
      - "*MVP fonctionnel complet* / *orchestration complète* — claims de complétude non auditables."
      - "Nombres bruts en accroche : *44 agents*, *22 experts*, *60+ fichiers*, *40+ connecteurs*, *20+ sections* (cf. §26 banned_only_as_hero_or_accroche)."
      - "Noms internes en marketing public : *Board AI*, *Live Coaching*, *Consensus Engine*, *Reflexion Engine* (cf. §26 internal_terms_banned_in_public.public_marketing_surfaces). Live Coaching reste autorisé in-app sous §26 in_app_legacy_feature_names.decision_required."
      - "Models providers hardcodés dans la doctrine (Claude / GPT-4o / Gemini / Grok) — la liste réelle est versionnée séparément, pas dans la roadmap."
      - "*API v1 commercialement disponible* / *API stabilisée* — banni tant que gate Expert+ lifetime + add-on payant Standard non décidés (cf. §22)."
      - "*red flags* en accroche publique non contextualisée — préférer *signaux d'alerte* en wording public (le concept de signaux d'alerte n'est PAS banni, c'est l'anglicisme + verdict automatique qui le sont)."
      - "*Cible 5,000+ deals* sans qualification *en construction / scope / méthodologie* — cf. §4 + §8 + §26 quantified_claims_policy."

  not_committed_until_validated:
    note: >
      Aucun item §34 ne devient un engagement produit / commercial /
      public tant que :
    rules:
      - "(a) il a passé les audits référencés en blocked_until_audit (incl. §33 pour métriques) ;"
      - "(b) il est conforme aux banned_roadmap_claims ;"
      - "(c) la décision de commitment est tracée explicitement (qui, quand, sur quelle base)."

  relationship_to_section_31:
    note: >
      §31 décrit l'état observable au snapshot ; §34 décrit des
      hypothèses futures.
    rule: >
      §34 NE PEUT PAS rétro-justifier §31. Les items
      `existing_to_verify` de §34 renvoient aux statuts §31
      product_claims_to_audit (runtime_surfaces_to_verify /
      partially_implemented / doctrinal_claim_only /
      unknown_until_code_audit), PAS l'inverse.
    cross_reference: "§31 product_claims_to_audit + relationship_to_section_34."

  relationship_to_section_33:
    note: >
      §34 décrit des hypothèses roadmap ; §33 décrit la gouvernance
      KPI désormais alignée. §34 NE REMPLACE PAS §33 ; les milestones
      hypothétiques §34 doivent être mesurées via §33 KPI une fois
      les métriques concernées instrumentées et auditées.
    rule: >
      Tout item §34 touchant aux métriques / activation / traction /
      objectifs / conversion / usage doit porter §33 dans
      blocked_until_audit.
    cross_reference: "§28 kpi_section_alignment_status + §31 relationship_to_section_33."

