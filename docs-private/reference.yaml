# ============================================================
# 5. PROBLÈME
# ============================================================
# Aligné sur la doctrine du pivot 2026-05-20 (cf. § 3 vision + § 4 marché +
# docs-doctrine/angeldesk-strategic-pivot.md).
# ICP cœur stratégique : équipes d'investissement légères.
# Pas de centrage sur le BA solo au feeling (Marie est porte d'entrée
# acquisition, pas centre du problème).
problem:
  headline: >
    Les investisseurs privés doivent décider avec rigueur sur des dossiers
    complexes, dans un environnement documentaire fragmenté.

  who_it_affects:
    - "BA très actifs / chefs de syndicat solos"
    - "Angel clubs / syndicats structurés (5-10 membres)"
    - "Micro-fonds VC (pre-seed / seed)"
    - "Family offices directs"
    - "Petits fonds thématiques / direct investing (non-VC)"
    - "Équipes M&A légères"

  core_problem: >
    Le problème n'est pas un manque d'intelligence des investisseurs ; c'est
    la fragmentation documentaire, le volume de dossiers, et la difficulté à
    maintenir une trace analytique partagée et une qualité d'analyse stable
    sous contrainte de temps.

  not_the_problem:
    - "Les investisseurs ne manquent pas d'intelligence."
    - "Le problème n'est pas qu'une IA doit décider à leur place."
    - "Le problème n'est pas seulement le coût d'une due diligence manuelle."

  pain_points:
    - "Volume de dossiers vs capacité d'analyse : un processus rigoureux exige une capacité d'analyse difficile à maintenir pour une équipe légère."
    - "Documents fragmentés (deck, documents financiers, déclarations des fondateurs, appels) sans couche analytique transverse qui les rassemble."
    - "Outils institutionnels coûteux ou fragmentés : utiles pour la donnée, mais peu adaptés à une trace analytique partagée dossier par dossier."
    - "Environnement analytique rarement unifié — les équipes assemblent souvent leurs outils, perdent en cohérence et en reproductibilité d'un dossier à l'autre."
    - "Usage isolé d'IA générique : provenance, contradictions inter-documents, mémoire pipeline, traçabilité et reproductibilité restent à reconstruire manuellement."
    - "Beaucoup d'outils existants restent centrés sur la donnée, la recherche ou l'extraction — pas sur une trace de raisonnement défendable devant associés, LPs ou co-investisseurs."
    - "Pendant l'appel fondateur, peu ou pas de mise en évidence en temps réel des écarts entre le discours et les documents reçus."
    - "Après l'appel, le mémo défendable, les questions ouvertes et les points de négociation reposent souvent sur des notes dispersées et un travail manuel."

  evidence_failure_modes:
    - "Date de document absente ou mal interprétée"
    - "Déclarations fondateurs contradictoires entre deck, documents financiers et appel"
    - "Hypothèses financières non reliées à une source"
    - "Questions ouvertes perdues entre deux versions du dossier"
    - "Mémo final difficile à auditer"

  what_happens_without_angeldesk: |
    Une équipe d'investissement légère (chef de syndicat, micro-fonds VC,
    family office direct, petit fonds thématique, équipe M&A légère) reçoit
    un dossier. Le deck est lu sous contrainte de temps, les documents
    financiers parcourus, les déclarations des fondateurs traitées au cas
    par cas. Chaque document est analysé séparément ; les contradictions
    entre eux peuvent passer inaperçues. Pas de trace standardisée liant
    les affirmations factuelles critiques à leur source, leur date, leur
    fiabilité. L'IA générique
    est utilisée ponctuellement, mais la provenance, la mémoire et la
    reproductibilité restent à organiser par l'équipe. Le mémo final
    est difficile à défendre — sources éparpillées, raisonnement non
    auditable, fraîcheur des documents non tracée. Au moment de l'appel
    fondateur, l'équipe se repose sur sa propre mémoire pour repérer les
    écarts entre le discours et le dossier.


# ============================================================
# 6. PRODUIT — VUE D'ENSEMBLE
# ============================================================
# Doctrine pivotée 2026-05-20 (cf. § 3 vision + § 4 marché + § 5 problème +
# docs-doctrine/angeldesk-strategic-pivot.md).
# Vue produit comme environnement analytique cohérent.
# Statut livré vs chantier strictement séparé : current_capabilities / in_progress.
# 44 agents = architecture de support sous le capot, jamais en accroche publique.
product:
  summary: >
    Angel Desk est le copilote analytique des investisseurs privés. Il organise
    l'extraction documentaire, l'analyse transverse, l'expertise sectorielle
    et la synthèse sourcée, avec des modules de débat multi-modèle et de
    vérification temps réel selon le parcours d'analyse. La décision finale
    reste à l'investisseur.

  public_messaging_rule: >
    Ne pas présenter les agents, le débat multi-modèle (nom interne : Board AI),
    la vérification temps réel (nom interne : Live Coaching) ou les bibliothèques
    sectorielles comme la promesse principale. La promesse principale reste
    le copilote analytique, les affirmations factuelles critiques sourcées,
    les contradictions détectées et les zones d'incertitude.

  product_discipline: |
    Tout le monde peut interroger une IA générique. Angel Desk applique une
    discipline d'orchestration : provenance exigée pour les affirmations
    factuelles critiques, classification de fiabilité (AUDITED →
    UNVERIFIABLE), 5 directives anti-hallucination déployées dans les
    prompts agents concernés, recoupement documentaire structuré lorsque
    les données le permettent, agrégation de score déterministe sur les
    sous-scores et signaux disponibles (certains sous-scores peuvent
    provenir de sorties LLM ; reproductibilité bout-en-bout à tester,
    cf. § 8 + § 20), et mémoire de dossier et persistance des questions
    ouvertes d'une version à l'autre. La valeur ne vient pas d'un modèle
    unique qui aurait raison ; elle vient de cette discipline cumulative.

  quality_standards:
    layer0: >
      Extraction et qualification structurées des éléments documentaires
      disponibles (deck, documents financiers, déclarations des fondateurs,
      appels).
    layer1: >
      Analyse rigoureuse sur les axes transverses du dossier : équipe, marché,
      concurrence, financier, technologique, juridique, stratégie commerciale,
      sortie.
    layer2: >
      Lentilles sectorielles dédiées (22 bibliothèques) activées contextuellement,
      avec benchmarks datés et schémas sectoriels.
    layer3: >
      Synthèse structurée, mise en regard des contradictions, scénarios
      documentés, mémo défendable. La décision finale reste à l'investisseur.
    current_status: >
      Ces standards décrivent la cible produit. Certaines briques sont livrées
      (couche evidence-first, classification de fiabilité, scoring déterministe
      actuel, 5 directives anti-hallucination, débat multi-modèle, vérification
      temps réel, auto-critique itérative sur certaines sorties). D'autres
      restent en amélioration continue (cohérence qualitative inter-couches,
      scoring 2 axes orientation × solidité des preuves, refonte de la
      hiérarchie d'interface).

  current_capabilities:
    document_evidence_layer:
      description: >
        Couche 0 — extraction et qualification documentaire (nom interne :
        Evidence Engine). Description publique : affirmations factuelles
        critiques sourcées, dates disponibles ou absences de date
        explicitées, fiabilité documentaire, contradictions détectées.
      items:
        - "Extraction structurée des éléments documentaires disponibles (deck, documents financiers, déclarations des fondateurs, appels)."
        - "Classification de fiabilité des données en 6 niveaux (AUDITED, VERIFIED, DECLARED, PROJECTED, ESTIMATED, UNVERIFIABLE)."
        - "Détection temporelle — distinction projections vs actuels, fraîcheur des documents tracée."
        - "Recoupement des affirmations du dossier avec la base de dossiers comparables (Funding Database) lorsque des comparables existent."

    analysis_layer:
      description: "Couche 1 — analyses transverses du dossier."
      items:
        - "13 analyses transverses couvrant notamment : équipe, marché, concurrence, financier, technologique, juridique, stratégie commerciale, sortie."
        - "5 directives anti-hallucination déployées dans les prompts agents concernés (couverture à auditer, cf. § 19 coverage_audit)."
        - "Signaux d'alerte structurés (sévérité, preuve, impact, question à poser)."

    sector_layer:
      description: "Couche 2 — expertise sectorielle."
      items:
        - "22 lentilles sectorielles activées contextuellement, dont 21 spécialisées (chacune avec benchmarks datés et schémas spécifiques) et 1 fallback (general-expert) activé pour les secteurs non couverts."

    synthesis_layer:
      description: "Couche 3 — synthèse et challenge."
      items:
        - "Synthèse multi-couche du dossier."
        - "Mise en regard des contradictions inter-agents par débat structuré et hiérarchie de sources."
        - "Auto-critique itérative sur les sorties concernées — détection des faiblesses argumentaires avant restitution."
        - "Agrégation de score déterministe par formule TypeScript sur les sous-scores et signaux disponibles ; certains sous-scores peuvent provenir de sorties LLM, reproductibilité bout-en-bout à tester (cf. § 8 + § 20)."
        - "Débat multi-modèle (nom interne : Board AI) — modèles indépendants aux profils complémentaires confrontent leurs lectures sur le même dossier. Divergences persistantes = signaux à examiner."
        - "Analyse des conditions et de la term sheet — extraction structurée et simulation de dilution."
        - "Aide à la négociation — arguments chiffrés et sourcés, points de friction identifiés, alternatives proposées."

    workflow_layer:
      description: "Workflow continu — V1 → V2 → V3, accompagnement pendant et après l'appel fondateur."
      items:
        - "Dossier vivant — la trace analytique évolue avec les réponses des fondateurs et le coaching en direct."
        - "Vérification des preuves en temps réel pendant l'appel fondateur (nom interne : Live Coaching) — fait remonter contradictions entre la présentation et les déclarations des fondateurs, benchmarks dépassés, informations nouvelles."
        - "Persistance des questions ouvertes — questions non encore traitées survivent d'une version à l'autre du dossier."
        - "Suivi de la due diligence — suivi de la résolution des signaux d'alerte au fil des versions."
        - "Chat contextuel pour interroger le dossier — réponses sourcées sur les documents et analyses."

    export_api_layer:
      description: "Sorties et intégration."
      items:
        - "Export PDF structuré et sourcé du dossier d'analyse — chemin d'exécution livré ; disponibilité publique soumise au gate de release actif."
        - "API v1 (REST + webhooks)."

  in_progress:
    - "Passage au scoring 2 axes — orientation du signal × solidité des preuves (l'actuel reste un score global mono-axe construit à partir de dimensions pondérées)."
    - "Refonte de la hiérarchie d'interface : score subordonné, dimensions + solidité des preuves + sources + contradictions + questions montées en premier."
    - "Cohérence qualitative inter-couches sur la qualité des prompts et des sorties (purge finale des vestiges oraculaires dans les prompts couche 3)."
    - "Enrichissement de la Funding Database vers la cible 5,000+ (en construction)."

  agents_summary:
    total: 44
    framing: "Architecture de support sous le capot — pas en accroche publique (cf. doctrine — hiérarchie de messaging)."
    counting_note: >
      Le total dépend de la convention de comptage agent vs surface d'orchestration ;
      ne jamais utiliser comme accroche publique. Le débat multi-modèle (Board AI)
      et le chat contextuel sont des surfaces d'orchestration, pas des agents
      ajoutés au total 44.
    total_convention: >
      Total 44 calculé avec les 6 agents autonomes de couche 3 ; full_analysis
      active aussi thesis-reconciler.
    layer0: {count: 3, role: "Extraction et pré-analyse"}
    layer1: {count: 13, role: "Analyses transverses (parallèle)"}
    layer2: {count: 22, role: "Lentilles sectorielles (1 activée selon secteur)"}
    layer3: {count: "6 autonomes / 7 en full_analysis", role: "Synthèse et challenge (séquentiel)"}


# ============================================================
# 7. PRODUIT DÉTAILLÉ — AGENTS
# ============================================================
# Aligné sur la doctrine du pivot 2026-05-20 (cf. § 3 vision + § 4 marché +
# § 5 problème + § 6 produit + docs-doctrine/angeldesk-strategic-pivot.md).
# Registre technique des agents : noms d'agents, clés YAML, schema_keys et
# weights conservés pour alignement code.
# tier0 : séparation entre architecture comptée (3 dans le total 44) et
#   composants runtime de pré-analyse (hors total 44).
# tier1 : execution_phases reflète l'ordre runtime ; agents listés dans le
#   même ordre.
# tier2 : experts dans l'ordre TIER2_EXPERT_NAMES ; analysis_sections avec
#   schema_key aligné sur SectorExpertOutputSchema (11 sections).
# tier3 : séparation standalone_agents (6 dans le total 44) et
#   full_analysis_extra (thesis-reconciler, hors total 44).
# Reformulations sur role / output / analyzes / db_usage pour éliminer les
# vestiges remplacement humain (Big4, Score final, TOUS les résultats,
# professionnel) et le franglais décoratif. Funding Database "lorsque
# disponibles" partout. Métriques métier (NRR, CAC, LTV, GMV, ARR, TVL, etc.)
# conservées comme standards techniques.
agents_detail:
  tier0:
    counting_note: >
      Le total 44 correspond à une convention d'architecture produit historique
      (3 + 13 + 22 + 6). Le runtime full_analysis exécute aussi des composants
      de pré-analyse hors convention 44. Ne pas mélanger total d'architecture
      et étapes runtime.

    counted_architecture_agents:
      - name: document-extractor
        role: "Extraction structurée des documents disponibles (deck, documents financiers, documents de conditions / term sheets)"
        output: "Données structurées : métriques financières, déclarations des fondateurs, données équipe, produit, marché"
        model: Haiku
      - name: red-flag-detector
        role: "Détection précoce de signaux d'alerte"
      - name: deal-scorer
        role: "Scoring initial"

    runtime_preanalysis_components:
      - name: fact-extractor
        role: "Extraction de faits vérifiables avec classification de fiabilité"
        output: "Référentiel de faits : chaque fait classé AUDITED/VERIFIED/DECLARED/PROJECTED/ESTIMATED/UNVERIFIABLE"
        model: Haiku
      - name: deck-coherence-checker
        role: "Évaluation de la cohérence et de la complétude du pitch deck"
        output: "Score de cohérence, sections manquantes, contradictions internes"
        model: Haiku
      - name: thesis-extractor
        layer: "0.5"
        full_analysis_only: true
        role: "Extraction et structuration de la thèse d'investissement initiale"

  tier1:
    # Ordre d'exécution runtime (séquentiel par phase, parallèle au sein d'une phase).
    execution_phases:
      phase_a: ["deck-forensics"]
      phase_b: ["financial-auditor"]
      phase_c: ["team-investigator", "competitive-intel", "market-intelligence"]
      phase_d: ["tech-stack-dd", "tech-ops-dd", "legal-regulatory", "cap-table-auditor", "gtm-analyst", "customer-intel", "exit-strategist", "question-master"]
    # Agents listés dans l'ordre d'exécution (phase A → B → C → D).
    agents:
      - name: deck-forensics
        priority: P1
        role: "Recoupement des affirmations du deck"
        analyzes: "Affirmations sur valorisation, clients, croissance, concurrence — recoupement avec Context Engine et Funding Database lorsque disponibles"
        key_output: "Base factuelle documentée pour les agents suivants"
        db_usage: "Recoupement des affirmations avec les sources disponibles, concurrents non mentionnés dans le dossier [CRITIQUE]"

      - name: financial-auditor
        priority: P1
        role: "Analyse financière structurée"
        analyzes: "Revenus, unit economics, burn rate, valorisation, multiples, projections"
        scoring_criteria:
          - {criterion: "Data Transparency", weight: "25%"}
          - {criterion: "Metrics Health", weight: "25%"}
          - {criterion: "Valuation Rationality", weight: "20%"}
          - {criterion: "Unit Economics Viability", weight: "15%"}
          - {criterion: "Burn Efficiency", weight: "15%"}
        db_usage: "Benchmark valorisation, multiples ARR, recoupement avec comparables lorsque disponibles [CRITIQUE]"

      - name: team-investigator
        priority: P1
        role: "Analyse du parcours de l'équipe fondatrice"
        analyzes: "Expériences, conflits d'intérêt, sorties précédentes, complémentarité, manques"
        db_usage: "Vérification des levées précédentes, parcours lorsque disponibles [HIGH]"

      - name: competitive-intel
        priority: P2
        role: "Cartographie concurrentielle"
        analyzes: "Concurrents directs/indirects, levées, fonctionnalités, menace des grands acteurs technologiques"
        db_usage: "Détection de concurrents, cartographie, menaces lorsque disponibles [CRITIQUE]"

      - name: market-intelligence
        priority: P2
        role: "Analyse du marché et du timing"
        analyzes: "TAM/SAM/SOM, CAGR, tendances, position dans le cycle, dynamiques de levées"
        db_usage: "Tendances de levées, timing marché, down rounds lorsque disponibles [CRITIQUE]"

      - name: tech-stack-dd
        priority: P3
        role: "Revue de l'architecture technique"
        analyzes: "Choix technologiques, scalabilité, dette technique, risque technique"
        db_usage: "Stacks comparables, tailles d'équipe lorsque disponibles [MEDIUM]"

      - name: tech-ops-dd
        priority: P3
        role: "Maturité opérationnelle technique"
        analyzes: "Maturité équipe tech, sécurité, IP, processus, DevOps"
        note: "Issu d'un découpage de l'ancien technical-dd pour optimiser coûts et délais d'exécution."

      - name: legal-regulatory
        priority: P3
        role: "Risques juridiques et réglementaires"
        analyzes: "Licences, conformité, risque réglementaire, contrats"
        db_usage: "Précédents lorsque disponibles [LOW]"

      - name: cap-table-auditor
        priority: P3
        role: "Analyse de la table de capitalisation / cap table"
        analyzes: "Dilution, pacte d'actionnaires, vesting, anti-dilution, actions de préférence"
        db_usage: "Comparaison dilution vs comparables lorsque disponibles [HIGH]"

      - name: gtm-analyst
        priority: P3
        role: "Analyse de la stratégie commerciale"
        analyzes: "Canaux d'acquisition, cycle de vente, scalabilité commerciale"
        db_usage: "Canaux d'acquisition des comparables lorsque disponibles [MEDIUM]"

      - name: customer-intel
        priority: P3
        role: "Analyse client"
        analyzes: "Profil client, rétention, NRR, churn, satisfaction"
        db_usage: "Taille clients, segments lorsque disponibles [MEDIUM]"

      - name: exit-strategist
        priority: P2
        role: "Analyse des scénarios de sortie et comparables"
        analyzes: "Sorties comparables, multiples, acquéreurs potentiels, calendrier"
        db_usage: "Sorties sectorielles, multiples de sortie, acquéreurs lorsque disponibles [HIGH]"

      - name: question-master
        priority: P3
        role: "Consolidation et priorisation des questions à poser au fondateur"
        analyzes: "Questions des 12 autres agents → questions prioritaires classées"
        output: "Questions consolidées, dédupliquées, scorées, avec contexte et critères d'évaluation"

  tier2:
    base_class: base-sector-expert
    description: "Chaque lentille sectorielle applique des repères sectoriels spécifiques et évalue le dossier contre les repères de son industrie."
    # 11 sections alignées avec le schema Zod de base-sector-expert.ts (SectorExpertOutputSchema).
    # schema_key conservé tel quel pour référence code ; label_fr pour documentation / rédaction interne.
    analysis_sections:
      - {schema_key: sectorFit, label_fr: "Adéquation au secteur"}
      - {schema_key: metricsAnalysis, label_fr: "Métriques clés vs benchmarks sectoriels"}
      - {schema_key: sectorRedFlags, label_fr: "Signaux d'alerte spécifiques au secteur"}
      - {schema_key: sectorOpportunities, label_fr: "Opportunités sectorielles"}
      - {schema_key: competitorBenchmark, label_fr: "Recoupement concurrents avec Funding Database lorsque disponible"}
      - {schema_key: sectorDynamics, label_fr: "Dynamiques sectorielles (concurrence, consolidation, sorties)"}
      - {schema_key: unitEconomics, label_fr: "Unit economics (ratios spécifiques au secteur)"}
      - {schema_key: mustAskQuestions, label_fr: "Questions critiques sectorielles"}
      - {schema_key: negotiationAmmo, label_fr: "Arguments de négociation sourcés"}
      - {schema_key: executiveSummary, label_fr: "Synthèse exécutive"}
      - {schema_key: dbCrossReference, label_fr: "Recoupement Funding Database (lorsque disponible)"}

    # Ordre aligné sur TIER2_EXPERT_NAMES (référence code).
    experts:
      - {name: saas-expert, focus: "NRR, CAC payback, magic number, rule of 40, churn"}
      - {name: legaltech-expert, focus: "Barrières réglementaires, adoption par les avocats, conformité"}
      - {name: hrtech-expert, focus: "PME vs grand compte, intégration, conformité"}
      - {name: marketplace-expert, focus: "Take rates, GMV, liquidité, équilibre acheteurs/vendeurs"}
      - {name: fintech-expert, focus: "Multiples fintech, conformité réglementaire, take rate"}
      - {name: healthtech-expert, focus: "Calendriers FDA/CE, essais cliniques, risque réglementaire"}
      - {name: biotech-expert, focus: "Étapes pipeline, parcours FDA, paysage IP, burn"}
      - {name: ai-expert, focus: "Moat données, risque modèle, coûts de calcul, risque de banalisation"}
      - {name: deeptech-expert, focus: "Time to market, burn rate, IP, niveaux TRL"}
      - {name: climate-expert, focus: "Subventions, vents porteurs réglementaires, crédits carbone, impact"}
      - {name: hardware-expert, focus: "Marges, cycles de production, chaîne d'approvisionnement, BOM"}
      - {name: spacetech-expert, focus: "Coûts de lancement, contrats publics, cycles deep tech"}
      - {name: gaming-expert, focus: "CPI, LTV, rétention D1/D7/D30, ARPDAU"}
      - {name: consumer-expert, focus: "CAC, viralité, rétention, LTV, marque"}
      - {name: proptech-expert, focus: "Cycles immobiliers, réglementaire, dynamiques de marketplace"}
      - {name: edtech-expert, focus: "B2B vs B2C, métriques d'engagement, réglementaire"}
      - {name: foodtech-expert, focus: "Chaîne d'approvisionnement, marges, sécurité alimentaire"}
      - {name: mobility-expert, focus: "Unit economics mobilité, réglementaire, gestion de flotte"}
      - {name: cybersecurity-expert, focus: "Paysage des menaces, exigences de conformité, qualité de l'ARR"}
      - {name: creator-expert, focus: "Économie des créateurs, risque plateforme, monétisation"}
      - {name: blockchain-expert, focus: "Token economics, risque réglementaire, TVL, risque protocole"}
      - {name: general-expert, focus: "Repli — recherche externe structurée pour secteurs non couverts"}

  tier3:
    execution_order: |
      1. Batch parallèle : conditions-analyst, contradiction-detector, scenario-modeler, devils-advocate.
      2. thesis-reconciler (full_analysis only) — voir full_analysis_extra ci-dessous.
      3. synthesis-deal-scorer (séquentiel, après batch 1 + thesis-reconciler en full_analysis).
      4. memo-generator (séquentiel, après tout).
    standalone_agents:
      counting_note: "6 agents standalone, comptés dans le total 44."
      agents:
        - name: conditions-analyst
          criticality: HIGH
          role: "Analyse des conditions du dossier"
          inputs: "Term sheet, cap table, benchmarks marché"
          outputs: "Analyse des termes (valorisation, instrument, dilution, vesting, board), comparaison aux repères de marché, points de négociation"

        - name: contradiction-detector
          criticality: CRITIQUE
          role: "Détection des contradictions entre agents de couche 1"
          inputs: "Résultats des agents de couche 1"
          outputs: "Contradictions détectées, tentatives de résolution, éléments non résolus"
          triggers: "Consensus Engine si contradictions significatives"

        - name: scenario-modeler
          criticality: HIGH
          role: "Modélisation multi-scénarios"
          inputs: "Données financières + hypothèses"
          outputs: "Scénarios central/favorable/défavorable avec résultats chiffrés (valeur de sortie, multiples, horizons), analyse de sensibilité"

        - name: devils-advocate
          criticality: HIGH
          role: "Mise à l'épreuve de la thèse positive du dossier"
          inputs: "Résultats positifs identifiés dans le dossier"
          outputs: "Risques moins visibles, hypothèses mises à l'épreuve, incitations et motivations fondateurs à clarifier"

        - name: synthesis-deal-scorer
          criticality: CRITIQUE
          role: "Synthèse et scoring du dossier"
          inputs: >
            Résultats des couches 1 et 2, résultats de couche 3 déjà exécutés
            (conditions, contradictions, scénarios, mise à l'épreuve),
            thesis-reconciler en full_analysis, et recoupement Funding Database
            lorsque disponible.
          outputs: >
            Sortie actuelle : score 0-100 avec ventilation transparente,
            percentile vs comparables lorsque disponibles, thèses positive et
            négative.
          scoring: "Dimensions dynamiques par stade d'investissement (Équipe, Marché, Produit, Financier, Timing)"
          chantier_note: "Passage au scoring 2 axes orientation × solidité des preuves en chantier (cf. § 6 in_progress)."

        - name: memo-generator
          criticality: HIGH
          role: "Génération d'un mémo d'investissement structuré et sourcé"
          inputs: >
            Résultats disponibles des couches 0 à 3, incluant synthèse,
            contradictions, scénarios, conditions et mise à l'épreuve.
          outputs: |
            Mémo structuré : synthèse exécutive, présentation de l'entreprise,
            points clés du dossier, risques clés, synthèse financière, évaluation
            de l'équipe, opportunité de marché, paysage concurrentiel, analyse
            des termes, thèse d'investissement, stratégie de sortie, points à
            traiter, questions ouvertes pour les fondateurs.
          quality_note: >
            Qualité visée : mémo défendable devant associés, LPs ou
            co-investisseurs.

    full_analysis_extra:
      counting_scope: "Hors total 44 ; activé uniquement en full_analysis."
      agents:
        - name: thesis-reconciler
          criticality: HIGH
          full_analysis_only: true
          role: "Mise en regard de la thèse initiale avec les analyses produites"
          inputs: "Thèse initiale + résultats des couches 1 et 2 + premiers résultats de couche 3 déjà exécutés."
          outputs: "Écarts entre thèse et preuves, ajustements de thèse, zones à réexaminer"


# ============================================================
# 8. PRODUIT DÉTAILLÉ — SCORING
# ============================================================
# Aligné sur la doctrine du pivot 2026-05-20 (cf. § 3 vision + § 4 marché +
# § 5 problème + § 6 produit + § 7 agents + docs-doctrine/angeldesk-strategic-pivot.md).
# §8 décrit l'état actuel du scoring (livré, mono-axe pondéré) et la cible
# doctrinale (2 axes : orientation du signal × solidité des preuves).
# Chantier de passage en cours (cf. § 6 in_progress + current_code_surfaces ci-dessous).
scoring:
  current_scoring_state:
    status: "Livré — état actuel du système."
    methodology: >
      Scoring actuel calculé par formules TypeScript déterministes côté agents
      et services de scoring (dont calculateAgentScore selon les cas), PAS par
      jugement LLM. Chaque agent retourne une ventilation avec critères, poids,
      scores, justifications. Le score global est la somme pondérée des
      sous-scores.

    dimensions:
      - {code_name: Team, label_fr: "Équipe", weight: "25%", description: "Fondateurs, complémentarité, parcours, manques"}
      - {code_name: Market, label_fr: "Marché", weight: "20%", description: "TAM/SAM/SOM, timing, tendances, concurrence"}
      - {code_name: Product, label_fr: "Produit", weight: "20%", description: "Traction, PMF, stack technique, différenciation"}
      - {code_name: Financials, label_fr: "Financier", weight: "20%", description: "Unit economics, burn, valorisation, projections"}
      - {code_name: Timing, label_fr: "Timing", weight: "15%", description: "Timing marché, maturité, fenêtre d'opportunité"}

    scale: "0-100"

    legacy_grade_mapping:
      status: "État actuel legacy encore utilisé par getScoreLabel() / certains composants ; à remplacer par le modèle 2 axes (cf. target_scoring_model)."
      public_usage: "Interdit comme langage public cible ; conservé uniquement pour état actuel / migration."
      A: {range: "80-100", label: "Excellent"}
      B: {range: "60-79", label: "Solide"}
      C: {range: "40-59", label: "À approfondir"}
      D: {range: "20-39", label: "Points d'attention"}
      F: {range: "0-19", label: "Zone d'alerte"}

    legacy_score_range_profiles:
      status: >
        Ranges numériques legacy mappant un score 0-100 vers un libellé
        d'orientation. Utilisés dans certaines surfaces (légendes, badges).
        Logique mono-axe à remplacer par le modèle 2 axes (cf.
        target_scoring_model).
      profiles:
        - {range: "85-100", label: "Signaux très favorables"}
        - {range: "70-84", label: "Signaux favorables"}
        - {range: "55-69", label: "Signaux contrastés"}
        - {range: "40-54", label: "Vigilance requise"}
        - {range: "0-39", label: "Signaux d'alerte dominants"}

    current_orientation_label_configs:
      status: >
        Configurations de labels d'orientation actuelles, séparées des ranges
        numériques. Restent valides comme expressions d'orientation, mais
        devront être recadrées dans le modèle 2 axes (cf.
        target_scoring_model.axes.orientation_du_signal).
      config_paths:
        - "RECOMMENDATION_CONFIG (src/lib/ui-configs.ts)"
        - "VERDICT_CONFIG (src/lib/ui-configs.ts)"
        - "recLabel() (src/lib/pdf/pdf-helpers.ts)"

  target_scoring_model:
    status: "Cible doctrinale — chantier en cours (cf. § 6 in_progress)."
    description: >
      Remplacement du score global mono-axe pondéré par un modèle à 2 axes
      indépendants. Un dossier où les signaux d'alerte sont fortement étayés
      n'est pas équivalent à un dossier où les signaux favorables sont
      faiblement étayés : les deux doivent être distinguables.
    axes:
      orientation_du_signal:
        values:
          - {internal_value: favorable, display_label: "Signaux favorables"}
          - {internal_value: contrasted, display_label: "Signaux contrastés"}
          - {internal_value: alert, display_label: "Signaux d'alerte"}
          - {internal_value: not_exploitable, display_label: "Non exploitable"}
        source: >
          Synthèse des résultats agents, avec justification sourcée (couche 3
          synthesis-deal-scorer).
      solidite_des_preuves:
        values:
          - {internal_value: solid, display_label: "Preuves solides"}
          - {internal_value: partial, display_label: "Preuves partielles"}
          - {internal_value: contradictory, display_label: "Preuves contradictoires"}
          - {internal_value: insufficient, display_label: "Preuves insuffisantes"}
        source: >
          Formule TypeScript déterministe sur signaux de preuves sourcées
          (cf. solidity_inputs ci-dessous). PAS une auto-évaluation LLM.
        rationale: >
          L'axe 2 s'appelle "Solidité des preuves" et PAS "Confiance" :
          "Confiance" recréerait l'anti-pattern fui d'une auto-évaluation LLM
          comme axe produit. Le mot "confidence" peut exister comme champ
          technique interne (résiduel dans le code), mais ne doit jamais
          devenir l'axe public ou produit "Confiance".

  legacy_orientation_value_mapping:
    note: >
      Mapping explicite entre les valeurs legacy d'orientation (verdict
      mono-axe : very_favorable / favorable / contrasted / vigilance /
      alert_dominant + no_signal_or_insufficient_data) et les valeurs cibles
      du modèle 2 axes (favorable / contrasted / alert / not_exploitable).
      Pour la migration des analyses persistées et des adapters UI.
    mapping:
      very_favorable: favorable
      favorable: favorable
      contrasted: contrasted
      vigilance: contrasted
      alert_dominant: alert
      no_signal_or_insufficient_data: not_exploitable
    migration_note: >
      Mapping à affiner pendant la migration. La distinction très favorable /
      favorable et vigilance / contrasté est perdue dans la cible — choix
      doctrinal assumé (le modèle 2 axes ne porte que 4 valeurs par axe ;
      la nuance d'intensité est portée par la combinaison avec l'axe
      solidité des preuves).

  solidity_inputs:
    description: >
      Composants objectifs alimentant la formule TypeScript de Solidité des
      preuves. Déjà partiellement utilisés dans current_scoring_state
      (pénalités de score sur PROJECTED, etc.) ; deviennent intrants explicites
      de l'axe Solidité dans target_scoring_model. Ne pas confondre avec une
      "confiance" LLM.
    data_reliability_classification:
      AUDITED: "Audit / extrait bancaire certifié — base pour l'analyse"
      VERIFIED: "2+ sources indépendantes concordantes — bonne base"
      DECLARED: "Annoncé par le fondateur sans vérification — utiliser avec réserve explicite"
      PROJECTED: "Projection explicite ou détectée temporellement — à traiter avec prudence ; pénalisant si présenté comme réalisé ou insuffisamment sourcé"
      ESTIMATED: "Calculé par l'outil — montrer le calcul"
      UNVERIFIABLE: "Impossible à vérifier — ne pas fonder une conclusion dessus sans réserve explicite"
    temporal_detection: |
      Si date du document < fin de la période → les métriques sont des PROJECTIONS.
      L'outil calcule le pourcentage de la période qui est futur.
      Les scores ou la solidité des preuves sont pénalisés si des métriques
      clés projetées sont présentées comme réalisées, insuffisamment sourcées,
      ou utilisées sans réserve explicite.
    other_components:
      - "Provenance : source citée et vérifiable"
      - "Fraîcheur : date du document par rapport au stade du dossier"
      - "Contradiction : convergence ou divergence des affirmations entre documents"
      - "Couverture documentaire : nombre de documents qui adressent une même affirmation"

  legacy_enums_policy:
    note: >
      Le code conserve provisoirement des enums internes prescriptifs hérités
      (PROCEED, STOP, READY_TO_INVEST, DO_NOT_PROCEED, STRONG_PASS, PASS, etc.)
      ET des champs libres comme recommendation.action dans le schéma
      synthesis-deal-scorer, qui peuvent réintroduire du prescriptif.
    rule: >
      Enums legacy internes ET champs libres d'action/recommandation autorisés
      provisoirement comme dette de migration. Labels publics obligatoirement
      traduits en profils de signal (cf. doctrine — table des interdits
      CLAUDE.md). Les surfaces UI/PDF/chat/com publique ne doivent jamais
      exposer ces enums ou ces champs libres tels quels.
    fields_to_audit:
      - "recommendation.action (synthesis-deal-scorer schema) — champ libre potentiellement prescriptif, à auditer avant exposition publique"

  current_code_surfaces:
    note: >
      Surfaces code MINIMALES CONNUES concernées par le chantier scoring 2
      axes. Liste non exhaustive — audit complet à mener avant migration.
    scoring_logic:
      - "src/scoring/services/agent-score-calculator.ts — calcul déterministe par agent"
      - "src/services/alert-resolution/adjusted-score.ts — logique de score ajusté"
      - "src/services/analysis-results/score-extraction.ts — extraction du score depuis les résultats d'analyse"
      - "src/services/deals/canonical-read-model.ts — modèle de lecture canonique du dossier"
      - "src/agents/tier3/schemas/synthesis-deal-scorer-schema.ts — schéma Zod du scorer (à passer à 2 axes)"
    ui_components:
      - "src/components/shared/score-badge.tsx — composant ScoreBadge + getScoreLabel() local"
      - "src/components/deals/adjusted-score-badge.tsx — score ajusté /100"
      - "src/components/deals/score-display.tsx — affichage du score"
      - "src/components/deals/tier1-results.tsx — affichage des scores Tier 1"
      - "src/components/deals/tier3-results.tsx — affichage des scores Tier 3 ; affiche encore un % de confidence à auditer en surface user-facing"
    label_helpers:
      - "src/lib/ui-configs.ts — RECOMMENDATION_CONFIG, VERDICT_CONFIG, labels"
      - "src/lib/format-utils.ts:136 — getScoreColor() / getScoreBadgeColor() (cf. color_mapping_migration)"
      - "src/lib/pdf/pdf-helpers.ts — recLabel() (orientation existant) ; proofLabel() à créer (solidité)"
    pdf_surfaces:
      - "src/lib/pdf/pdf-components.tsx — ScoreCircle, ScoreBar"
      - "src/lib/pdf/pdf-sections/score-breakdown.tsx — section de ventilation du score dans le PDF"
    api_surfaces:
      - "API/OpenAPI : auditer si globalScore ou confidenceScore sortent publiquement (à confirmer avant migration)"
    persisted_analyses:
      - "Migration des analyses déjà stockées en base — adapter legacy single-score → 2 axes pour rétro-compatibilité ; ne pas casser l'affichage des analyses historiques."

  user_facing_confidence_surfaces_to_audit:
    note: >
      Surfaces actuelles où "Confiance" ou un % de confidence est exposé à
      l'utilisateur final. À auditer pour requalifier en solidité des preuves
      objective, ou retirer si redondant avec la solidité. Liste minimale
      connue, non exhaustive.
    surfaces:
      - "src/components/deals/tier3-results.tsx — affichage % de confidence (exemple cité)"
      - "src/lib/pdf/pdf-sections/score-breakdown.tsx — 'Score global: ... — Confiance: ...%'"
      - "Composants thesis hero / review / revision — 'Confiance .../100'"
      - "Early warnings — affichage 'Fiabilité / Confiance'"
      - "Board views — composants affichant un confidence"

  color_mapping_migration:
    note: >
      Le code actuel encode le score 0-100 en couleur (vert / bleu / jaune /
      orange / rouge) via getScoreColor() et getScoreBadgeColor() dans
      src/lib/format-utils.ts:136.
    target_state: >
      Avec le modèle 2 axes, la couleur portée à l'écran doit représenter
      l'orientation du signal (favorable / contrasté / alerte / non exploitable).
      La solidité des preuves nécessite un traitement visuel séparé
      (icône, badge complémentaire, libellé textuel — à spécifier dans le
      chantier UI). Ne pas mélanger les deux axes sur la même couleur.

  implementation_status:
    status: "Chantier en cours (cf. § 6 in_progress)."
    items_to_ship:
      - "Schema Zod du synthesis-deal-scorer — passage à 2 axes (orientation, solidité)."
      - "Service de calcul déterministe de la Solidité des preuves (formule TypeScript sur signaux de preuves sourcées)."
      - "src/lib/ui-configs.ts — deux familles de labels (orientation + solidité)."
      - "src/lib/pdf/pdf-helpers.ts — recLabel() conservé pour orientation ; proofLabel() à créer pour solidité."
      - "src/components/shared/score-badge.tsx — refonte du composant pour afficher les 2 axes ; getScoreLabel() local à reprendre."
      - "src/components/deals/tier1-results.tsx + src/components/deals/tier3-results.tsx + src/components/deals/score-display.tsx + src/components/deals/adjusted-score-badge.tsx — refonte de la hiérarchie d'interface (score subordonné, dimensions + solidité + sources + contradictions + questions montés en premier). Audit du % de confidence affiché à retirer ou requalifier."
      - "src/lib/pdf/pdf-components.tsx + src/lib/pdf/pdf-sections/score-breakdown.tsx — refonte cohérente du rendu PDF (2 axes + audit confidence)."
      - "src/lib/format-utils.ts — refonte getScoreColor()/getScoreBadgeColor() selon color_mapping_migration."
      - "Adapters legacy enum (PROCEED, STOP, READY_TO_INVEST, DO_NOT_PROCEED, STRONG_PASS, PASS, etc.) → orientation/solidité pour la migration (cf. legacy_orientation_value_mapping)."
      - "Audit de recommendation.action (champ libre) avant exposition publique."
      - "Migration des analyses persistées en base — adapter legacy single-score → 2 axes."
      - "Prompts agents couche 3 — purge finale des vestiges oraculaires (cf. § 6 in_progress)."

    tests_to_ship:
      principle: >
        Les enums legacy internes (PROCEED, STOP, READY_TO_INVEST, etc.)
        restent dans le code comme dette de migration et N'ONT PAS À ÊTRE
        SUPPRIMÉS des fichiers source. Les tests anti-prescriptifs visent
        les surfaces rendues (snapshots UI/PDF), les outputs des helpers
        publics de labels orientation/solidité, et les outputs LLM produits,
        PAS un scan naïf des fichiers source. getScoreLabel() legacy ne doit
        pas rester la source canonique après migration ; il est subordonné
        ou remplacé par les helpers orientation/solidité.
      tests:
        - "Tests de déterminisme : même dossier → même score (formule TypeScript stable, non-régression)."
        - "Tests de labels publics sur surfaces rendues : snapshots UI/PDF + outputs des helpers publics de labels orientation/solidité ne contiennent jamais GO/NO-GO/PASS/STRONG_PASS/READY_TO_INVEST/DO_NOT_PROCEED."
        - "Tests de backward compatibility : anciennes analyses mono-score restent affichables via adapter legacy enum → 2 axes (cf. legacy_orientation_value_mapping) ; analyses persistées en base ne cassent pas l'affichage."
        - "Tests de non-régression recLabel() (existant) + nouveau proofLabel() (à créer)."
        - "Tests sur les surfaces user_facing_confidence — vérifier que les chaînes 'Confiance' / 'confidence' n'apparaissent plus comme axe produit en surface publique après requalification."

    expected_outcome: >
      Cas distincts désormais distinguables (labels stabilisés) :
      - Signaux d'alerte × Preuves solides → signaux d'alerte fortement étayés.
      - Signaux favorables × Preuves insuffisantes → signaux favorables faiblement étayés.
      - Non exploitable × Preuves insuffisantes → signal non exploitable faute de preuves suffisantes.


# ============================================================
# 9. PRODUIT DÉTAILLÉ — BOARD AI
# ============================================================
# Aligné sur la doctrine du pivot 2026-05-20 (cf. § 3 vision + § 4 marché +
# § 5 problème + § 6 produit + § 7 agents + § 8 scoring +
# docs-doctrine/angeldesk-strategic-pivot.md) et sur le code réel
# (src/agents/board/, src/components/deals/board/).
# Board AI = capacité sous le capot — débat multi-modèle. Pas promesse
# principale (cf. doctrine — hiérarchie de messaging § 6). Les valeurs
# d'enum verdicts conservées telles que définies dans le code
# (BoardVerdictType, src/agents/board/types.ts) ; jamais en surface publique
# brute (cf. § 8 legacy_enums_policy).
# Références code par file + symbole (pas par numéros de ligne — qui dérivent).
board_ai:
  internal_name: "Board AI"
  public_description: >
    Débat multi-modèle — plusieurs modèles indépendants aux profils
    complémentaires confrontent leurs lectures sur le même dossier.
    Divergences persistantes = signaux à examiner, pas des défauts.

  positioning_rule: >
    Capacité sous le capot ; pas en accroche publique. La promesse principale
    reste le copilote analytique, les preuves sourcées, les contradictions
    visibles et les zones d'incertitude (cf. doctrine — hiérarchie de
    messaging § 6).

  limits:
    - "Désaccords entre modèles = signaux à examiner, pas preuve de vérité émergente."
    - "Convergence ne garantit pas la justesse du verdict."
    - "Positions minoritaires sont documentées et restent accessibles dans le verdict compilé."
    - "Le verdict majoritaire est le résultat agrégé du vote des membres actifs, pas un oracle. La synthèse concerne les points de convergence et de divergence rapportés dans le verdict compilé, pas le verdict majoritaire lui-même."

  runtime_config_reference:
    note: >
      Les modèles concrets, leur nombre et leurs profils sont configurés au
      runtime. Ne pas exposer publiquement la composition du board, ni la
      lister comme essence du système (cf. positioning_rule).
    config_sources:
      - "BOARD_MEMBERS_TEST (src/agents/board/types.ts) — configuration de test"
      - "BOARD_MEMBERS_PROD (src/agents/board/types.ts) — configuration production"
      - "getBoardMembers() (src/agents/board/types.ts) — sélection runtime selon environnement"
      - "BOARD_CONFIG env var (src/agents/board/types.ts) — sélection test/prod"
      - "BoardOrchestratorOptions + DEFAULT_MAX_ROUNDS + DEFAULT_TIMEOUT_MS (src/agents/board/board-orchestrator.ts) — paramètres rounds/timeouts"
    min_members_required: 2
    nominal_config_note: >
      MIN_MEMBERS_REQUIRED = 2. Le board peut fonctionner avec moins de
      modèles que la config nominale ; les calculs de consensus et de vote
      s'appliquent aux membres réellement actifs.

  pipeline:
    note: >
      Pipeline réel implémenté dans src/agents/board/board-orchestrator.ts.
      Décrit le déroulement effectif, pas une promesse marketing.
    phases:
      - name: thesis_debate
        description: "Round 0 — débat thesis-first sur la thèse initiale du dossier (activé lorsqu'une thèse initiale est disponible — cf. runThesisDebate trigger dans board-orchestrator.ts)."
      - name: independent_analysis
        description: "Chaque modèle membre analyse le dossier séparément et émet un verdict initial (BoardVerdictType — cf. verdict_values)."
      - name: multi_round_debate
        description: >
          Les modèles voient les verdicts des autres et répondent. Peuvent
          ajuster leur position lorsque les éléments soumis modifient leur
          analyse. Multi-rounds jusqu'à arrêt (cf. stopping_reasons).
      - name: final_votes
        description: >
          Chaque modèle membre émet son verdict final après débat
          (runFinalVotes). Le verdict majoritaire et le niveau de consensus
          sont calculés (getMajorityVerdict, calculateConsensusLevel) sur
          les membres actifs.
      - name: verdict_compilation
        description: >
          Compilation du verdict : verdict majoritaire + niveau de consensus
          + positions minoritaires documentées + points de convergence +
          points de divergence.

  verdict_values:
    note: >
      Valeurs internes utilisées dans le code (BoardVerdictType,
      src/agents/board/types.ts). Verdicts produits par chaque modèle
      membre, pas labels publics. Mapping vers les profils d'orientation
      2 axes : cf. § 8 legacy_orientation_value_mapping et
      § 8 target_scoring_model.axes.orientation_du_signal.
    code_symbol: "src/agents/board/types.ts — BoardVerdictType"
    values:
      - {internal_value: VERY_FAVORABLE, mapped_orientation: favorable}
      - {internal_value: FAVORABLE, mapped_orientation: favorable}
      - {internal_value: CONTRASTED, mapped_orientation: contrasted}
      - {internal_value: VIGILANCE, mapped_orientation: contrasted}
      - {internal_value: ALERT_DOMINANT, mapped_orientation: alert}
      - {internal_value: NEED_MORE_INFO, mapped_orientation: not_exploitable}
    public_usage: >
      Ces verdicts internes ne doivent jamais apparaître bruts en surface
      publique. Les surfaces UI/PDF/chat doivent afficher les profils
      d'orientation cibles (cf. § 8 target_scoring_model).

  consensus_levels:
    note: >
      Niveaux de consensus calculés après les votes finaux
      (calculateConsensusLevel). Descriptions données pour le cas nominal
      à 4 membres ; le calcul s'applique aux membres réellement actifs
      (MIN_MEMBERS_REQUIRED = 2).
    implementation_note: >
      Dette d'implémentation : SPLIT n'est marqué que si
      maxCount === 2 ET totalMembers === 4. Avec 2 membres actifs en
      désaccord (1 vs 1), le niveau peut tomber en MINORITY plutôt qu'en
      SPLIT. À documenter comme limite ; tout désaccord pair n'est pas
      SPLIT au sens code.
    levels:
      - {code_value: UNANIMOUS, label_fr: "Unanime", description: "Tous les membres actifs convergent sur le même verdict."}
      - {code_value: STRONG, label_fr: "Majorité forte", description: "Majorité forte (typiquement 3 sur 4 en config nominale)."}
      - {code_value: SPLIT, label_fr: "Désaccord pair", description: "Désaccord pair (typiquement 2 vs 2 en config nominale — cf. implementation_note)."}
      - {code_value: MINORITY, label_fr: "Position minoritaire", description: "Verdict majoritaire avec position dissidente significative (typiquement 1 sur 4 en config nominale)."}

  stopping_reasons:
    note: >
      Conditions d'arrêt du débat. Les 4 ci-dessous sont les stoppingReason
      du BoardVerdictResult (cf. src/agents/board/types.ts —
      BoardVerdictResult.stoppingReason). La session DB peut aussi être
      stoppée manuellement (manual_stop) hors verdict complet — cas distinct.
    verdict_complete_reasons:
      - "consensus — convergence atteinte sur un verdict commun."
      - "majority_stable — majorité stable sur plusieurs rounds successifs."
      - "max_rounds — limite de rounds atteinte sans convergence."
      - "stagnation — pas de progression mesurable entre rounds."
    session_only_reason:
      manual_stop:
        description: "Session stoppée manuellement par l'utilisateur, hors verdict complet."
        implementation_note: >
          Dette d'implémentation : stopBoard() peut retourner un résultat
          partiel typé BoardVerdictResult avec
          stoppingReason: "stagnation" as const. Le typage actuel ne
          distingue pas proprement un arrêt manuel d'une stagnation réelle
          dans le résultat. À corriger pour ajouter un stoppingReason
          dédié "manual_stop" dans le type, ou un flag séparé.

  context_compression:
    note: >
      Compression structurée entre rounds pour limiter la taille du contexte
      injecté à chaque modèle (cf. src/agents/board/context-compressor.ts).
    purpose: >
      Limiter la croissance du contexte entre rounds tout en préservant les
      éléments factuels du dossier et les positions exprimées par les modèles.
    limit: >
      Compression utile mais potentiellement source de perte de nuance. Les
      sources et positions originales restent prioritaires en cas de doute.
    surface_to_audit: >
      cf. board_prompt_surfaces_to_audit — context-compressor.ts injecte
      encore "Verdict consolidé / Confiance indicative / verdict / score /
      confidence" comme signaux compacts dans le contexte des modèles ;
      à requalifier pour rester cohérent avec § 8 (Confiance ≠ axe produit).

  confidence_field_status:
    note: >
      Le champ technique `confidence` est émis par chaque modèle membre via
      les events `member_analysis_completed` et `member_voted` (e.g.
      "${member.name}: ${analysis.verdict} (${analysis.confidence}%)" et
      "${member.name} vote ${vote.verdict} (${vote.confidence}%)").
      L'event `verdict_reached` émet "Verdict: ${verdict} (${consensusLevel})",
      PAS le confidence.
    rule: >
      Conformément à § 8 (rule sur "Confiance"), ce champ technique interne
      ne doit jamais devenir un axe produit ni un label public. Les surfaces
      Board affichant un % confidence sont listées dans
      board_user_facing_surfaces_to_audit ci-dessous, à requalifier ou
      retirer.

  narrative_sanitization:
    note: >
      Les sorties brutes des modèles Board peuvent contenir des formulations
      prescriptives (héritage des prompts à auditer — cf.
      board_prompt_surfaces_to_audit). Une couche de garde-fou sanitise une
      partie des sorties avant persistance et export.
    sanitizer: "sanitizeAgentNarratives"
    coverage_actual: >
      Sanitizer appliqué au verdict compilé final uniquement :
      consensusPoints, frictionPoints, questionsForFounder,
      votes.justification.
    coverage_gaps:
      note: >
        Garde-fou PARTIEL ; les sorties suivantes restent à auditer, non
        couvertes (ou partiellement) par le sanitizer actuel.
      surfaces:
        - "Live SSE events (analyses, votes, débats en cours) — pas sanitisés en flux"
        - "Analyses initiales persistées en base — texte brut conservé"
        - "Réponses de débat persistées — texte brut conservé"
        - "Round thesis debate (responses + recommandations) — pas dans le verdict compilé final"
        - "Justifications affichées dans les vues historiques — re-rendu depuis la persistance brute"
    doctrinal_importance: >
      Cette couche fait partie intégrante du système : sans elle, les sorties
      brutes pourraient exposer le langage interdit (GO/NO-GO/PASS/etc.) ou
      des recommandations actionnables prescriptives. La couverture actuelle
      est partielle ; un audit complet est requis pour étendre le sanitizer
      aux gaps ci-dessus.
    coverage_test_surfaces:
      note: "Surfaces de rendu final à utiliser pour tester la couverture effective du sanitizer."
      surfaces:
        - "src/components/deals/board/key-points-section.tsx — rend consensusPoints, frictionPoints, questionsForFounder. Surface clé pour vérifier que la couverture du sanitizer est effective sur les champs déclarés."

  board_user_facing_surfaces_to_audit:
    note: >
      Surfaces UI/composants Board exposant à l'utilisateur des labels
      "Confiance", des claims trop forts, ou des descriptions imprécises
      du fonctionnement réel du board. À auditer pour requalifier ou
      retirer. Liste minimale connue, non exhaustive.
    surfaces:
      - "src/components/deals/board/vote-board.tsx — affiche 'Confiance' par membre"
      - "src/components/deals/board/views/chat-view.tsx — vue chat Board ; auditer confidence et formulations prescriptives"
      - "src/components/deals/board/views/timeline-view.tsx — timeline du débat ; auditer formulations"
      - "src/components/deals/board/views/arena-view.tsx — vue arène ; auditer formulations"
      - "src/components/deals/board/views/columns-view.tsx — vue colonnes ; affiche verdicts/couleurs Board, auditer mapping vers profils orientation 2 axes"
      - "src/components/deals/board/thesis-debate-view.tsx — affiche 'Solidité moyenne perçue … /100' (à requalifier vs § 8 Solidité des preuves)"
      - "src/components/deals/board/ai-board-panel.tsx — board launch copy : 'jusqu'à atteindre un verdict commun' ; formulation fausse (le code peut s'arrêter sur majority_stable, max_rounds ou stagnation — cf. stopping_reasons)"
      - "src/components/deals/board/board-teaser.tsx — teaser copy avec triple dette : superlatif ('avis éclairé'), hard-code modèles ('4 des meilleurs LLMs du marché'), prescriptif ('recommandations actionnables')"
      - "src/components/deals/board/board-progress.tsx — importe BOARD_MEMBERS_PROD directement ; contredit la logique runtime getBoardMembers() / sélection test-prod / membres actifs ; à corriger pour respecter la configuration runtime"

  board_prompt_surfaces_to_audit:
    note: >
      Prompts et schémas Board portant encore de la dette doctrinale
      (formulations prescriptives, mention de "comité", "recommandations
      actionnables", "verdict définitif", injection de Confiance dans le
      contexte, etc.). À auditer en synchronie avec les prompts couche 3
      (cf. § 6 in_progress).
    surfaces:
      - "src/agents/board/board-member.ts — system prompt avec 'comité de 4 modèles IA' (hard-code 4 + framing institutionnel à reformuler)"
      - "src/agents/board/board-member.ts — output schema avec champ recommendations potentiellement prescriptif"
      - "src/agents/board/board-member.ts — directive 'Termine chaque recommandation par ... à vous de décider' (test règle d'or appliqué localement, mais structure 'recommandation' à auditer doctrinalement)"
      - "src/agents/board/board-member.ts — phrasing 'verdict définitif' (formulation oraculaire)"
      - "src/agents/board/context-compressor.ts — injection de 'Verdict consolidé / Confiance indicative / verdict / score / confidence' comme signaux compacts dans le contexte des modèles ; à requalifier (Confiance ≠ axe produit)"
      - "src/agents/board/types.ts — type ThesisDebateResponse.recommendations ; schéma contient encore `recommendations`, commentaire parle de 'recommandations au BA' ; à auditer pour éviter de retomber dans du prescriptif"


# ============================================================
# 10. PRODUIT DÉTAILLÉ — LIVE COACHING
# ============================================================
# Aligné sur la doctrine du pivot 2026-05-20 (cf. § 3 + § 4 + § 5 + § 6 + § 7
# + § 8 + § 9 + docs-doctrine/angeldesk-strategic-pivot.md) et sur le code réel
# (src/lib/live/, src/app/api/live-sessions/, src/app/api/coaching/,
# src/app/api/webhooks/recall/, src/app/(dashboard)/deals/[dealId]/live/components/).
# Live Coaching = nom interne. Effet public = vérification des preuves en temps
# réel pendant l'appel fondateur. Le mot "coaching" en surface publique est
# à éviter (registre service personnalisé) — cf. positioning_rule.
# Le runtime a plusieurs chemins distincts (audio webhook, visual-frame,
# post-call, /api/coaching/context, reanalysis) — cf. runtime_context_paths.
# Références code par file + symbole.
live_coaching:
  internal_name: "Live Coaching"
  public_description: >
    Vérification des preuves en temps réel pendant l'appel fondateur — fait
    remonter écarts entre le dossier, les déclarations et les benchmarks
    disponibles, contradictions et informations nouvelles à intégrer.

  positioning_rule: >
    Capacité sous le capot ; pas en accroche publique. La promesse publique
    décrit l'effet (vérification temps réel), pas le mécanisme (coaching IA).
    "Live Coaching" reste nom interne ; le mot "coaching" comme description
    publique de la valeur est à éviter (cf. doctrine § 7 Reframes). Les
    "coaching cards" comme terme runtime restent OK ; en label public,
    préférer "cartes de vérification" ou "cartes d'analyse live".

  limits:
    - "La qualité de la vérification dépend de la disponibilité du dossier et de l'état du corpus pré-call (cf. runtime_context_paths)."
    - "La transcription temps réel a un délai irréductible (Recall.ai + Deepgram streaming)."
    - "Les cartes peuvent être manquées si la latence LLM dépasse le timeout (cf. latency_status)."
    - "Les sorties brutes du coaching et du post-call ne sont pas sanitisées doctrinalement — sanitizeTranscriptText et sanitizeLLMOutput protègent contre l'injection prompt / la réinjection, pas contre le langage prescriptif (cf. security_sanitization_status + narrative_sanitization_status)."

  runtime_pipeline:
    note: >
      Pipeline réel implémenté dans src/lib/live/, src/app/api/live-sessions/,
      src/app/api/coaching/, src/app/api/webhooks/recall/, et
      src/app/(dashboard)/deals/[dealId]/live/components/. Les chemins
      d'exécution diffèrent selon la surface appelante (cf.
      runtime_context_paths).
    components:
      - name: recall-client
        role: "Client API Recall.ai — création/gestion des bots, récupération du transcript complet, vérification de la signature Svix, détection de la plateforme du meeting. Les events live sont reçus par les routes webhook (/api/live-sessions/[id]/webhook + /api/webhooks/recall), pas par ce client. La configuration du bot (incl. la transcription Deepgram streaming) est construite côté start/route.ts, pas dans ce client."
        code: "src/lib/live/recall-client.ts"
      - name: speaker-detector
        role: "Fuzzy matching de noms et participants pour identifier qui parle. suggestRoles propose un mapping initial ; la détection du rôle BA proprement dite est gérée ailleurs (côté participants/UI mapping)."
        code: "src/lib/live/speaker-detector.ts"
      - name: utterance-router
        role: "Classification métier de chaque utterance (10 catégories — cf. card_schema.utterance_categories) + décision shouldTriggerCoaching selon le speaker role."
        code: "src/lib/live/utterance-router.ts"
        model_runtime: HAIKU
        confidence_note: >
          Le prompt LLM demande uniquement un JSON
          { classification, confidence }, où confidence reflète la clarté
          de la catégorie. PAS de directives anti-hallucination ni de
          self-audit dans ce prompt (à la différence des autres composants
          LLM Live Coaching).
      - name: auto-dismiss
        role: "Vérifie via Haiku si une utterance émise par un participant ba OU investor a substantiellement adressé une carte active — si oui, ferme la carte."
        code: "src/lib/live/auto-dismiss.ts"
      - name: sanitize
        role: "Protection contre l'injection prompt sur les transcripts (cf. security_sanitization_status)."
        code: "src/lib/live/sanitize.ts — sanitizeTranscriptText"
      - name: context-compiler
        role: "Assemblage du DealContext pour injection dans les prompts LLM (faits financiers, équipe, marché, signaux d'alerte, signalProfile, benchmarks, contradictions clés, questions ouvertes, résumés agents, negotiationStrategy). Source principale de la dette scoring (cf. context_scoring_debt)."
        code: "src/lib/live/context-compiler.ts — compileDealContextCached, compileContextForColdMode"
      - name: coaching-engine
        role: "Génère des coaching cards en réaction directe aux utterances, en s'appuyant sur le DealContext compilé."
        code: "src/lib/live/coaching-engine.ts"
        model_runtime: HAIKU
        confidence_directive_note: "Le prompt applique les directives anti-hallucination '>90% confident' + self-audit final (cf. confidence_surfaces_to_audit)."
      - name: visual-processor
        role: "Analyse des slides/écrans partagés pendant l'appel (single-stage HAIKU vision). Émet des contradictions visuelles ; les contradictions high-severity créent des cartes proactives (cf. visual_proactive_cards)."
        code: "src/lib/live/visual-processor.ts"
        model_runtime: "HAIKU (vision)"
        confidence_directive_note: "Le prompt applique les directives anti-hallucination '>90% confident' + self-audit final (cf. confidence_surfaces_to_audit)."
      - name: ably-server
        role: "Messagerie temps réel Ably — serveur publie via REST, client consomme via Ably Realtime. Diffusion des coaching cards, events de session et signaux visuels au client."
        code: "src/lib/live/ably-server.ts"
      - name: post-call-generator
        role: "Génère le rapport post-call selon le schéma legacy actuel : keyPoints, actionItems, confidenceDelta, contradictions, newInformation, remainingQuestions."
        code: "src/lib/live/post-call-generator.ts"
        model_runtime: SONNET
        scheduling: >
          Déclenché via after() non-blocking côté API. Chemins de
          déclenchement multiples : stop de session,
          /api/live-sessions/[id]/retry-report, et certains webhooks de fin
          de session (after()).
      - name: post-call-reanalyzer
        role: "Re-analyse explicite via /api/coaching/reanalyze selon le mode (delta, targeted, full)."
        code: "src/lib/live/post-call-reanalyzer.ts"
        model_runtime: >
          delta : SONNET (generateDeltaReport).
          targeted / full : AgentOrchestrator (modèles des agents concernés,
          pas SONNET unique).
        scheduling: >
          Deux chemins distincts :
          (1) /api/coaching/reanalyze — triggerTargetedReanalysis attend le
          résultat côté API (blocking, caller awaits).
          (2) generateAndSavePostCallReport peut déclencher
          triggerTargetedReanalysis en fire-and-forget après le rapport
          post-call (non-blocking dans ce chemin).
      - name: transcript-condenser
        role: "Extraction structurée du transcript (faits, contradictions, éléments nouveaux et observations structurées, mouvements d'équipe) pour les futures sessions et le post-call."
        code: "src/lib/live/transcript-condenser.ts"
        model_runtime: SONNET

  runtime_context_paths:
    note: >
      Le runtime a plusieurs chemins distincts qui chacun récupèrent ou
      compilent un contexte deal différent. Le mode 'cold' n'est pas
      uniforme — il dépend de la surface appelante. Documenter par chemin.
    paths:
      - surface: "audio webhook (utterances de transcription)"
        code: "src/app/api/live-sessions/[id]/webhook/route.ts"
        behavior: >
          Si session.dealId existe → compileDealContextCached(session.dealId)
          sans soft-gate corpus. Cold mode (compileContextForColdMode) utilisé
          UNIQUEMENT si pas de deal lié. Asymétrie à documenter : le coaching
          audio ne se dégrade PAS si le corpus est non prêt, tant qu'un
          deal est lié.
      - surface: "visual-frame"
        code: "src/app/api/live-sessions/[id]/visual-frame/route.ts"
        behavior: "Soft-gate corpus : cold context si corpus non prêt."
      - surface: "/api/coaching/context"
        code: "src/app/api/coaching/context/route.ts"
        behavior: "Soft-gate corpus : retourne data: null + corpusSkipped si corpus non prêt."
      - surface: "post-call report"
        code: "src/lib/live/post-call-generator.ts"
        behavior: "Soft-gate corpus : mode transcript-only si corpus non prêt."
      - surface: "/api/coaching/reanalyze"
        code: "src/app/api/coaching/reanalyze/route.ts"
        behavior: "Hard-gate corpus : la route refuse si corpus non prêt."
    implication: >
      L'affirmation 'la vérification des preuves dépend du contexte pré-call'
      est vraie globalement mais doit être qualifiée par chemin. La surface
      audio coaching est la plus permissive ; reanalysis est la plus stricte.

  triggering_rules:
    note: >
      Règles d'aiguillage des utterances par speaker role × classification.
      Implémentées dans utterance-router.ts (shouldTriggerCoaching) + auto-dismiss.ts.
    rules:
      - "Classifications filler et small_talk → IGNORÉES (jamais de coaching, jamais d'auto-dismiss)."
      - "Speaker role ba → AUTO-DISMISS (vérification si une carte active a été substantiellement adressée)."
      - "Speaker role investor → AUTO-DISMISS (même traitement que ba)."
      - "Autres speaker roles substantiels (founder, co-founder, lawyer, advisor, other / non mappé) → COACHING (génération de cartes par coaching-engine)."
    note_on_scope: >
      Important : 'autres rôles substantiels' inclut founder, co-founder ET
      tout participant non mappé (lawyer, advisor, other). La formulation
      'coaching seulement sur utterances fondateur' est trop étroite vs code.

  latency_status:
    note: >
      Sources contradictoires sur la latence cible. Documenter le drift
      plutôt que choisir une vérité artificielle.
    code_hard_timeout: "TIMEOUT_MS = 8_000 (src/lib/live/coaching-engine.ts) — dernier filet en cas de LLM lent."
    code_inline_target: "Commentaire code : 'HAIKU for speed (~1-2s vs ~6s for Sonnet) — critical for live coaching latency.'"
    spec_target_p50: "<3s entre la fin de phrase fondateur et l'apparition de la carte (LIVE-COACHING-SPEC.md)."
    spec_target_p95: "<3.5s pour 95% des suggestions (LIVE-COACHING-SPEC.md)."
    spec_alerting_threshold: ">5s déclenche une alerte de latence (LIVE-COACHING-SPEC.md)."
    recall_floor_estimation: >
      Estimation spec : ~1-3s entre l'utterance et la transcription
      (Recall.ai + Deepgram streaming, en mode prioritize_low_latency).
      C'est une estimation documentée dans la spec, pas une vérité mesurée
      directement par le code.
    drift_to_resolve: >
      Le YAML originel disait '8s hard timeout, 5s soft limit'. La réalité
      est un mix : code applique 8s comme dernier filet, spec vise <3s/<3.5s
      P95, monitoring alerte à 5s, estimation Recall.ai+Deepgram ~1-3s.
      Aucune vérité unique ne capture cela ; les valeurs ci-dessus sont la source.

  model_runtime_status:
    note: >
      Le YAML originel mentionnait 'Claude Haiku 4.5' comme modèle unique.
      Le runtime utilise plusieurs modèles selon le composant, routés via
      OpenRouter avec des symboliques HAIKU / SONNET. Modèles susceptibles
      d'évoluer ; ne pas exposer publiquement.
    haiku_components:
      - utterance-router
      - auto-dismiss
      - coaching-engine
      - visual-processor
    sonnet_components:
      - post-call-generator
      - transcript-condenser
      - "post-call-reanalyzer (delta mode uniquement)"
    agent_orchestrator_components:
      - "post-call-reanalyzer (targeted/full modes — utilise les modèles des agents concernés via AgentOrchestrator, pas SONNET unique)"
    config_source: "src/services/openrouter/router.ts — routage HAIKU / SONNET selon model param."
    public_messaging: "Ne pas exposer les noms ni la version des modèles en surface publique (cf. doctrine — hiérarchie de messaging § 6)."

  card_schema:
    note: >
      Schéma des coaching cards. Source canonique des types et énumérations :
      src/lib/live/types.ts (CoachingCardType, UtteranceClassification,
      SpeakerRole, etc.). coaching-engine.ts valide ces types en runtime mais
      ne les définit pas. ClassificationResult (avec le champ confidence
      numérique) est défini dans utterance-router.ts, pas dans types.ts.
    card_types:
      - {internal_value: question, label_public: "Question de suivi"}
      - {internal_value: contradiction, label_public: "Contradiction"}
      - {internal_value: negotiation, label_public: "Repère de négociation sourcé"}
      - {internal_value: new_info, label_public: "Information nouvelle"}
    priorities:
      - {internal_value: high, label_public: "Priorité haute"}
      - {internal_value: medium, label_public: "Priorité moyenne"}
      - {internal_value: low, label_public: "Priorité basse"}
    utterance_categories:
      note: >
        Sortie de utterance-router. PAS de classe 'contradiction' dans le
        classifieur (la détection de contradiction est faite côté coaching-engine
        et visual-processor via le DealContext).
      values:
        - financial_claim
        - competitive_claim
        - team_info
        - market_claim
        - tech_claim
        - strategy_reveal
        - negotiation_point
        - question_response
        - small_talk
        - filler
    public_usage: >
      Enums internes OK comme valeurs code ; en label affiché à l'utilisateur,
      utiliser les label_public ci-dessus, et bannir 'infos', 'nouvelles infos',
      'infos inédites' (cf. § 6 micro-fixes franglais).

  integration_surfaces:
    recall_ai:
      role: >
        Orchestration bots Recall.ai (joining meeting, livraison transcripts et
        events via webhook/WS). La configuration du bot (incl. la transcription
        Deepgram streaming) est construite côté start/route.ts et passée à
        createBot, pas dans recall-client.
      transcription_engine: "Deepgram streaming, configuré dans la config du bot Recall (côté start/route.ts)."
      operational_constraint: >
        La spec préconise prioritize_low_latency (vs prioritize_accuracy qui
        introduit 3-10 min de délai). C'est une contrainte de spec /
        exigence opérationnelle, à vérifier dans la configuration des bots
        Recall (pas un champ runtime explicite dans start/route.ts).
    ably:
      role: "Messagerie temps réel Ably — serveur publie via REST, client consomme via Ably Realtime."
    api_routes:
      - "/api/live-sessions (CRUD sessions)"
      - "/api/live-sessions/[id] (récupération/mise à jour session — GET et PATCH ; pas de DELETE)"
      - "/api/live-sessions/[id]/start (démarrage — construit la config Deepgram + appelle createBot via recall-client)"
      - "/api/live-sessions/[id]/stop (arrêt + after() pour post-call-generator)"
      - "/api/live-sessions/[id]/webhook (webhook Recall.ai côté session — utterances et events)"
      - "/api/live-sessions/[id]/visual-frame (réception frames visuels, déclenche visual-processor)"
      - "/api/live-sessions/[id]/retry-report (régénération rapport post-call)"
      - "/api/live-sessions/[id]/reinvite (réinvitation/reprise du bot Recall)"
      - "/api/live-sessions/[id]/participants (gestion participants / mapping rôles)"
      - "/api/coaching/context (récupération DealContext compilé ; soft-gate corpus)"
      - "/api/coaching/ably-token (token Ably pour le client)"
      - "/api/coaching/reanalyze (déclenche post-call-reanalyzer mode delta/targeted/full ; hard-gate corpus)"
      - "/api/webhooks/recall (webhook global Recall.ai pour la plateforme)"

  visual_proactive_cards:
    note: >
      Cas particulier du visual-processor : les contradictions visuelles
      high-severity ne se contentent pas d'enrichir le contexte — elles
      déclenchent la création de cartes proactives côté visual-frame route.
    trigger: "Contradiction visuelle de sévérité 'high' détectée par visual-processor."
    flow: "src/app/api/live-sessions/[id]/visual-frame/route.ts — réception des frames + déclenchement des cartes proactives via le pipeline coaching."
    card_type: "Type 'contradiction' avec priority 'high'."

  language_config_drift:
    note: >
      Drift entre le sélecteur UI de langue, le champ LiveSession.language en
      base, et la configuration runtime du bot Deepgram.
    ui_selector: "L'UI propose une sélection de langue (typiquement fr / en)."
    db_storage: "LiveSession.language stocké en base (default 'fr-en' — cf. prisma/schema.prisma)."
    runtime_bot_config: >
      Le bot Deepgram démarré dans start/route.ts hardcode
      language: 'multi' (commentaire code : 'Deepgram handles multilingual
      (FR/EN) natively via language: \"multi\"'). Le champ
      LiveSession.language n'est pas propagé au bot Deepgram.
    debt: >
      Drift à résoudre : soit retirer le sélecteur UI/champ DB (si language
      multi est universel et suffisant), soit propager le choix langue au
      bot Deepgram. À auditer dans le chantier UI Live Coaching.

  model_config_drift:
    note: >
      Drift entre le champ llmModel sélectionnable côté API session et les
      modèles symboliques utilisés au runtime par chaque composant Live
      Coaching.
    api_patch: >
      /api/live-sessions/[id] accepte un champ llmModel en PATCH (e.g.
      'claude-sonnet-4-5', noms concrets de modèle OpenRouter).
    runtime_symbolic_models: >
      Le runtime Live Coaching n'utilise pas le champ llmModel directement.
      Il route via des symboliques HAIKU (utterance-router, auto-dismiss,
      coaching-engine, visual-processor) et SONNET (post-call-generator,
      post-call-reanalyzer delta, transcript-condenser) — cf.
      model_runtime_status. En mode targeted/full, post-call-reanalyzer
      passe par AgentOrchestrator (modèles des agents concernés).
    debt: >
      Drift à résoudre : soit retirer le champ llmModel de l'API (si non
      consommé en live), soit propager le choix utilisateur aux composants
      concernés. À auditer en synchronie avec language_config_drift.

  context_scoring_debt:
    note: >
      Le DealContext compilé (context-compiler.ts) injecte dans les prompts
      LLM live des éléments du scoring mono-axe legacy. À reprendre une fois
      le scoring 2 axes livré (cf. § 8 implementation_status).
    debt:
      - "overallScore (global score) injecté dans le DealContext live (mono-axe legacy)."
      - "signalProfile injecté (cf. § 8 legacy_score_range_profiles)."
      - "Scores par dimension dans DealContext.scores : global, team, market, product, financials."
    timing_absent_drift: >
      DealContext.scores ne contient PAS de champ 'timing' (vérifié dans
      src/lib/live/types.ts). Le scoring synthesis §8 inclut Timing à 15% ;
      il y a donc un drift entre le scoring synthesis et ce qui est injecté
      en live. À réconcilier dans le chantier scoring 2 axes (cf. § 8
      current_code_surfaces).
    target: >
      Une fois le passage 2 axes opéré côté schema synthesis-deal-scorer et
      services downstream, le DealContext live devra exposer orientation +
      solidité plutôt que le score mono-axe. Audit à coupler avec
      § 6 in_progress et § 8 current_code_surfaces.

  confidence_surfaces_to_audit:
    note: >
      'Confiance' et 'confidence' apparaissent à deux titres distincts dans
      Live Coaching :
      (1) confidence NUMÉRIQUE émis par le classifieur utterance-router
      (clarté de la catégorie, pas auto-évaluation LLM globale) ;
      (2) directives ANTI-HALLUCINATION + self-audit dans les autres prompts
      LLM (coaching-engine, visual-processor, post-call-*, transcript-condenser).
      À auditer pour requalifier en solidité des preuves objective (cf. § 8
      target_scoring_model.axes.solidite_des_preuves) ou retirer (cf. § 8
      rule sur Confiance — jamais axe produit).
    classification_confidence_numeric:
      - "src/lib/live/utterance-router.ts — ClassificationResult.confidence (numérique, e.g. 0.8 ou 1.0). Reflète la clarté de la catégorie. PAS de directive anti-hallucination dans ce prompt."
    anti_hallucination_directive_surfaces:
      - "src/lib/live/coaching-engine.ts — prompt applique '>90% confident' + self-audit ('Rate your overall response confidence: HIGH / MEDIUM / LOW')."
      - "src/lib/live/visual-processor.ts — prompt applique '>90% confident' + self-audit."
      - "src/lib/live/transcript-condenser.ts — prompt applique self-audit confidence (HIGH/MEDIUM/LOW) ; sortie inclut keyFacts.confidence: 'verbatim'|'inferred' + confidenceDelta { direction, reason } + section markdown '### Confiance'."
      - "src/lib/live/post-call-generator.ts — prompt applique self-audit confidence ; sortie inclut confidenceDelta { before, after, reason } rendu 'Avant le call : X/100 / Après le call : Y/100 / Raison : ...'."
      - "src/lib/live/post-call-reanalyzer.ts — prompt applique self-audit confidence ; sortie inclut confidenceChange { before, after, reason }."
    type_definitions:
      - "src/lib/live/types.ts — source des schémas confidenceDelta (champs both : direction/reason ET before/after/reason selon le type), keyFacts.confidence: 'verbatim'|'inferred'. ClassificationResult.confidence est défini dans utterance-router.ts, PAS dans types.ts."
    ui_surfaces:
      - "src/app/(dashboard)/deals/[dealId]/live/components/post-call-report.tsx — vue post-call affichant le confidence delta."
      - "src/app/(dashboard)/deals/[dealId]/live/components/post-call-reanalysis.tsx — vue reanalysis."

  ui_copy_surfaces_to_audit:
    note: >
      Composants UI Live Coaching avec dette franglais / vocabulaire BA /
