# ============================================================
# 19. PRODUIT DÉTAILLÉ — ANTI-HALLUCINATION
# ============================================================
# Aligné sur la doctrine du pivot 2026-05-20 (cf. § 3 + § 4 + § 5 + § 6 + § 7
# + § 8 + § 9 + § 10 + § 11 + § 20 + docs-doctrine/angeldesk-strategic-pivot.md)
# et sur le code réel (src/agents/base-agent.ts + src/agents/orchestration/
# prompts/anti-hallucination.ts + agents non-BaseAgent).
# Anti-hallucination = garde-fou prompt interne, pas garantie de vérité.
# Cf. § 20 current_control_surfaces.prompt_discipline pour le positionnement
# moat. Cf. § 8 rule sur Confiance : self-audit confidence interne, jamais
# axe produit public. Cf. § 11 prompt_surfaces_to_audit pour la cohabitation
# avec d'autres dettes prompt.
# Références code par file + symbole.
anti_hallucination:
  positioning_rule: >
    Mécanisme prompt interne — décrit ici comme runtime + limites. Pas en
    accroche publique. Le wording moat passe par § 20
    current_control_surfaces.prompt_discipline ; le wording de § 19 ne
    sert pas de pitch.

  context: >
    Mécanisme de garde-fou intégré aux prompts agents pour réduire
    certaines classes d'hallucination LLM. Inspiré de la recherche sur
    le coût asymétrique des erreurs : un LLM auquel on signale
    explicitement que l'erreur a un coût supérieur à celui de
    l'abstention adopte un comportement statistique plus prudent.
    YAML originel disait *"les modèles hallucinent parce qu'on ne leur
    dit jamais le coût de se tromper"* — caricature de cause unique,
    retirée. Les hallucinations ont d'autres causes (couverture du
    training set, ambiguïté de la question, biais de complaisance,
    contexte tronqué, etc.) qui ne sont pas adressées par ces seules
    directives.

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # LES 5 DIRECTIVES (TEXTE NORMALISÉ)
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  directives:
    note: >
      Texte NORMALISÉ utilisé pour la doctrine — la version runtime
      exacte (telle qu'écrite dans base-agent.ts, anti-hallucination.ts
      et les agents standalone) peut inclure des en-têtes Markdown,
      des labels **CONFIDENT:**, **PROBABLE:**, **SPECULATIVE:** et
      des séparateurs. Voir le code pour la chaîne exacte injectée
      dans le prompt.
    items:
      - id: 1
        name: "Confidence Threshold"
        text: "Answer only if you are >90% confident, since mistakes are penalised 9 points, while correct answers receive 1 point, and an answer of 'I don't know' receives 0 points."
      - id: 2
        name: "Abstention Permission"
        text: "It is perfectly acceptable (and preferred) for you to say 'I don't know' or 'I'm not confident enough to answer this.' I would rather receive an honest 'I'm unsure' than a confident answer that might be wrong. If you are uncertain about any part of your response, flag it clearly with [UNCERTAIN] so I know to verify it independently. Uncertainty is valued here, not penalised."
      - id: 3
        name: "Citation Demand"
        text: "For every factual claim in your response: 1. Cite a specific, verifiable source (name, publication, date) 2. If you cannot cite a specific source, mark the claim as [UNVERIFIED] and explain why you believe it to be true 3. If you are relying on general training data rather than a specific source, say so explicitly. Do not present unverified information as established fact."
      - id: 4
        name: "Self-Audit"
        text: "After completing your response, perform a self-audit: 1. Identify the 3 claims in your response that you are LEAST confident about 2. For each one, explain what could be wrong and what the alternative might be 3. Rate your overall response confidence: HIGH / MEDIUM / LOW. Be ruthlessly honest. I will not penalise you for uncertainty."
      - id: 5
        name: "Structured Uncertainty"
        text: "Structure your response in three clearly labelled sections: CONFIDENT: Claims where you have strong evidence and high certainty (>90%) PROBABLE: Claims where you believe this is likely correct but acknowledge uncertainty (50-90%) SPECULATIVE: Claims where you are filling in gaps, making inferences, or relying on pattern-matching rather than direct knowledge (<50%). Every claim must be placed in one of these three categories. Do not present speculative claims as confident ones."

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # PATTERNS D'INJECTION DANS LES PROMPTS
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  injection_patterns:
    note: >
      Les directives sont injectées dans les prompts agents selon trois
      patterns distincts. Aucune centralisation n'impose les 5 directives
      partout : chaque pattern doit être audité séparément.
    pattern_1_base_agent_helpers:
      mechanism: >
        Pour les agents qui étendent BaseAgent ET qui utilisent les
        helpers d'appel LLM de BaseAgent (llmComplete, llmCompleteJSON,
        llmCompleteJSONValidated, llmCompleteJSONWithFallback,
        llmStream), les directives 2-5 sont injectées via
        buildFullSystemPrompt() — qui concatène
        getAbstentionPermission() + getCitationDemand() +
        getSelfAuditDirective() + getStructuredUncertaintyDirective().
        Nuance importante : l'extension de BaseAgent N'EST PAS suffisante ;
        c'est l'utilisation des helpers qui déclenche l'injection.
      directive_1_status: >
        La directive 1 (Confidence Threshold) n'est PAS centralisée dans
        BaseAgent. Elle doit être auditée agent par agent — elle est
        injectée manuellement dans buildSystemPrompt() de chaque agent
        qui choisit de le faire. CLAUDE.md prétend que "Prompt 1
        directement dans chaque buildSystemPrompt()" est appliqué, mais
        des exemples production l'omettent (cf. coverage_audit.gaps_known).
      code_references:
        - "src/agents/base-agent.ts — méthodes getAbstentionPermission(), getCitationDemand(), getSelfAuditDirective(), getStructuredUncertaintyDirective() ; buildFullSystemPrompt() qui les concatène"
        - "src/agents/base-agent.ts — helpers llmComplete, llmCompleteJSON, llmCompleteJSONValidated, llmCompleteJSONWithFallback, llmStream qui appellent buildFullSystemPrompt(options.systemPrompt)"
    pattern_2_shared_helper:
      mechanism: >
        Plusieurs flux passent par un helper central
        src/agents/orchestration/prompts/anti-hallucination.ts (utilisé
        notamment par board-orchestrator et fact-extractor). Le helper
        produit une chaîne contenant les directives et la fusionne dans
        le prompt textuel.
      code_references:
        - "src/agents/orchestration/prompts/anti-hallucination.ts"
        - "Consommateurs connus : src/agents/board/board-orchestrator.ts ; src/agents/tier0/fact-extractor.ts."
    pattern_3_inline_per_prompt:
      mechanism: >
        Les agents standalone, les lentilles sectorielles Tier 2 et la
        plupart des flux orchestration / Board / Reflexion / Live
        Coaching injectent les 5 directives directement dans le prompt
        textuel — soit dans le system prompt, soit dans le prompt
        utilisateur, soit dans un fallback prompt selon le chemin.
      examples:
        - "src/agents/board/board-member.ts — 5 directives directement"
        - "src/agents/orchestration/consensus-engine.ts — debater + arbitrator system prompts ; certains fallback prompts injectent les directives côté user prompt"
        - "src/agents/orchestration/reflexion.ts — critic + improver system prompts"
        - "src/lib/live/coaching-engine.ts — 5 directives directement"
        - "src/lib/live/visual-processor.ts — 5 directives directement"
        - "src/lib/live/post-call-generator.ts + post-call-reanalyzer.ts + transcript-condenser.ts — 5 directives directement"
        - "Tier 2 lentilles sectorielles non-BaseAgent — directives ajoutées manuellement par fichier (à auditer)"

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # AUDIT DE COUVERTURE
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  coverage_audit:
    yaml_original_claim_to_audit: >
      YAML originel affirmait : *"60+ fichiers, tous les agents sans
      exception (Tier 0, 1, 2, 3, Chat, Board, Orchestration, Live
      Coaching, Negotiation)"*. *"Tous les agents sans exception"* est
      contredit par les gaps_known ci-dessous. *"Negotiation"* mentionnée
      mais pas évidente côté code.
    audit_method:
      note: "Comptes obtenus par grep direct sur le repo (src/). Snapshot — les chiffres évoluent à chaque ajout d'agent."
      commands:
        - "grep -rl 'Anti-Hallucination Directive' src --include='*.ts' | wc -l"
        - "grep -rl 'mistakes are penalised' src --include='*.ts' | wc -l"
        - "grep -rl 'perform a self-audit' src --include='*.ts' | wc -l"
        - "grep -rl 'CONFIDENT:' src --include='*.ts' | wc -l"
    code_audit_results:
      anti_hallucination_directive_header: "60 fichiers contiennent l'en-tête 'Anti-Hallucination Directive'."
      directive_1_penalty_asymmetry: "59 fichiers contiennent 'mistakes are penalised' (directive 1)."
      directive_4_self_audit: "35 fichiers contiennent 'perform a self-audit' (directive 4)."
      directive_5_structured_uncertainty: "35 fichiers contiennent 'CONFIDENT:' (directive 5)."
    coverage_claim_to_audit: >
      Le claim public *"60+ fichiers"* est proche de la mesure (60 pour
      l'en-tête, 59 pour la directive 1 verbatim) mais reste NON VALIDÉ
      PUBLIQUEMENT — la mesure varie selon le grep utilisé et la
      définition de "présence de directive". À ne pas reprendre comme
      chiffre absolu en surface publique tant qu'une méthodologie
      définitive n'est pas adoptée.
    coverage_inequality_explanation: >
      Les directives 4 et 5 apparaissent dans environ 35 fichiers contre
      59 pour la directive 1. L'écart vient principalement de
      l'héritage BaseAgent : les agents qui passent par
      buildFullSystemPrompt() reçoivent les directives 2-5 sans que
      le texte apparaisse en grep verbatim dans leur fichier. Le grep
      ne capture donc que les agents non-BaseAgent ou les prompts
      où les directives sont écrites explicitement.
    gaps_known:
      note: "Fichiers code identifiés comme ne contenant PAS la directive 1 alors qu'ils interrogent un LLM."
      files:
        - "src/agents/tier0/thesis-extractor.ts — directive 1 absente."
        - "src/agents/tier3/thesis-reconciler.ts — directive 1 absente."
        - "src/agents/thesis/rebuttal-judge.ts — directive 1 absente."
        - "src/lib/live/utterance-router.ts — pas de directive (prompt court de classification ; cf. § 10 utterance-router.confidence_note)."
        - "src/lib/live/auto-dismiss.ts — pas de directive (prompt court de vérification de dismiss)."
        - "src/agents/maintenance/db-completer/llm-extract.ts — appel OpenRouter direct sans directive (scope maintenance DB, hors agents d'analyse)."
        - "src/agents/maintenance/db-sourcer/llm-parser.ts — appel OpenRouter direct sans directive (scope maintenance DB, hors agents d'analyse)."
      implication: >
        Le claim *"tous les agents sans exception"* est faux au sens
        strict. À reformuler : "appliquées dans le périmètre des agents
        d'analyse (Tier 0/1/2/3, Board, Reflexion, Consensus, certaines
        surfaces Live Coaching) ; agents auxiliaires (router, dismiss),
        agents thèse spécifiques et flux maintenance DB ne sont PAS
        couverts à ce jour."
    coverage_methodology_to_define:
      - "Définir la liste canonique des agents d'analyse à couvrir, par couche."
      - "Distinguer (a) agents BaseAgent → directives 2-5 via héritage helper ; (b) agents non-BaseAgent → 5 directives verbatim ; (c) flux maintenance DB → hors scope ou à requalifier."
      - "Audit explicite agent par agent de la présence de la directive 1 (la seule non centralisée)."
      - "Publier le résultat comme `coverage_snapshot_<date>.md` plutôt que comme un chiffre flottant."

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # LIMITES DOCTRINALES
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  doctrinal_limits:
    - "Les 5 directives DEMANDENT au LLM de changer son comportement (plus de prudence, plus d'abstention, plus de structuration). Elles ne garantissent NI la vérité des affirmations restantes, NI la détection systématique des erreurs, NI l'application réelle des directives par le LLM."
    - "L'efficacité dépend du modèle (HAIKU vs SONNET vs autre), du contexte injecté, et de l'application réelle du LLM — qui peut ignorer partiellement les directives selon la longueur du prompt et la nature de la requête."
    - "La directive 3 (Citation Demand) DEMANDE au LLM de citer une source vérifiable. Elle ne valide PAS la source citée : le LLM peut citer une source inexistante (hallucination de citation), ou mal interpréter une source réelle. Le contrôle de provenance reste à charge des couches downstream (Evidence Engine, cross-référencement)."
    - "La directive 4 (Self-Audit) DEMANDE au LLM de produire un confidence HIGH/MEDIUM/LOW sur sa propre réponse. C'est une auto-évaluation LLM, pas une mesure objective de fiabilité. À ne JAMAIS exposer comme axe produit public (cf. § 8 rule sur Confiance + confidence_self_audit_clarification ci-dessous)."
    - "La directive 5 (Structured Uncertainty) DEMANDE au LLM de catégoriser ses propres affirmations en CONFIDENT/PROBABLE/SPECULATIVE. Même remarque : auto-évaluation LLM, pas mesure objective. La catégorisation n'est pas parsée uniformément par le code downstream."
    - "Le marquage [UNCERTAIN] et [UNVERIFIED] dépend de l'auto-détection du LLM — un LLM qui ne reconnaît pas son incertitude ne marque pas."
    - "Les directives ne couvrent PAS les hallucinations de sources (Citation Demand peut produire une citation hallucinée), ni les biais de framing (le LLM suit la formulation du dossier sans la questionner), ni les angles morts du training set."
    - "Couverture inégale entre directives (cf. coverage_audit) ET entre fichiers (cf. gaps_known). Le coverage_claim_to_audit doit être recompté avant tout usage public."

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # CONFIDENCE SELF-AUDIT — JAMAIS AXE PRODUIT
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  confidence_self_audit_clarification:
    note: >
      La directive 4 (Self-Audit) DEMANDE au LLM de produire un
      confidence HIGH/MEDIUM/LOW sur sa propre réponse — texte injecté
      dans le prompt, pas une métrique parsée et utilisée comme signal
      runtime structuré.
    critical_distinction: >
      Le confidence HIGH/MEDIUM/LOW issu de la directive 4 N'EST PAS le
      même champ que les confidence numériques utilisés ailleurs :
      - § 11 reflexion_engine.triggering utilise
        ScoredFinding.confidence.score (numérique 0-100, propre à
        chaque agent) — PAS le self-audit HIGH/MEDIUM/LOW de la
        directive 4.
      - § 11 consensus_engine.confidence_note distingue
        ContradictionClaim.confidence (de ScoredFinding) et les
        confidence Zod-validées des sorties LLM (DebaterResponse,
        ArbitratorResponse).
      - § 9 confidence_field_status pointe le champ `confidence` des
        events Board AI (member_analysis_completed, member_voted) —
        encore un autre champ.
      - § 10 confidence_surfaces_to_audit liste plusieurs surfaces
        confidence dans Live Coaching (classification numérique vs
        directives anti-hallucination self-audit vs UI).
      Ces champs cohabitent mais ne sont pas interchangeables. Le
      self-audit de la directive 4 produit un texte LLM, pas un
      signal runtime fiable.
    rule_alignment:
      - "Cohérent avec § 8 rule sur Confiance : 'Confiance' jamais axe produit, le mot `confidence` peut exister comme champ technique interne."
      - "Cohérent avec § 9 limits (convergence ≠ justesse) et confidence_field_status."
      - "Cohérent avec § 10 confidence_surfaces_to_audit (séparation classification numérique vs anti-hallucination directives)."
      - "Cohérent avec § 11 confidence_note (Consensus + Reflexion)."
    debt_link: >
      Toute surface UI/PDF/chat/com publique qui exposerait directement
      le résultat de la directive 4 (auto-évaluation HIGH/MEDIUM/LOW)
      enfreindrait la doctrine § 8. À auditer dans
      § 10 confidence_surfaces_to_audit + § 9 confidence_field_status.

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # COHABITATION AVEC DETTE PROMPT
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  prompt_debt_cohabitation:
    note: >
      Les 5 directives sont déployées dans des prompts qui contiennent
      encore d'autres dettes doctrinales (vocabulaire BA, Big4,
      Partner VC, formulations prescriptives, terminologie 'winner',
      etc.). Les directives réduisent certaines hallucinations, mais
      elles N'EFFACENT PAS la dette de wording prescriptif autour
      d'elles. Liste des surfaces où directives anti-hallucination
      cohabitent avec dette prompt à auditer.
    surfaces:
      orchestration:
        - "src/agents/orchestration/reflexion.ts — 5 directives + 'Senior Reviewer Big4' + 'Business Angel decision de 50-200K€' + champs schémas impactOnBA / readyForBA / baNotice (cf. § 11 prompt_surfaces_to_audit)."
        - "src/agents/orchestration/consensus-engine.ts — 5 directives + 'President du Comite d'Investissement' + 'Business Angel va investir 50-200K€' + 'Tranche rapidement' + terminologie 'winner' + champ baGuidance (cf. § 11 prompt_surfaces_to_audit)."
      board:
        - "src/agents/board/board-member.ts — 5 directives + 'comité de 4 modèles IA' + champ schéma recommendations + directive 'Termine chaque recommandation par...à vous de décider' + 'verdict définitif' (cf. § 9 board_prompt_surfaces_to_audit)."
      live_coaching:
        - "src/lib/live/coaching-engine.ts — 5 directives + system prompt cards (descriptions card_types, vocabulaire 'cards', 'claims', 'utterances') (cf. § 10 prompt_surfaces_to_audit)."
        - "src/lib/live/visual-processor.ts — 5 directives + mentions 'BA', 'question incisive', newInsights (cf. § 10)."
        - "src/lib/live/post-call-generator.ts — 5 directives + actionItems avec owner: ba, mention 'Actions à suivre', directive confidenceDelta (cf. § 10)."
        - "src/lib/live/post-call-reanalyzer.ts — 5 directives + directive confidenceChange (cf. § 10)."
        - "src/lib/live/transcript-condenser.ts — 5 directives + catégories keyFacts, rendering '### Confiance', confidenceDelta direction/reason (cf. § 10)."
      tier_2_sector_experts:
        - "Lentilles sectorielles Tier 2 — beaucoup N'ÉTENDENT PAS BaseAgent et assemblent les directives manuellement. Les fichiers contiennent encore 'Big4', 'Partner VC', 'BA', 'angel investor' selon les secteurs. À auditer fichier par fichier sur src/agents/tier2/ (saas-expert, fintech-expert, healthtech-expert, etc.)."
      tier_1_3_base_agent:
        - "Agents Tier 1 et Tier 3 qui étendent BaseAgent — directives 2-5 héritées via buildFullSystemPrompt() ; directive 1 manuelle dans buildSystemPrompt(). Dette doctrinale variable par fichier (cf. § 7 + § 9 + § 11 listes spécifiques)."
    consequence: >
      La présence des 5 directives anti-hallucination dans un fichier
      N'EXEMPTE PAS ce fichier d'audit doctrinal sur le reste de son
      prompt. Le chantier de purge des vestiges oraculaires couche 3
      (cf. § 6 in_progress) est à mener en synchronie avec les
      prompt_surfaces_to_audit de §§ 9, 10, 11.

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # DETTE D'IMPLÉMENTATION
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  implementation_debt:
    note: >
      Dette tracée pour aligner code et doctrine sur l'anti-hallucination.
    items:
      - "Coverage claim '60+ fichiers' à recompter rigoureusement (méthodologie ci-dessus). Le grep actuel donne 60 fichiers avec en-tête 'Anti-Hallucination Directive' et 59 avec directive 1 verbatim — claim 60+ proche mais non validé publiquement."
      - "Couverture inégale directive 1 (~59) vs directives 4/5 (~35) : à comprendre (BaseAgent inheritance vs verbatim) et à documenter explicitement."
      - "Directive 1 non centralisée dans BaseAgent : à auditer agent par agent. Au moins 3 agents d'analyse identifiés sans directive 1 (thesis-extractor, thesis-reconciler, rebuttal-judge) — à corriger ou à exclure explicitement du scope."
      - "Agents Live Coaching utterance-router et auto-dismiss : pas de directives anti-hallucination. À évaluer si requis (prompts courts de classification / dismiss) ou à ajouter."
      - "Catégorie *Negotiation* mentionnée dans le YAML originel comme couverte : pas évidente dans le code. À retirer ou à sourcer."
      - "Flux maintenance DB (src/agents/maintenance/db-completer/llm-extract.ts, src/agents/maintenance/db-sourcer/llm-parser.ts) : appels OpenRouter directs sans directives. À documenter comme hors scope agents d'analyse, ou à inclure si la fiabilité de ces flux importe."
      - "Directives 4 et 5 produisent des champs confidence/uncertainty auto-attribués LLM. À ne JAMAIS exposer comme axe produit public (cf. § 8 + § 10 confidence_surfaces_to_audit)."
      - "Marquage [UNCERTAIN] et [UNVERIFIED] : auditer si ces marqueurs apparaissent dans les sorties brutes restituées à l'utilisateur (PDF, UI). Si oui : requalifier en surfaces sourcées, pas laisser brut."
      - "Confusion confidence self-audit (directive 4) vs confidence numérique runtime (ScoredFinding.confidence.score, DebaterResponse.confidenceLevel, ArbitratorResponse.finalValue.confidence, classification utterance-router) : ces champs sont distincts et cohabitent. Le YAML originel et certains supports pouvaient laisser croire qu'ils étaient un seul signal — à clarifier en tout texte interne."
      - "Cohabitation prompts : les directives ne suffisent pas. Le chantier purge couche 3 + prompts §§ 9/10/11 reste à mener."

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # RÉFÉRENCES DOCTRINE
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  doctrine_references:
    used_by:
      - "§ 20 current_control_surfaces.prompt_discipline (5 directives anti-hallucination listées comme garde-fou)."
      - "§ 11 reflexion_engine.critique_guidance + confidence_note (directives appliquées dans Reflexion ; rappel : Reflexion utilise ScoredFinding.confidence.score, PAS le self-audit HIGH/MEDIUM/LOW de la directive 4)."
      - "§ 9 confidence_field_status (directives appliquées dans Board AI ; confidence émise par chaque modèle dans des events distincts)."
      - "§ 10 confidence_surfaces_to_audit (directives appliquées dans Live Coaching ; confidence partout, plusieurs champs distincts)."
    consistent_with:
      - "§ 8 rule sur Confiance — directives 4/5 produisent confidence/uncertainty auto-attribués, jamais axe produit."
      - "§ 9 limits (convergence ≠ justesse)."
      - "§ 20 claims_policy — claim '5 directives × 60+ fichiers' à recompter avant usage public."
    cross_section_updates_applied:
      - "§ 20.references_status.sections_to_realign_before_public_reuse : § 19 retiré après écriture du présent bloc."
      - "§ 20.implementation_debt.surfaces : ligne § 19 retirée après écriture du présent bloc."


# ============================================================
# 20. MOAT & DIFFÉRENCIATION
# ============================================================
# Aligné sur la doctrine du pivot 2026-05-20 (cf. § 3 + § 4 + § 5 + § 6 + § 7
# + § 8 + § 9 + § 10 + docs-doctrine/angeldesk-strategic-pivot.md).
# Refonte complète des claims de défensibilité.
# Bannis : sublimation, surhumain, seul, imbattable, monstrueux, obscène,
# infalsifiable, intelligence collective émergente, wisdom of crowds prouvé,
# étoiles dans les yeux, PILIER CENTRAL du messaging, ça va être faux,
# requirement réglementaire IR-PME/EIS sans base, ROI obscène.
# Tout ce qui dépend de volume / outcomes futurs est en future_moats_to_build.
# Tout claim chiffré non sourcé est listé en claims_policy.
moat:
  positioning_rule: >
    Pas de moat « définitif ». La défensibilité est décrite en trois
    catégories : (1) current_defensibility_state — surfaces de garde-fou
    livrées ; (2) durable_differentiators — différenciateurs avec friction
    de réplication ; (3) future_moats_to_build — hypothèses qui dépendent
    de volume, d'outcomes ou d'instrumentation pas encore en production.
    Les claims chiffrés sont audités séparément (claims_policy).

  references_status:
    note: >
      § 20 s'appuyait sur des références techniques documentées dans
      § 11 (Engines — Consensus Engine + Reflexion Engine) et § 19
      (5 directives anti-hallucination — détail). Les deux sections
      sont désormais alignées (cf. cascade). Aucune dépendance non
      alignée restante pour § 20.
    sections_to_realign_before_public_reuse: []

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # 1. ÉTAT ACTUEL DE LA DÉFENSIBILITÉ
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  current_defensibility_state:
    primary_differentiator: >
      Discipline cumulative d'orchestration, de sourcing, de garde-fous et
      d'auditabilité. Certaines étapes sont déterministes (agrégation de
      score, calculs par formule) ; d'autres sont tracées et partiellement
      encadrées (classification de fiabilité, recoupement documentaire,
      qui combinent sorties LLM et validations programmatiques) ; les
      sorties LLM elles-mêmes restent probabilistes. La promesse n'est
      pas « intelligence fiable » comme absolu ; c'est « processus de
      décision plus robuste, moins d'angles morts, plus de traçabilité »
      (cf. doctrine § 3 vision + § 6 product_discipline).
    current_control_surfaces:
      note: >
        Surfaces livrées qui font la différence par rapport à un usage DIY
        d'une IA générique. Décrites comme garde-fous opérationnels, pas
        comme promesses absolues.
      surfaces:
        - id: prompt_discipline
          what: "5 directives anti-hallucination déployées dans les prompts agents concernés."
          coverage_claim_to_audit: "Couverture étendue annoncée à environ 60+ fichiers ; chiffre à vérifier rigoureusement avant tout usage public."
          status: "Livré au sens runtime (les directives sont en place dans les prompts concernés ; cf. § 19 pour le détail technique)."
          limitation: >
            Les 5 directives elles-mêmes se limitent aux instructions
            anti-hallucination et au self-audit confidence (cf. § 19). La
            dette doctrinale restante (champ recommendations, owner: ba,
            formulations prescriptives) ne réside PAS dans les directives
            mais dans les schémas et prompts qui les entourent
            (cf. § 8 + § 9 + § 10 prompt_surfaces_to_audit).
        - id: evidence_first_layer
          what: >
            Couche evidence-first (nom interne Evidence Engine) : classification
            de fiabilité des données en 6 niveaux (AUDITED → UNVERIFIABLE),
            détection temporelle, discipline de sourcing sur les affirmations
            factuelles critiques, contradictions inter-documents.
          status: "Livré (cf. § 6 current_capabilities.document_evidence_layer)."
          limitation: "La discipline de sourcing s'applique aux affirmations factuelles critiques. Les sorties d'analyse subjectives (interprétations, ressentis qualitatifs) restent à apprécier par l'investisseur."
        - id: deterministic_scoring
          what: "Agrégation déterministe des sous-scores et signaux disponibles, par formule TypeScript ; certains inputs peuvent provenir de sorties LLM (cf. limitation)."
          status: "Livré au sens agrégation (cf. § 8 current_scoring_state)."
          limitation: >
            La formule d'agrégation est déterministe sur ses inputs ; les
            sous-scores eux-mêmes peuvent provenir de sorties LLM
            probabilistes. La reproductibilité bout-en-bout (mêmes
            documents → mêmes sous-scores → même score) reste à tester
            explicitement. Passage 2 axes orientation × solidité des
            preuves en chantier (cf. § 8 target_scoring_model + § 6 in_progress).
        - id: layered_orchestration
          what: "Architecture en 4 couches (extraction / analyses transverses / lentilles sectorielles / synthèse et challenge), avec orchestration séquentielle/parallèle selon les phases."
          status: "Livré (cf. § 6 + § 7)."
          counting_note: "Le total 44 agents est une convention d'architecture interne (cf. § 7 tier0.counting_note + claims_policy ci-dessous) — pas une promesse publique."
        - id: confrontation_mechanisms
          what: >
            Mécanismes de confrontation, relecture et stress-test des
            analyses : débat multi-modèle (nom interne Board AI),
            résolution structurée des contradictions inter-agents par
            Consensus Engine, auto-critique itérative par Reflexion Engine,
            mise à l'épreuve de la thèse positive par Devil's Advocate
            (agent couche 3).
          status: >
            Livré au sens code/orchestration. Doctrine séparée par surface :
            Board AI couvert par § 9 (aligné) ; Consensus Engine et
            Reflexion Engine relèvent de § 11 (Engines, aligné) ;
            Devil's Advocate couvert par § 7 (tier3 standalone_agents).
          limits: >
            Convergence ≠ justesse (cf. § 9 limits). Désaccords = signaux
            à examiner, pas preuve de vérité émergente. Sanitization
            narrative partielle (cf. § 9 narrative_sanitization +
            § 10 narrative_sanitization_status).
        - id: realtime_evidence_check
          what: >
            Vérification des preuves en temps réel pendant l'appel
            fondateur (nom interne Live Coaching) : confrontation
            utterances / documents / benchmarks via DealContext compilé,
            lorsque le contexte pré-call est disponible.
          status: "Livré (cf. § 10)."
          limits: >
            La disponibilité du contexte pré-call varie selon le chemin
            d'exécution (cf. § 10 runtime_context_paths) : audio webhook
            permissif, reanalysis hard-gate. Dette confidence partout
            (cf. § 10 confidence_surfaces_to_audit).

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # 2. DIFFÉRENCIATEURS DURABLES
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  durable_differentiators:
    note: >
      Ce qui rend l'ensemble difficile à répliquer même avec accès aux mêmes
      modèles LLM. Pas de claim de moat permanent ; identification de la
      friction de réplication.
    differentiators:
      - id: orchestration_discipline
        thesis: >
          Tout le monde peut interroger une IA générique. La difficulté est
          de coordonner provenance exigée pour les affirmations factuelles
          critiques, recoupement documentaire structuré lorsque les données
          le permettent, 5 directives anti-hallucination dans les prompts
          concernés, agrégation déterministe des sous-scores et mémoire de
          dossier sur plusieurs versions. La valeur ne vient pas d'un
          modèle unique qui aurait raison ; elle vient de cette discipline
          cumulative (cf. § 6 product_discipline).
        replication_friction: >
          Réplicable composant par composant ; la difficulté est la
          cohérence inter-composants et la mise à jour synchronisée du
          stack quand un modèle ou un prompt change.
      - id: sector_lenses
        thesis: >
          22 lentilles sectorielles configurées au runtime (cf. § 7 tier2 +
          § 6 sector_layer), dont 21 lentilles spécialisées (SaaS,
          fintech, healthtech, deeptech, climate, hardware, gaming,
          consumer, blockchain, biotech, edtech, proptech, mobility,
          foodtech, hrtech, legaltech, cybersecurity, spacetech, creator,
          marketplace, ai) et 1 fallback (general-expert) activé pour les
          secteurs non couverts. Chaque dossier obtient une lentille
          spécialisée lorsque le secteur est couvert, sinon un fallback
          général structuré.
        limit: "Qualité variable selon le secteur ; couverture des benchmarks dépend des sources et de la maintenance. Le fallback general-expert ne reproduit pas la profondeur des lentilles spécialisées."
      - id: layered_evidence_pipeline
        thesis: >
          Le pipeline en 4 couches couple production d'analyse et garde-fous
          evidence-first : certaines contradictions sont détectées et
          remontées selon les surfaces disponibles, questions ouvertes
          persistant d'une version à l'autre du dossier, sorties
          structurées tracées lorsque la surface le permet.
        replication_friction: >
          Une copie superficielle (UI similaire, prompts plagiés) reste
          possible mais ne reproduit pas la cohérence inter-couches ni la
          discipline d'evidence.

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # 3. MOATS À CONSTRUIRE (FUTURS / HYPOTHÈSES)
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  future_moats_to_build:
    note: >
      Aucun n'est un moat démontré aujourd'hui ; certains reposent sur des
      briques partiellement livrées. Tous dépendent de volume, d'outcomes
      ou d'instrumentation qui n'existe pas encore au niveau requis pour
      constituer une défensibilité durable.
    hypotheses:
      - id: funding_database_volume
        hypothesis: >
          Plus la Funding Database est dense (cible 5,000+ deals, en
          construction), plus les benchmarks de valorisation, percentiles
          et patterns de signaux d'alerte deviennent informatifs sur un
          nouveau dossier.
        status: "En construction. Code : src/services/funding-db (querySimilarDeals, getValuationBenchmarks). Injections dans Tier 1 et Tier 3 lorsque comparables disponibles (cf. § 7)."
        unverified_claims: >
          Les affirmations « percentiles fiables à 5k », « imbattables à
          50k » ne sont pas étayées par une méthodologie d'évaluation. À
          retirer du langage public tant qu'aucune méthodologie n'est en
          place (cf. § 4 et § 8 claims `lorsque disponible`).
      - id: track_record_outcomes
        hypothesis: >
          Si Angel Desk instrumente les outcomes (succès / échec / pivot
          des dossiers analysés) sur plusieurs années, un dashboard de
          précision (signaux d'alerte / score vs outcome réel) deviendrait
          un actif difficile à répliquer.
        status: "Pas implémenté. Pas de système d'outcomes instrumenté en production aujourd'hui."
        prerequisites:
          - "Collecte des outcomes par dossier (manuelle ou via intégrations) avec consentement utilisateur."
          - "Méthodologie d'évaluation de la précision (faux positifs / négatifs ; corrélation score / outcome) définie et auditable."
          - "Au moins 2-3 ans de volume représentatif."
        banned_claims: >
          Pas de chiffres comme « précision red flags 87% » ou
          « corrélation score/outcome 0.82 » tant que rien n'est mesuré.
          Le mot « infalsifiable » est banni — un track record reste
          contestable (biais de survie, contexte marché, sélection).
      - id: cross_deal_intelligence
        hypothesis: >
          Une base de comparaison personnelle (dossiers analysés par un
          même investisseur, avec ses scores, ses questions, ses signaux
          résolus) pourrait constituer un actif de rétention.
        status: "Briques présentes (contexte, evidence signals, Funding DB, analyses persistées) mais système de mémoire comparative personnelle mature pas encore livré."
        banned_claims: >
          Pas de « switching cost naturel » ni « argument de rétention
          monstrueux ». Tant que la mémoire comparative n'est pas un
          produit utilisable côté investisseur, c'est un potentiel, pas
          un moat.
      - id: living_dossier
        hypothesis: >
          La trace analytique évoluant avec les réponses des fondateurs
          et le coaching en direct (V1 deck → V2 → V3 post-call ; cf. § 6
          workflow_layer + § 10) peut créer une valeur que les rapports
          one-shot ne fournissent pas.
        status: >
          Partiellement livré via analyses persistées, post-call,
          reanalysis (modes delta / targeted / full — cf. § 10) et suivi
          des signaux d'alerte résolus. Maturité produit (intégration UX,
          continuité de la mémoire entre dossiers) à vérifier sur la
          durée avant de revendiquer comme moat.

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # 4. NON-MOATS ET RISQUES
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  non_moats_and_risks:
    note: >
      Liste explicite des éléments qui ne sont PAS des moats mais qui ont
      pu être présentés comme tels.
    items:
      - claim: "Nombre d'agents (44)"
        rationale: >
          Compteur d'architecture interne, pas barrière à l'entrée. Un
          concurrent peut produire un compteur similaire sans pour autant
          répliquer la discipline d'orchestration (cf. claims_policy).
      - claim: "5 directives anti-hallucination × 60+ fichiers"
        rationale: >
          Garde-fou réel (cf. current_control_surfaces.prompt_discipline)
          mais imparfait, et chiffre de couverture à auditer. Pas une
          preuve de fiabilité absolue.
      - claim: "Sublimation / wisdom of crowds prouvé"
        rationale: >
          Banni. Le débat multi-modèle est un mécanisme de confrontation
          utile, pas une démonstration mathématique de vérité émergente
          (cf. § 9 limits). Aucun théorème n'est appliqué ici.
      - claim: "Aucun analyste humain expert en 22 secteurs / breadth surhumaine"
        rationale: >
          Banni. Sonne remplacement humain. Reformulé doctrinalement :
          chaque dossier avec la lentille sectorielle dédiée, sans forcer
          une grille généraliste (cf. doctrine § 7 Reframes). De plus, 21
          lentilles spécialisées + 1 fallback (general-expert) — pas 22
          secteurs spécialisés stricts.
      - claim: "Track record 87% / corrélation 0.82"
        rationale: "Chiffres inventés sans système d'outcomes instrumenté. Bannis (cf. future_moats_to_build.track_record_outcomes)."
      - claim: "Funding DB percentiles fiables à 5k / imbattables à 50k"
        rationale: >
          Hypothèse de volume. Aucune méthodologie de validation. À éviter
          en doctrine produit.
      - claim: "Switching cost naturel après 50 deals"
        rationale: >
          Pas démontré. Les analyses persistées et la mémoire pipeline
          existent (cf. § 6 workflow_layer) ; cela ne constitue pas
          automatiquement un switching cost mesurable.
      - claim: "Angel Desk mène la discussion / partenaire qui réagit, rebondit, accompagne"
        rationale: >
          Banni. La vérification des preuves en temps réel
          (cf. § 10 public_description) n'est pas un partenaire qui
          « mène » la discussion. L'investisseur conduit.
      - claim: "ROI obscène / 80% du travail / 15-60x moins cher"
        rationale: >
          Hypothèses commerciales non sourcées doctrinalement. À sourcer
          ailleurs (§ 21 pricing / business model) si défendues, pas dans
          la doctrine moat.

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # 5. RÈGLES DE POSITIONNEMENT CONCURRENTIEL
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  competitive_positioning_rules:
    note: >
      Comparaisons sobres avec les concurrents identifiés en § 4
      existing_solutions. Pas de caricature.
    public_positioning_axes:
      - "Intégration workflow (extraction documents → analyse → appel fondateur → mémo → suivi → ré-analyse)."
      - "Discipline de sourcing et provenance sur les affirmations factuelles critiques."
      - "Historisation, traçabilité et auditabilité des analyses."
      - "Orchestration multi-couches avec garde-fous evidence-first."
      - "Lentilles sectorielles activables contextuellement."
      - "Vérification des preuves en temps réel pendant l'appel."
    not_competitive_with:
      - "Sourcing pré-transactionnel (Harmonic.ai, Crunchbase) — Angel Desk intervient après réception des documents."
      - "Cap table management opérationnel (Carta) — fonctionnalité orthogonale."
    sober_comparisons:
      pitchbook: "Plateforme data/sourcing institutionnelle ; orientée recherche marché et financements connus."
      crunchbase: "Annuaire / sourcing pré-transaction ; orienté découverte d'entreprises et signaux marché."
      hebbia: "Ingestion documents et extraction massives ; pricing institutionnel, sans accompagnement temps réel ni workflow d'investissement privé."
      alphasense_tegus: "Intelligence marché asynchrone et macro-analytique, pricing institutionnel."
      diy_chatgpt_claude: "Analyse ponctuelle et conversationnelle selon les prompts et documents fournis. Nativement, pas de gouvernance d'équipe, traçabilité structurée, reproductibilité, mémoire pipeline ou contradictions inter-documents systématiques."
    banned_framings:
      - "Nous profond / eux faux."
      - "Aucun concurrent ne fait X / nous le seul."
      - "Imbattable / monstrueux / obscène / surhumain."
      - "BA + ChatGPT = zéro."
      - "Non seulement ça ne sera pas aussi profond, mais en plus ça va être faux."

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # 6. POLITIQUE DES CLAIMS CHIFFRÉS
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  claims_policy:
    note: >
      Tout chiffre cité doit être sourcé (référence code, document ou étude
      datée) ou requalifié comme hypothèse non encore mesurée.
    audit:
      - claim: "44 agents en 4 tiers"
        status: >
          Convention §7 : 3 counted_architecture_agents + 13 Tier 1 +
          22 Tier 2 + 6 Tier 3 standalone = 44. thesis-reconciler
          conditionnel en full_analysis, hors total 44. Convention interne,
          pas promesse publique.
      - claim: "22 lentilles sectorielles"
        status: >
          21 lentilles spécialisées + 1 fallback (general-expert) activé
          pour les secteurs non couverts. Préciser systématiquement la
          composition lorsque le chiffre 22 est cité.
      - claim: "5 directives × 60+ fichiers"
        status: >
          Les 5 directives sont déployées (cf. § 19). Le chiffre
          `60+ fichiers` est un claim de couverture annoncé, à auditer
          rigoureusement avant tout usage public.
      - claim: "5,000 deals (Funding Database)"
        status: "Cible. En construction. Toute mention publique doit dire `lorsque disponible / en construction` (cf. § 4 + § 8)."
      - claim: "50,000 deals (percentiles imbattables)"
        status: "Hypothèse de scale long terme. Pas de date. Banni des supports publics."
      - claim: "87% précision red flags / 0.82 corrélation score/outcome"
        status: "Chiffres inventés. Aucun système d'outcomes instrumenté. Bannis (cf. future_moats_to_build.track_record_outcomes)."
      - claim: "15-60x moins cher / 80% du travail d'un analyste"
        status: "Argument économique non sourcé doctrinalement. À sortir de la doctrine moat et à sourcer en § 21 (pricing / business model) si défendu."
      - claim: "DD VC en 1h"
        status: "Banni (cf. doctrine § 5 interdits)."

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # 7. DETTE D'IMPLÉMENTATION / DOCUMENTATION
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  implementation_debt:
    note: >
      Surfaces qui contiennent encore du langage de moat oraculaire ou des
      claims non sourcés, à reprendre dans la cascade après § 20.
    surfaces:
      - "docs-private/product-overview.md — claims `sublimation`, `surhumain`, `seul à couvrir` à reprendre."
      - "docs-private/exec-summary.md — claims moat à reprendre."
      - "docs-private/pitch-deck.md + pitch-deck-slides.md — narratif sublimation, breadth surhumaine, 87%, ROI obscène à reprendre."
      - "Pages publiques (landing, pricing, blog) — claims marketing à reprendre APRÈS fermeture du gate de release actif (cf. doctrine § 8 séparation langage doctrine/public)."
      - "Prompts agents : purge finale des vestiges oraculaires couche 3 (cf. § 6 in_progress + § 9 + § 10)."

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # 8. RÉPONSE À LA QUESTION « ET SI L'IA SE TROMPE ? »
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  ai_error_response:
    public_answer: >
      L'erreur d'un modèle n'est pas niée. Le système vise à rendre les
      incertitudes, les désaccords et les absences de source visibles :
      provenance exigée pour les affirmations factuelles critiques,
      contradictions détectées exposées plutôt que résolues silencieusement,
      désaccords entre
      modèles documentés (cf. § 9 board AI debate), classification de
      fiabilité des données (cf. § 8 solidity_inputs). Cela ne garantit
      pas que toute erreur sera détectée. La décision finale reste à
      l'investisseur.
    not_a_claim:
      - "Le débat multi-modèle expose des désaccords mais ne garantit pas la détection d'une erreur. Convergence ≠ justesse (cf. § 9 limits)."
      - "La cross-validation et le sourcing exigé réduisent les hallucinations sur les chiffres mais ne garantissent pas la pertinence du jugement final."
      - "Les scores de confiance interne ne sont jamais affichés comme axe produit (cf. § 8 rule sur Confiance). Ce qui est exposé : sources, contradictions, zones d'incertitude."

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # 9. AUDITABILITÉ — POSITIONNEMENT NON-JURIDIQUE
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  auditability_positioning:
    public_value: >
      Objectif produit : rattacher les affirmations factuelles critiques à
      leur source, leur date disponible (ou l'absence de date explicitée),
      leur fiabilité ; exposer les contradictions ; matérialiser les zones
      d'incertitude ; tracer la fraîcheur des documents. Les sorties
      structurées (signaux d'alerte, scoring, contradictions, questions
      ouvertes) sont auditables quand disponibles. Utile pour revue
      interne, club deal, comité d'investissement ou reporting LP.
    not_a_legal_claim: >
      Aucun claim de conformité à un régime réglementaire spécifique
      (IR-PME, EIS, autre) sans base juridique. Aucun positionnement comme
      « système d'audit officiel » des décisions d'investissement.


# ============================================================
# 21. PRICING & BUSINESS MODEL
# ============================================================
# Aligné sur la doctrine du pivot 2026-05-20 (cf. §3 + §4 segments (source
# autoritaire pricing) + §20 claims_policy + §26 banned_phrasings_table +
# availability_language_rule + §27 primary_strategic_persona.pricing_band +
# §28 pricing_section_alignment_status + banned_in_gtm + §29 unit
# economics + §32 + docs-doctrine).
# §21 transforme la section en MATRICE D'AUDIT pour les claims pricing /
# Stripe / packs / unit economics / feature access / refund. §21 NE
# GARANTIT pas la conformité pricing ; §21 documente ce qu'il faut
# auditer et interdit les claims non prouvés.
# Bannis dans §21 : "5-10x moins cher", "fait PLUS", "Deep Dive offert"
# en accroche publique, "moment de conversion limpide", "freeloaders",
# "BA voit", chiffres concurrents non sourcés.
pricing:
  positioning_rule: >
    §21 décrit le modèle pricing RUNTIME (mécanique crédits, packs,
    règles d'expiration, marges estimées) sous forme de MATRICE
    D'AUDIT. §21 N'EST PAS un document de copy commerciale. Aucun
    claim §21 n'est autorisé en surface publique sans audit
    + alignement §4 + §28 banned_in_gtm + §32. La page pricing
    user-facing actuelle (cf. existing_pricing_surfaces_to_audit) reste
    à reprendre en passe code pricing dédiée.

  alignment_with_section_4_segments:
    note: >
      §4 segments est la SOURCE AUTORITAIRE des bandes pricing
      publiques par segment cible. §21 doit s'aligner sur §4.
    section_4_pricing_bands:
      - "BA très actifs / chefs de syndicat solos : ~200-500€ par dossier"
      - "Angel clubs / syndicats structurés (5-10 membres) : ~500-1,500€ par dossier"
      - "Micro-fonds VC pre-seed/seed : ~2,000-5,000€/mois"
    audit_required: >
      Vérifier que les packs §21 (Starter 49€ → Fund 749€) sont
      cohérents avec les bandes §4 segment par segment.

  runtime_pricing_source_of_truth:
    note: >
      Source code AUTORITAIRE actuelle pour le pricing runtime. §21
      doctrine doit s'aligner sur ces exports.
    primary_source: "src/services/credits/types.ts:22"
    exports:
      - "CREDIT_COSTS — coûts crédits par action"
      - "CREDIT_PACKS — packs runtime (Starter / Standard / Pro / Expert / Fund). Institutional est UI hardcoded, PAS CREDIT_PACKS runtime."
      - "FREE_TIER — runtime ACTIF (initialCredits = 5)"
      - "CREDIT_RULES — expiration, rollover, auto-refill"
      - "FEATURE_ACCESS — accès aux features par totalPurchased lifetime"
      - "FULL_DEAL_PACKAGE_CREDITS — coût package full deal"
    audit_required:
      - "Toute modification doctrinale §21 doit être vérifiée vs ces exports."
      - "Toute modification code de ces exports doit être propagée en §21 dans la même PR."

  billing_integration_status:
    note: >
      Statut RÉEL de l'intégration de facturation. Pas de checkout
      Stripe actif à date.
    current_state:
      stripe_models_present: >
        Champs Stripe PARTIELS dans le schéma Prisma : stripePriceId,
        stripeRefillPriceId, stripePaymentId. AUCUN stripeCustomerId,
        AUCUN customer lifecycle Stripe trouvé dans le code.
      stripe_checkout_active: false
      purchase_flow_actual: >
        La modale d'achat de crédits redirige vers mailto: pour
        contact commercial manuel (cf.
        src/components/credits/credit-purchase-modal.tsx:101).
        Aucun checkout Stripe automatisé ni customer Stripe géré.
    implication_for_pricing_copy: >
      Tant que le checkout Stripe n'est pas actif, AUCUN claim
      "achat immédiat" / "checkout instantané" / "automatique" n'est
      autorisé en surface publique. Le flow réel = affichage des
      packs → contact commercial via mailto:.
    audit_required:
      - "Si Stripe checkout devient prioritaire : créer stripeCustomerId + customer lifecycle."
      - "Si flow contact commercial reste assumé : nettoyer les champs Stripe partiels non utilisés."
      - "Cohérence copy publique (pricing-content.tsx) avec le flow réel (mailto:)."

  credit_pack_dual_source_to_audit:
    note: >
      Le pricing crédits a DEUX sources qui peuvent diverger.
    source_1_code: "src/services/credits/types.ts:48 — CREDIT_PACKS constante TypeScript (runtime applicatif + copy UI)."
    source_2_db: "Table Prisma CreditPack — utilisée notamment par l'admin analytics pour estimer le revenu (src/app/(dashboard)/admin/analytics/page.tsx:77 — prisma.creditPack.findMany())."
    drift_risk: >
      Si les valeurs TS et DB divergent, le runtime utilisateur
      affiche un prix ≠ celui utilisé pour l'analyse revenu.
      Conséquence : analytics revenue faussé.
    audit_required:
      - "Vérifier la cohérence CREDIT_PACKS TS ↔ CreditPack DB."
      - "Décider source unique OU mécanisme de sync versionné."
      - "Auditer admin analytics (cf. admin_revenue_estimate_to_audit)."

  price_unit_policy_to_audit:
    note: >
      AMBIGUÏTÉ CRITIQUE sur l'unité de priceEur dans CreditPack.
    schema_comment: "Prisma CreditPack.priceEur Int // 49, 99... (in cents: 4900... or EUR int)"
    risk: >
      Si certains chemins runtime lisent priceEur comme EUR entier
      (49 = 49€) et d'autres comme centimes (49 = 0.49€), erreurs
      par facteur 100 garanties (pricing affiché, analytics revenue,
      factures).
    audit_required:
      - "Décider unité unique (EUR entier OU centimes) et la documenter en commentaire schéma."
      - "Migrer les données si changement d'unité (script de migration + rollback)."
      - "Auditer tous les chemins de lecture priceEur."
      - "Convention recommandée : centimes (standard Stripe) — mais audit nécessaire avant changement."

  admin_revenue_estimate_to_audit:
    note: >
      L'admin analytics calcule un revenu estimé à partir de
      CreditPack.priceEur (DB) et CreditTransaction.packName.
    code_reference: "src/app/(dashboard)/admin/analytics/page.tsx:77"
    risk_propagation: >
      Vu l'ambiguïté price_unit_policy_to_audit, ce dashboard peut
      être faux par facteur 100.
    banned_until_audit: "Aucune communication interne ou publique des chiffres admin analytics revenue tant que price_unit_policy_to_audit n'est pas résolu."

  credit_based_hybrid_model:
    rationale_internal: >
      Ni SaaS pur (injuste pour les petits utilisateurs, pas de
      capture des coûts variables), ni pay-per-task pur (pas de
      MRR prédictible, plus dur à valoriser). Crédits avec packs =
      l'investisseur voit ce que chaque action coûte ; packs
      auto-refill = MRR de facto ; nouvelle feature = nouveau coût
      en crédits.
    persona_alignment: >
      Persona principal §27 = Pauline / équipes d'investissement
      légères. PAS Marie BA solo au centre. Wording v0
      *"le BA voit ce que chaque action coûte"* retiré.

  credits_per_action:
    note: >
      Source autoritaire : src/services/credits/types.ts CREDIT_COSTS
      (~ligne 28 et suivantes).
    actions:
      - {action: "Quick Scan (Tier 1 only)", credits: 1, deprecated_in_types: true, deprecation_note: "Marqué deprecated dans types.ts mais encore utilisé runtime via deal-limits (cf. legacy_usage_surfaces_to_audit)"}
      - {action: "Deep Dive (Tier 1+2+3)", credits: 5, cost_real_estimate_to_audit: "~2.30€"}
      - {action: "AI Board (4 LLMs en débat)", credits: 10, cost_real_estimate_to_audit: "~12€"}
      - {action: "Live Coaching (session 30 min)", credits: 8, cost_real_estimate_to_audit: "~7€"}
      - {action: "Re-analysis (données mises à jour)", credits: 3, cost_real_estimate_to_audit: "~2€"}
      - {action: "THESIS_REBUTTAL", credits: 1, runtime_source: "src/services/credits/types.ts:28"}
      - {action: "THESIS_REEXTRACT", credits: 1, runtime_source: "src/services/credits/types.ts:28"}
      - {action: "EXTRACTION_STANDARD_PAGE", credits_configured: 0, charged_runtime_today: true, note: "Coût configuré à 0 — pas d'incidence runtime", runtime_source: "src/services/credits/types.ts:30"}
      - {action: "EXTRACTION_HIGH_PAGE", credits_configured: 1, charged_runtime_today: false, reason: "CHARGE_DOCUMENT_EXTRACTION_CREDITS=false (cf. extraction_credit_policy)", runtime_source: "src/services/credits/types.ts:30"}
      - {action: "EXTRACTION_SUPREME_PAGE", credits_configured: 2, charged_runtime_today: false, reason: "CHARGE_DOCUMENT_EXTRACTION_CREDITS=false (cf. extraction_credit_policy)", runtime_source: "src/services/credits/types.ts:30"}
      - {action: "Chat IA", credits: 0, cost_real_estimate_to_audit: "~3-6 cts/msg (Sonnet) ou ~0.5 ct (Haiku)"}
      - {action: "Export PDF", credits: 0, cost_real_estimate_to_audit: "~0.01€"}
    full_deal_package: "Deep Dive (5) + Board (10) + Live (8) + Re-analysis (3) = 26 crédits (modèle indicatif)"
    in_app_label_note: >
      Les noms d'actions (Deep Dive, AI Board, Live Coaching, Quick
      Scan) sont des labels in-app legacy soumis à §26
      in_app_legacy_feature_names.decision_required.

  extraction_credit_policy:
    note: >
      EXTRACTION_HIGH_PAGE et EXTRACTION_SUPREME_PAGE ont des
      credits_configured > 0, mais leur facturation runtime dépend
      d'un feature flag.
    runtime_flag: "src/services/credits/feature-flags.ts:60 — CHARGE_DOCUMENT_EXTRACTION_CREDITS"
    current_value: false
    implication: >
      L'extraction de documents (haute / supreme) N'EST PAS facturée
      en crédits runtime aujourd'hui malgré la présence des
      CREDIT_COSTS configurés (1 et 2 respectivement).
    audit_required:
      - "Décision produit : activer la facturation extraction ou retirer les CREDIT_COSTS extraction du schéma."
      - "Toute copy publique mentionnant *coût d'extraction par page* est PRÉMATURÉE tant que le flag est désactivé."

  feature_access_policy:
    note: >
      Accès aux features (API, négociation, etc.) déterminé par
      totalPurchased LIFETIME, PAS par abonnement courant ni par
      pack actif.
    runtime_source: "src/services/credits/feature-access.ts:9 et :27"
    unlock_mechanism: "totalPurchased lifetime (cumul historique des achats)"
    implication: >
      Un utilisateur qui a acheté un pack Expert puis a laissé son
      abonnement expirer conserve l'accès aux features Expert
      (totalPurchased lifetime). Le vocabulaire §22 v0
      *"available_from: Pro / Expert"* est requalifié en seuils
      lifetime.
    audit_required:
      - "Décision produit : maintenir totalPurchased lifetime ou passer à un modèle abonnement actif ?"
      - "Cohérence §22 wording vs feature-access.ts logic."

  packs:
    runtime_packs:
      note: "Packs définis dans CREDIT_PACKS runtime (src/services/credits/types.ts:48)."
      items:
        - {name: Starter, credits: 10, price_to_audit: "49€", per_credit_estimate: "4.90€", target_segment_to_verify: "funnel_entry (Marie)"}
        - {name: Standard, credits: 30, price_to_audit: "99€", per_credit_estimate: "3.30€", target_segment_to_verify: "BA très actifs / chefs de syndicat solos (§4)"}
        - {name: Pro, credits: 60, price_to_audit: "179€", per_credit_estimate: "2.98€", target_segment_to_verify: "Chef de syndicat solo actif / angel club début (§4)"}
        - {name: Expert, credits: 125, price_to_audit: "329€", per_credit_estimate: "2.63€", target_segment_to_verify: "Angel club structuré (§4)"}
        - {name: Fund, credits: 300, price_to_audit: "749€", per_credit_estimate: "2.50€", target_segment_to_verify: "Micro-fonds VC pre-seed/seed (§4 — bande mensuelle 2,000-5,000€ ; vérifier si 749€ est mensuel ou one-shot)"}
    ui_hardcoded_tier_not_in_runtime_packs:
      note: "Tier affiché en UI mais ABSENT de CREDIT_PACKS runtime."
      items:
        - {name: Institutional, status: "UI hardcoded card, pas CREDIT_PACKS runtime", price: "Sur mesure", display_only: "*À partir de* + contact commercial."}
      audit_required: "Décision produit : créer un CREDIT_PACK runtime Institutional OU clarifier en UI que c'est purement contact commercial."

  pricing_rules:
    auto_refill_discount:
      constant_present: "15% sur le prix du pack (constante runtime présente)"
      activation_status: "Règle runtime latente — données présentes dans le code, mais aucun flow checkout / auto-refill commercial actif trouvé."
      audit_required:
        - "Identifier si auto-refill est activable runtime ou purement déclaratif."
        - "Si activable : auditer le flow déclencheur."
        - "Si déclaratif uniquement : ne pas le présenter publiquement comme actif."
    credit_expiry:
      claim_to_audit: "6 mois"
      legal_audit_required: >
        Vérifier la conformité expiration de crédits payés vs
        législation consommateurs. Audit juridique externe requis
        avant application publique. Cf. §32
        regulatory_alignment_claims_policy.
    rollover: "Jusqu'à 2x le pack sur auto-refill (ex: Standard peut accumuler jusqu'à 60 crédits max — à auditer)."
    institutional_display: "*À partir de* + contact commercial."

  free_tier_status:
    runtime_state: "ACTIF — pas historique."
    runtime_source: "src/services/credits/usage-gate.ts:251 — grantFreeCredits() avec FREE_TIER.initialCredits = 5."
    effective_behavior: >
      Au signup, l'utilisateur reçoit 5 crédits initiaux (équivalent
      à 1 Deep Dive). Pas de carte bancaire requise.
    banned_in_public_copy: >
      Le claim *"1 Deep Dive offert"* / *"free tier"* / *"premier
      deal gratuit"* est BANNI en surface marketing publique tant
      que : (a) §21 n'est pas aligné doctrinalement ; ET (b) le gate
      de release actif n'est pas fermé (cf. §26
      availability_language_rule + §28 banned_in_gtm).
    banned_wording_from_v0:
      - "*Moment de conversion limpide* (vocabulaire prescriptif marketing)"
      - "*Il voit le résultat, il en veut plus, il achète* (narration prescriptive)"
      - "*Pas de freeloaders à 3 analyses/mois qui ne convertissent jamais* (vocabulaire commercial agressif)"
      - "*Le BA voit la vraie valeur* (BA franglais + persona pré-pivot)"

  refund_and_credit_adjustment_policy_to_audit:
    note: >
      Le code contient plusieurs chemins de refund/adjustment crédits,
      et la page pricing user-facing promet *"Crédits remboursés
      automatiquement si une action échoue"*.
    current_user_facing_claim: "*Crédits remboursés automatiquement si une action échoue* (cf. src/app/(dashboard)/pricing/pricing-content.tsx)."
    audit_required:
      - "Identifier tous les chemins de refund crédits runtime."
      - "Vérifier le déclenchement automatique sur chaque type d'échec."
      - "Documenter les exceptions : quels types d'échec NE déclenchent PAS de refund ?"
      - "Cohérence audit log."
      - "Délai effectif du refund."
    banned_until_audit: "Claim *remboursement automatique* en surface publique tant que la matrice d'exceptions n'est pas documentée."

  legacy_usage_surfaces_to_audit:
    note: >
      Surfaces de code qui utilisent encore Quick Scan alors que
      types.ts marque cette action deprecated.
    example: "src/services/deal-limits/index.ts:51 — mappe tier <= 1 vers QUICK_SCAN."
    implication: >
      Tant que des surfaces runtime utilisent Quick Scan, la doctrine
      §21 ne peut pas dire *"Quick Scan retiré"*.
    audit_required:
      - "Décider : refactorer deal-limits OU retirer la mention deprecated de types.ts."
      - "Documenter le tier mapping actuel."

  legacy_subscription_fields_to_audit:
    note: >
      Le code conserve des champs / constantes héritées d'un modèle
      abonnement antérieur. §21 acte que le pricing runtime est
      HYBRIDE crédits + compat legacy.
    legacy_constants_found:
      - file: "src/services/deal-limits/index.ts:24"
        constants: ["subscriptionStatus", "monthlyLimit", "remainingDeals", "FREE_TIER_LIMITS", "PRO_TIER_BENEFITS"]
      - other_locations: "À grepper systématiquement dans tout src/."
    doctrinal_statement: >
      Le pricing runtime actuel d'Angel Desk = modèle CRÉDITS hybride
      avec compatibilité legacy de certains champs abonnement. PAS un
      modèle d'abonnement propre malgré la présence de
      subscriptionStatus / monthlyLimit dans le code.
    audit_required:
      - "Décider : refactorer pour retirer les champs legacy OU les documenter explicitement comme compat."
      - "Ne pas créer de copy publique sur subscriptionStatus / monthlyLimit / PRO_TIER_BENEFITS."

  tax_vat_currency_policy_to_audit:
    note: >
      §21 + §22 affichent des prix en euros, mais HT/TTC, TVA, pays,
      B2B/B2C, et devise des coûts LLM (USD) ne sont pas cadrés
      doctrinalement.
    open_questions:
      pricing_unit: "Prix affichés sont HT ou TTC ?"
      vat_policy: "TVA appliquée selon le pays de l'acheteur ? B2B reverse charge ? Mention obligatoire B2C ?"
      customer_residency: "Comment est déterminée la résidence fiscale ?"
      currency_internal_vs_user: >
        Prix utilisateur = EUR. Coûts LLM = USD (OpenRouter facture
        USD). Quelle règle de change ? Snapshot daté ?
    fx_eur_usd_rule_for_section_29:
      rule: >
        §29 unit economics calcule des coûts LLM en USD et compare
        à des prix EUR. Toute mention publique ou interne d'une
        marge doit citer un taux de change EUR/USD daté.
      audit_required: "Documenter la source du taux + fréquence de mise à jour."
    audit_required:
      - "Décision produit + juridique : HT vs TTC, TVA, B2B/B2C, pays."
      - "Affichage UI à aligner avec la décision."
      - "Mention légale obligatoire selon le pays."

  margins_to_audit:
    note: >
      Marges estimées HISTORIQUES, à auditer vs runtime réel + coûts
      LLM observés (cf. §29). Aucun claim de marge en surface
      publique sans audit.
    by_action_at_pro_rate_to_audit:
      quick_scan: {revenue_at_pro_rate: "2.98€", cost_estimate: "0.80€", margin_estimate: "73%"}
      deep_dive: {revenue_at_pro_rate: "14.90€", cost_estimate: "2.30€", margin_estimate: "85%"}
      ai_board: {revenue_at_pro_rate: "29.80€", cost_estimate: "12€", margin_estimate: "60%"}
      live_coaching: {revenue_at_pro_rate: "23.84€", cost_estimate: "7€", margin_estimate: "71%"}
      re_analysis: {revenue_at_pro_rate: "8.94€", cost_estimate: "2€", margin_estimate: "78%"}
    global_estimate_to_audit: "70-85% selon le mix d'usage (estimation historique, à confirmer)."
    expired_credits_revenue_note:
      claim_to_audit: "Si crédits expirent sans être utilisés → revenu pur (marge 100%)."
      legal_audit_required: >
        Claim financier sensible (cf. credit_expiry.legal_audit_required).
        L'expiration forcée comme source de revenu pur peut être
        challengeable juridiquement.
    audit_required:
      - "Mesurer la marge runtime réelle par action sur un mois représentatif."
      - "Mesurer le taux d'expiration crédits effectif et son impact revenu."
      - "Aucune publication publique de chiffres de marge sans cohorte documentée."

  existing_pricing_surfaces_to_audit:
    note: >
      Surfaces user-facing existantes qui exposent déjà des claims
      pricing bannis. À reprendre en passe code pricing dédiée (PAS
      dans cette écriture doctrine).
    surfaces:
      - file: "src/app/(dashboard)/pricing/pricing-content.tsx:72"
        claims_exposed:
          - "*1 Deep Dive offert* (banni §28 banned_in_gtm)"
          - "*20 agents / 41 expertises* (banni §26 quantified_claims_policy + §28)"
          - "*Exports compliance / audit trail* (CONTRAIRE à §32 regulatory_alignment_claims_policy)"
          - "Expiration des crédits (à auditer juridiquement)"
          - "*Remboursement automatique* (cf. refund_and_credit_adjustment_policy_to_audit)"
        audit_required: "Refonte de la page pricing en passe code dédiée."

  public_landing_pricing_drift_to_audit:
    note: >
      La landing page publique expose encore des claims pricing /
      free-tier contraires à la doctrine.
    code_reference: "src/app/page.tsx:113"
    claims_exposed:
      - "*5 analyses gratuites*"
      - "*Commencer gratuitement*"
    doctrinal_status: >
      Soumis à §28 banned_in_gtm (offre d'essai bannie tant que
      pricing/gate non validés) + §26 availability_language_rule.
      À reprendre en passe code pricing dédiée (PAS dans cette
      écriture doctrine).
    audit_required:
      - "Refonte landing public en alignement strict avec §21 + §28."
      - "Décision : maintenir *5 analyses gratuites* runtime mais retirer du copy public, OU retirer aussi runtime."

  settings_and_sidebar_credit_surfaces_to_audit:
    note: >
      Surfaces in-app additionnelles exposant pricing / crédits /
      labels legacy. À reprendre en passe code dédiée.
    surfaces:
      - file: "src/app/(dashboard)/settings/page.tsx:25"
        claims_exposed: "Page Settings — paramètres compte, crédits, etc."
      - file: "src/components/credits/credit-badge.tsx:30"
        claims_exposed: "Badge crédits sidebar — affichage solde + bouton *Acheter des crédits*"
      - other_surfaces_to_grep:
        - "Modales d'achat de crédits"
        - "Mentions *Quick Scan* (label deprecated)"
        - "Seuils *crédits achetés* (totalPurchased lifetime — cohérence feature_access_policy)"
    audit_required:
      - "Grep complet pour *Quick Scan*, *Acheter des crédits*, *crédits achetés* dans les composants UI."
      - "Aligner chaque label avec §21 + §22 v3."

  banned_pricing_claims:
    note: >
      Phrases bannies pour toute copy publique dérivée de §21.
      Repris de §28 banned_in_gtm + §20 claims_policy.
    items:
      - "*Angel Desk = 5-10x moins cher que les alternatives institutionnelles* (comparaison multiplicative non sourcée, bannie §28)."
      - "*Et Angel Desk fait PLUS (coaching, Board AI, scoring, négociation, analyse vivante)* (claim *fait PLUS* + accroche feature en hero, banni §28 + §26)."
      - "*PitchBook = 20-50K€/an*, *CB Insights = 50K€+/an*, *Dealroom = 10-30K€/an* (chiffres concurrents non sourcés ; à sourcer + dater avant toute mention publique)."
      - "*1 Deep Dive offert* / *premier deal gratuit* / *free tier* en accroche publique (banni §28 tant que pricing/gate non validés)."
      - "*Moment de conversion limpide* / *Pas de freeloaders* (vocabulaire commercial agressif, banni)."
      - "Tout claim *X x moins cher que [concurrent]* (comparaisons multiplicatives bannies §28)."
      - "*Le BA voit* / persona Marie au centre du pricing (cf. §27 funnel_entry vs core_revenue_pool)."
      - "*Exports compliance / audit trail* (CONTRAIRE §32)."
      - "*Remboursement automatique* sans matrice d'exceptions documentée."

  cross_section_alignment:
    upstream_sources:
      - "§3 vision + canonical_public_phrase"
      - "§4 segments — SOURCE AUTORITAIRE des bandes pricing publiques"
      - "§20 claims_policy + banned_framings"
      - "§26 banned_phrasings_table + availability_language_rule + internal_terms_banned_in_public + quantified_claims_policy"
      - "§27 primary_strategic_persona.pricing_band (Pauline core) + funnel_entry_persona (Marie pack Starter)"
      - "§28 pricing_section_alignment_status (point d'entrée du flag §21) + banned_in_gtm + measurement_plan"
      - "§29 unit_economics (couple cohérent §21 + §29)"
      - "§32 regulatory_alignment_claims_policy + code_audit_required"
    code_audit_required:
      - "Vérifier les prix Stripe (par pack + auto-refill + institutional)."
      - "Vérifier la table DB credits (crédits par pack + expiration + rollover)."
