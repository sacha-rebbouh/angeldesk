# ============================================================
# 24. DB EXPLOITATION PAR LES AGENTS
# ============================================================
db_exploitation:
  principle: "La DB n'est pas un annuaire. C'est de l'intelligence compétitive."

  five_usages:
    - name: "Détection concurrents (PRIORITÉ 1)"
      question: "Qui fait déjà ce que cette startup veut faire ?"
      mechanism: "Match par use cases, sector/sub-sector, description"
      agents: [competitive-intel, deck-forensics]
    - name: "Benchmark valorisation (PRIORITÉ 2)"
      question: "La valorisation est-elle raisonnable ?"
      mechanism: "Multiples médians par sector/stage/geo, percentiles P25/P50/P75"
      agents: [financial-auditor, cap-table-auditor]
    - name: "Market timing validation (PRIORITÉ 3)"
      question: "Est-ce le bon moment pour investir dans ce secteur ?"
      mechanism: "Tendances funding par trimestre, détection down rounds"
      agents: [market-intelligence]
    - name: "Investor track record (PRIORITÉ 4)"
      question: "Qui sont les bons investisseurs pour ce type de deal ?"
      mechanism: "Investisseurs actifs, historique, signaux, co-investisseurs potentiels"
      agents: [deck-forensics, cap-table-auditor]
    - name: "Deck vs DB comparison (CRITIQUE)"
      question: "Le fondateur est-il honnête sur la concurrence ?"
      mechanism: |
        Concurrent dans DB mais PAS dans le deck = RED FLAG (omission)
        Concurrent dans le deck mais PAS dans la DB = pas un flag (DB limitée)

  matching_logic:
    level1: "Use cases (meilleur signal)"
    level2: "Sector + SubSector"
    level3: "Sector seul"
    level4: "Keywords dans description (fuzzy)"

  cross_reference_rules:
    - "Claim 'pas de concurrent' + DB trouve 3+ directs = RED FLAG"
    - "Claim 'valorisation raisonnable' + DB montre >P80 = RED FLAG"
    - "Claim 'marché en croissance' + DB montre <-20% YoY = RED FLAG"
    - "Claim 'leader' + DB montre concurrent avec 3x+ funding = RED FLAG"


