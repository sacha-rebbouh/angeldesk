# ============================================================
# 3. VISION & POSITIONNEMENT
# ============================================================
# Doctrine pivotée 2026-05-20 — copilote analytique pour investisseurs privés.
# Cf. CLAUDE.md projet et docs-doctrine/angeldesk-strategic-pivot.md (doctrine canonique versionnée).
# NB : cascade doctrinale TERMINÉE pour le périmètre repéré. Les sections
# 3 à 11, § 19, § 20, § 21, § 22, § 26, § 27, § 28, § 29, § 30, § 31,
# § 32, § 33 et § 34 sont alignées. Formulation prudente : "terminée
# pour le périmètre repéré", PAS "tout le fichier est parfait". Toute
# section non listée ci-dessus n'a PAS été auditée dans le cadre de la
# cascade 2026-05-20 et peut contenir des vestiges doctrinaux.
vision:
  # --- Positionnement public ---
  positioning_claim: >
    Angel Desk est le copilote analytique des investisseurs privés qui doivent
    décider avec rigueur, sans infrastructure d'analyse lourde. Il transforme
    documents, déclarations des fondateurs et échanges en signaux sourcés,
    contradictions visibles, zones d'incertitude et questions prioritaires.
    La décision reste à l'investisseur.

  # --- Catégorie ---
  category: "Copilote d'aide à la décision pour l'investissement privé."
  internal_segmentation: "équipes d'investissement légères"  # canonique français
  internal_segmentation_en: "lean investment teams"  # interne / GTM uniquement

  # --- Définition stratégique (interne, ne sort jamais en public) ---
  strategic_definition: "Angel Desk est un environnement analytique fiable autour d'IA imparfaites."

  # --- Ce qu'est Angel Desk ---
  what_it_is: |
    Angel Desk transforme un dossier d'investissement (deck, documents
    financiers, déclarations des fondateurs, appels) en :
    - signaux sourcés (affirmations factuelles critiques rattachées à leur source, leur date disponible ou l'absence de date explicitée, leur fiabilité)
    - contradictions visibles (déclarations qui ne convergent pas entre documents)
    - zones d'incertitude (ce qui dépend d'une hypothèse, d'une donnée manquante, d'une preuve faible)
    - questions prioritaires (ce qui doit être clarifié avant de trancher)
    La valeur vient de l'orchestration, la structure, la traçabilité, la mémoire,
    la gestion de l'incertitude, la hiérarchisation des signaux et la réduction
    des hallucinations critiques.

  # --- Doctrine à 2 strates (s'applique à TOUT) ---
  doctrine:
    strata_1_positive:
      label: "Étoile guide"
      rule: >
        Angel Desk ne remplace pas le jugement de l'investisseur.
        Il augmente sa capacité à raisonner sous incertitude.
      role: >
        Inspire les prompts agents, la hiérarchie d'interface et le message
        public. Oriente toute production.
    strata_2_guardrail:
      label: "Garde-fou opérationnel"
      rule: "Angel Desk ANALYSE et GUIDE. Angel Desk ne DÉCIDE JAMAIS."
      role: >
        Vérifiable mécaniquement (sanitizers, linters, assertions d'interface).
        Empêche les régressions vers le prescriptif.
    coexistence: "La positive guide, la négative protège. Les deux strates coexistent."

  # --- Règle d'honnêteté ---
  honesty_rule: >
    Marketing oui, invention non. Aucune fonctionnalité, capacité ou performance
    qui n'est pas tenue par le produit réel : code, données, infrastructure et
    opérations. Si une promesse ne tient pas, on la retire.

  # --- Changement de registre ---
  paradigm_shift:
    - "Dossier vivant — V1 deck → V2 après réponses des fondateurs → V3 après coaching en direct."
    - "Copilote actif — réagit, fait remonter, signale. Pas un rapport figé."
    - "Débat multi-modèle — plusieurs lectures indépendantes confrontées. Pas un avis unique."
    - "Cycle continu — analyser, questionner, accompagner pendant l'appel, tracer, re-analyser."
    - "Trace analytique partagée — l'équipe (analyste, associé, LP) raisonne sur la même base."

  # --- Board AI ---
  # Noms exacts des modèles : voir section 9 (config produit), pas la doctrine.
  board_ai_vision:
    concept: >
      Plusieurs modèles indépendants aux profils complémentaires confrontent
      leurs lectures sur le même dossier.
    effect: >
      Le débat fait remonter les angles morts, les hypothèses faibles et les
      zones de désaccord. Les divergences persistantes deviennent des signaux
      à examiner, pas des défauts à corriger.
    role: >
      Montrer où le raisonnement d'investissement est fragile, ambigu ou
      insuffisamment étayé.
    public_messaging_rule: >
      Vocabulaire autorisé : 'débat multi-modèle', 'désaccords exposés'.
      Bannir : 'sublimation', 'transparence cognitive', 'intelligence
      collective émergente', 'vérité émergente'.

  # --- LLM seul vs Board AI ---
  individual_vs_collective:
    individual: >
      Un LLM seul a un biais, un schéma d'hallucination, et tend à suivre
      le cadrage du prompt.
    collective: |
      Le débat structuré met en regard plusieurs lectures indépendantes.
      Les convergences ne valent pas vérité ; elles indiquent seulement des
      points où plusieurs lectures se recoupent. Les divergences persistantes
      signalent les zones à examiner en priorité.
    public_messaging_rule: >
      Décrire les effets observables (désaccord visible, angles morts mis en
      évidence). Bannir 'wisdom of crowds' et toute formule magique.

  # --- Ce qu'Angel Desk augmente ---
  augments:
    analyst_work: >
      Structure les premières lectures, croise sources / dates / fiabilités,
      prépare un mémo défendable.
    investment_committee: >
      Fait remonter angles morts et désaccords avant le comité humain qui
      décide.
    coach: >
      Pendant l'appel, fait remonter contradictions entre la présentation et
      les déclarations des fondateurs, benchmarks dépassés, informations nouvelles.
      L'investisseur conduit.
    negotiator: >
      Arguments chiffrés et sourcés, points de friction identifiés,
      alternatives proposées. L'investisseur négocie.
    rule: "Augmentation, pas remplacement. Aucun rôle humain n'est substitué."

  # --- Capacités uniques ---
  unique_capabilities:
    - >
      Dossier vivant — un environnement analytique qui évolue avec les
      réponses des fondateurs et le coaching en direct.
    - >
      Preuves inter-documents — contradictions, fraîcheur et provenance
      traçables entre tous les documents du dossier.
    - >
      Lentilles sectorielles dédiées — 22 bibliothèques sectorielles activées
      contextuellement, sans forcer une grille d'analyse généraliste.
    - >
      Trace analytique partagée — analyste, associé, co-investisseur et LP
      raisonnent sur la même base sourcée.
    - >
      Reproductibilité — les scores sont calculés par formule sur des signaux
      tracés. Les variations entre versions doivent être explicables par de
      nouvelles preuves, pas par un jugement opaque.
    - "Cycle continu — analyser, questionner, accompagner pendant l'appel, tracer, re-analyser."

  # --- Hiérarchie de messaging public ---
  messaging_hierarchy:
    order:
      - "1. Copilote analytique (catégorie)"
      - "2. Raisonnement sous incertitude (doctrine)"
      - "3. Affirmations factuelles critiques sourcées, contradictions détectées, zones d'incertitude, fraîcheur et fiabilité documentaire (effets)"
      - "4. Architecture de support (preuve technique sous le capot)"
    rule: |
      Le nombre d'agents et le nom des systèmes internes ne figurent pas en
      accroche publique. Ils servent de preuve technique, pas de promesse.

  # --- Règle de séparation langage doctrine / public ---
  doctrine_vs_public_language:
    doctrine_surfaces: >
      CLAUDE.md, reference.yaml, docs-private internes, prompts agents.
      Vocabulaire technique autorisé.
    public_surfaces: |
      Page d'accueil, pricing, pitch deck, blog, communication, emails sortants.
      Le message reste sur l'identité produit et le récit.
    availability_language_rule: >
      Aucun langage de disponibilité commerciale ("prêt", "produit lancé",
      "service lancé", "lancement public", "live now", "release-complete",
      "disponible dès maintenant", "available now", "prêt à utiliser") sur
      surface publique tant que le gate de release actif n'est pas fermé.
      Le mot "live" brut n'est PAS banni en soi (Live Coaching, live
      sessions, statuts applicatifs runtime restent légitimes — c'est
      l'usage marketing public de disponibilité commerciale qui est banni).
    internal_to_public_glossary:
      "lean investment teams": "équipes d'investissement légères / investisseurs privés sans infrastructure d'analyse lourde"
      "claims": "déclarations des fondateurs"
      "Board AI": "débat multi-modèle"
      "evidence-first": "preuves sourcées, traçabilité, fiabilité documentaire"
      "substrat cognitif partagé": "trace analytique partagée"
      "Evidence Engine": "affirmations factuelles critiques sourcées, dates disponibles ou absences de date explicitées, fiabilité documentaire, contradictions détectées"
      "IA imparfaites": "(jamais en public — utiliser 'raisonnement sous incertitude')"
      "sublimation": "(bannie — utiliser 'débat multi-modèle')"
      "wisdom of crowds": "(bannie — décrire l'effet observable du débat multi-modèle)"
      "intelligence collective émergente": "(bannie — décrire l'effet observable)"


