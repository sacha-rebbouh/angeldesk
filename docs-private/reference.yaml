  tests_and_guards_to_update:
    test_scope_rule: >
      Les tests guards visent les chaînes RENDUES côté UI/PDF (snapshots
      de surfaces user-facing) et les outputs LLM rendus, PAS un grep
      naïf sur tout src/ qui attraperait commentaires, types, noms de
      routes, code interne. Cible chirurgicale par surface.
    banned_strings_to_guard:
      prescriptive_terms_strict:
        note: >
          Mots à bannir sur chaînes RENDUES (snapshots UI/PDF, outputs
          LLM). Les tests doivent utiliser des word boundaries pour
          éviter les faux positifs (e.g. \bPASS\b pour ne pas capturer
          password / bypass).
        guard_pattern: "\\b(GO|NO_GO|PASS|STRONG_PASS|READY_TO_INVEST|DO_NOT_PROCEED|INVESTIR|REJETER|Dealbreaker|Sublimation)\\b"
        notes_negatives:
          - "PASS — exclure password, bypass, passage, classpass via \\b"
          - "GO — exclure goal, golf"
          - "REJETER — verbe légitime dans certains contextes interne ; cibler chaînes user-facing"
      prescriptive_terms_contextual:
        note: >
          Mots à bannir UNIQUEMENT dans des contextes prescriptifs /
          labels user-facing produit. Le mot brut peut apparaître dans
          d'autres contextes (commentaires, types, doc interne).
        items:
          - {term: "Recommandation", context: "label user-facing avec sens prescriptif (e.g. 'Recommandation: PASS'). OK dans 'Repère de négociation' / 'Points de recommandation à discuter'."}
          - {term: "Confiance", context: "label de produit ou axe (e.g. 'Confiance: 87%'). OK dans explications doctrine ou prose technique."}
          - {term: "Score global", context: "accroche hero. OK dans backing technique / annexe."}
      superlatives_strict:
        list: ["Le meilleur", "parfait", "surhumain", "imbattable", "monstrueux", "obscène", "infalsifiable"]
      oraculaire_phrases:
        list: ["DD VC en 1h", "Aucun analyste expert en 22 secteurs", "wisdom of crowds", "intelligence collective émergente", "vérité émergente"]
      commercial_availability_in_marketing:
        note: >
          À garder UNIQUEMENT sur surfaces marketing externes (landing,
          pricing marketing externe, blog, pitch deck, com publique) —
          PAS sur statuts applicatifs internes (analyse lancée, rapport
          prêt, docs prêts, données disponibles, indisponible, crédits
          disponibles).
        banned_phrases:
          - "available now"
          - "disponible dès maintenant"
          - "prêt à utiliser"
          - "release-complete"
          - "produit lancé"
          - "service lancé"
          - "lancement public"
          - "live now"
        not_banned:
          - "analyse lancée / lancement d'analyse (statut runtime)"
          - "rapport prêt / docs prêts / extraction prête (statut runtime)"
          - "données disponibles / indisponible (statut runtime)"
          - "crédits disponibles (statut applicatif utilisateur)"
      internal_names_in_marketing:
        note: "À bannir UNIQUEMENT sur surfaces marketing publiques externes (cf. internal_terms_banned_in_public.public_marketing_surfaces). Coexistence acceptée avec in_app_legacy_feature_names."
        list:
          - "Evidence Engine"
          - "Consensus Engine"
          - "Reflexion Engine"
          - "Board AI (en marketing — accroche, hero, landing, pitch deck slide 1)"
          - "Live Coaching (en marketing — accroche, hero, landing, pitch deck slide 1)"
          - "claims (vocabulaire interne)"
          - "IA imparfaites"
          - "lean investment teams"
          - "substrat cognitif partagé"
    test_surfaces:
      - "Snapshots UI (Jest/Playwright) sur composants Tier 1/Tier 3/Board/Live spécifiques (cf. confidence_user_facing_surfaces_to_audit)"
      - "Snapshots PDF (rendu HTML/PDF) sur sections listées dans pdf_hardcoded_labels_to_audit"
      - "Tests outputs LLM (sanitizeAgentNarratives + sanitizers à venir) sur consensusPoints, frictionPoints, questionsForFounder, recommendations, narrative, nextSteps"
      - "Surfaces marketing dédiées (landing, pricing marketing externe, blog) — tests stricter sur commercial_availability_in_marketing + internal_names_in_marketing."

