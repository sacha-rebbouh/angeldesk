# ============================================================
# 26. POSITIONNEMENT PRODUIT — RÈGLES PUBLIQUES
# ============================================================
# Aligné sur la doctrine du pivot 2026-05-20 (cf. § 3 + § 5 + § 7 +
# reference.yaml § 8 + § 20 + docs-doctrine/angeldesk-strategic-pivot.md).
# Surface publique : règles à appliquer sur landing, pricing externe, blog,
# pitch deck, com publique, emails sortants, et toutes les surfaces UI/PDF/
# chat où un libellé peut atteindre l'utilisateur final.
# Le wording moat doctrinal passe par § 20 ; § 26 documente l'application
# opérationnelle des règles publiques.
positioning_rules:
  doctrine_strata:
    strata_1_positive: >
      Angel Desk ne remplace pas le jugement de l'investisseur. Il augmente
      sa capacité à raisonner sous incertitude.
    strata_2_guardrail: >
      Angel Desk ANALYSE et GUIDE. Angel Desk ne DÉCIDE JAMAIS.
      L'investisseur est le seul décideur. L'outil rapporte des signaux,
      des éléments sourcés (affirmations factuelles critiques rattachées
      à leur source, leur date disponible ou l'absence de date explicitée,
      leur fiabilité), des comparaisons et des contradictions détectées.
      Il ne dit jamais quoi faire.

  golden_test: >
    Test règle d'or : chaque phrase RESTITUÉE À L'UTILISATEUR ou utilisée
    en communication (UI, PDF, chat, com publique, accroches) doit pouvoir
    se terminer par "…à vous de décider" sans absurdité. Le test ne
    s'applique pas aux prompts internes des agents pris isolément (qui
    peuvent contenir du vocabulaire technique runtime non destiné à
    l'utilisateur ; cf. § 19 directives + applies_to_surfaces.prompts).

  canonical_public_phrase:
    description: >
      Phrase source canonique de référence (§ 3). Les variantes courtes
      (par exemple public_promise) doivent préserver la catégorie
      (copilote analytique), la transformation (documents/déclarations/
      échanges → signaux/contradictions/zones d'incertitude/questions) et
      la clôture (décision reste à l'investisseur).
    verbatim: >
      Angel Desk est le copilote analytique des investisseurs privés qui
      doivent décider avec rigueur, sans infrastructure d'analyse lourde.
      Il transforme documents, déclarations des fondateurs et échanges en
      signaux sourcés, contradictions visibles, zones d'incertitude et
      questions prioritaires. La décision reste à l'investisseur.
    interpretation_notes:
      contradictions_visibles: >
        Dans la phrase canonique, "contradictions visibles" signifie
        "contradictions détectées et matérialisées par le système", pas
        une garantie d'exhaustivité (cf. § 9 + § 11 — mécanismes de
        détection limités et auditables).
      signaux_sources: >
        "signaux sourcés" = "affirmations factuelles critiques sourcées"
        (cf. § 5, § 8, § 20 — la promesse ne porte pas sur 100% des
        affirmations).
    cross_reference: "§ 3 phrase publique verrouillée + interpretation_notes ci-dessus."

  public_category:
    description: "Catégorie publique annoncée."
    value: "Copilote analytique des investisseurs privés."
    cross_reference: "§ 3 phrase publique verrouillée."

  public_promise:
    description: >
      Promesse publique en surface (landing, pricing externe, blog,
      pitch deck). À utiliser comme variante courte de la
      canonical_public_phrase, pas comme claim d'efficience autonome.
    value: >
      Qualifier les preuves disponibles (sources, limites, fraîcheur),
      exposer les contradictions détectées, structurer les signaux et
      matérialiser les zones d'incertitude — pour décider avec rigueur
      sur des dossiers complexes. La décision reste à l'investisseur.
    cross_reference: >
      Variante de la canonical_public_phrase (§ 3) ; cohérent avec § 20
      competitive_positioning_rules.public_positioning_axes.

  internal_technical_proofs:
    description: >
      Preuves techniques sous le capot, citables en backing technique
      mais JAMAIS en accroche publique. Le pitch deck slide 1 ne
      mentionne aucune de ces preuves.
    items:
      - "Architecture en 4 couches (extraction / analyse transverse / lentilles sectorielles / synthèse et challenge) — 44 agents / composants selon convention § 7 (3 + 13 + 22 + 6 ; thesis-reconciler conditionnel hors total)."
      - "Couche evidence-first (nom interne : Evidence Engine) — classification de fiabilité, recoupement documentaire, contradictions détectées inter-documents (cf. § 6)."
      - "Débat multi-modèle (nom interne : Board AI) — modèles indépendants confrontent leurs lectures (cf. § 9)."
      - "Vérification des preuves en temps réel pendant l'appel fondateur (nom interne : Live Coaching, cf. § 10)."
      - "5 directives anti-hallucination déployées dans les prompts agents concernés (couverture à auditer, cf. § 19 coverage_audit)."
      - "Agrégation de score déterministe ; passage 2 axes orientation × solidité des preuves en chantier (cf. § 8 target_scoring_model)."
    cross_reference: "§ 7 hiérarchie messaging + § 20 current_defensibility_state."

  internal_terms_banned_in_public:
    public_marketing_surfaces:
      note: >
        Surfaces MARKETING EXTERNES : landing (avant login), pricing
        marketing externe (landing pricing page), blog, pitch deck, com
        sortante, emails marketing. Sur ces surfaces : ban strict des
        noms internes ci-dessous.
      external_only:
        - "Landing page (avant login)"
        - "Pricing marketing externe (landing pricing page)"
        - "Blog"
        - "Pitch deck"
        - "Emails marketing / com sortante"
      list:
        - "Evidence Engine — utiliser la description publique (cf. § 7 glossaire interne → public)"
        - "Consensus Engine — nom interne interdit en marketing public. Si la mécanique doit être expliquée hors annexe technique, utiliser 'mise en regard structurée des contradictions inter-agents'."
        - "Reflexion Engine — nom interne interdit en marketing public. Si la mécanique doit être expliquée hors annexe technique, utiliser 'auto-critique itérative des sorties'."
        - "Board AI — en marketing public utiliser 'débat multi-modèle'."
        - "Live Coaching — en marketing public utiliser 'vérification des preuves en temps réel pendant l'appel fondateur'."
        - "lean investment teams — utiliser 'investisseurs privés' / 'équipes d'investissement légères'"
        - "claims — utiliser 'déclarations des fondateurs'"
        - "substrat cognitif partagé — utiliser 'trace analytique partagée'"
        - "IA imparfaites — utiliser 'raisonnement sous incertitude'"
    in_app_legacy_feature_names:
      note: >
        Noms actuellement EXPOSÉS dans le produit (dashboard utilisateur
        connecté). Distincts des surfaces marketing externes. § 26 ne
        déclare PAS ces surfaces non conformes immédiatement — dette à
        migrer ou à accepter comme labels produit stabilisés. Coexistence
        autorisée avec public_marketing_surfaces ci-dessus : un nom peut
        être banni en marketing public ET toléré comme legacy in-app.
      in_app_surfaces:
        - "Sidebar (dashboard connecté)"
        - "Credit modal / page pricing in-app"
        - "Page live / ai-board-panel.tsx"
        - "Copy d'analyse Deep Dive"
        - "API copy"
      current_exposure_to_decide:
        - "AI Board / Board AI"
        - "Live Coaching"
        - "Deep Dive"
      decision_required: >
        Trancher pour chacun : "nom public produit stable (accepté)" vs
        "label produit à migrer". Sans décision, § 26 documente la dette
        mais ne réclame pas conformité immédiate.
    banned_only_as_hero_or_accroche:
      note: >
        Tolérés en annexe technique / discussion produit avancée / FAQ
        détaillée, JAMAIS en hero, pitch slide 1, ou accroche marketing.
      list:
        - "44 agents (en accroche utiliser 'architecture en 4 couches' ; 44 reste comme preuve sous le capot)"
        - "22 lentilles sectorielles (en accroche utiliser 'lentille sectorielle dédiée par dossier' ; détail 21 spécialisées + general-expert en backing)"

  quantified_claims_policy:
    description: >
      Claims chiffrés conditionnels à qualifier avant exposition publique.
    items:
      - "60+ fichiers (5 directives anti-hallucination) — claim de couverture, cf. § 19 coverage_audit ; à recompter avant tout usage public."
      - "5,000+ deals (Funding Database) — cible / en construction, cf. § 4 + § 8 ; toujours préciser le statut."
      - "44 agents — convention historique d'architecture, cf. § 7 counting_note ; pas une promesse publique."
      - "22 lentilles sectorielles — préciser systématiquement 21 spécialisées + 1 general-expert fallback."
      - "20 agents d'analyse + 41 expertises disponibles (claim pricing actuel) — ne correspond pas aux conventions § 7. À auditer : si décompte légitime (20 agents Tier 1 actifs sur certains chemins, 41 = X + Y), documenter la méthodologie. Sinon retirer ou requalifier."
    cross_reference: "§ 20 claims_policy."

  availability_language_rule:
    rule: >
      Aucun langage de disponibilité commerciale (cf.
      tests_and_guards_to_update.commercial_availability_in_marketing
      pour la liste exacte de phrases bannies) tant que le gate de
      release actif n'est pas fermé. Règle transversale, s'applique
      à TOUTE surface marketing publique.
    release_tracker_reference: >
      L'identification du gate actif courant n'est PAS gravée dans § 26.
      Cohérence requise avec : CLAUDE.md (Règle de séparation langage
      doctrine / public — Gate de release actif état courant) et
      docs-doctrine/angeldesk-strategic-pivot.md § 8 — même. Snapshot
      à date du pivot : B16 (export PDF authentifié prod + 1h
      monitoring sans erreur). Mettre à jour ces 3 surfaces en
      synchronie quand le gate change.
    cross_reference: >
      docs-doctrine/angeldesk-strategic-pivot.md § 8 + CLAUDE.md règle
      de séparation.

  banned_phrasings_table:
    description: >
      Phrases bannies en surface publique. Repris de § 5 interdits +
      § 20 banned_framings. Chaque entrée donne replace_public (label
      public pur) et internal_note (détail technique réservé au backing
      doctrinal).
    items:
      - phrase: "Investir / Ne pas investir"
        why: "Prescriptif"
        replace_public: "Signaux favorables / Signaux d'alerte dominants"
      - phrase: "GO / NO-GO"
        why: "Binaire et directif"
        replace_public: "Profil de signal"
        internal_note: "Détail technique : orientation × solidité ; cf. § 8 target_scoring_model."
      - phrase: "Rejeter l'opportunité"
        why: "Commande à l'investisseur"
        replace_public: "Les signaux d'alerte dominent sur X dimensions"
      - phrase: "Passer ce deal"
        why: "Prescriptif"
        replace_public: "Vigilance requise / Zone d'alerte"
      - phrase: "Dealbreaker"
        why: "Trop définitif, ferme la porte"
        replace_public: "Risque critique"
      - phrase: "Toute négociation serait une perte de temps"
        why: "Agressif et directif"
        replace_public: "Les points de négociation sont limités compte tenu des signaux d'alerte"
      - phrase: "Recommandation : PASS"
        why: "Action recommandée"
        replace_public: "Signal : Signaux d'alerte dominants"
      - phrase: "Tout impératif adressé à l'investisseur (Rejetez, N'investissez pas, Fuyez)"
        why: "On commande"
        replace_public: "Constater les faits, laisser l'investisseur conclure"
      - phrase: "Vos analystes IA font le travail, vous décidez"
        why: "*Font le travail* sonne remplacement humain ET promesse de disponibilité (banni tant que gate de release actif pas fermé)"
        replace_public: "Le copilote analytique des investisseurs privés (cf. § 3 phrase publique verrouillée)"
      - phrase: "La DD d'un fonds VC en 1h"
        why: "Promesse oraculaire mesurable et falsifiable au premier dossier sérieux"
        replace_public: "L'environnement analytique des décisions d'investissement"
      - phrase: "Sublimation"
        why: "Magique, IA-mystique"
        replace_public: "Désaccords entre modèles exposés ; convergence ≠ justesse"
        internal_note: "Cf. § 9 limits."
      - phrase: "Le meilleur partenaire d'aide à la décision parfaite"
        why: "*Le meilleur* + *parfaite* = oraculaire"
        replace_public: "Le copilote analytique des investisseurs privés"
      - phrase: "L'IA poussée à l'extrême pour prendre la meilleure décision"
        why: "*Prendre* = remplacer le décideur"
        replace_public: "L'environnement analytique qui augmente la capacité à raisonner sous incertitude"
      - phrase: "Aucun analyste n'est expert en 22 secteurs"
        why: "Sonne remplacement humain"
        replace_public: "Chaque dossier obtient une lentille spécialisée lorsque le secteur est couvert, sinon un fallback général structuré (21 lentilles spécialisées + general-expert)"
      - phrase: "Wisdom of crowds / Intelligence collective émergente / Vérité émergente"
        why: "Registre magique, claim non vérifiable"
        replace_public: "Désaccords entre modèles exposés ; convergence ≠ justesse"
        internal_note: "Cf. § 9 limits."
      - phrase: "IA imparfaites en public"
        why: "Brutal, registre interne"
        replace_public: "Raisonnement sous incertitude"
      - phrase: "Aucun analyste ne fait X / Nous le seul / Imbattable / Monstrueux / Obscène / Surhumain / Infalsifiable"
        why: "Caricature concurrentielle ou claim de moat non démontré (cf. § 20 banned_framings)"
        replace_public: "Comparaison sobre"
        internal_note: "Référence § 20 sober_comparisons pour formulations approuvées."
      - phrase: "Confiance comme axe scoring public"
        why: "Recrée l'auto-évaluation LLM comme axe produit"
        replace_public: "Solidité des preuves"
        internal_note: "Détail technique : agrégation déterministe sur inputs disponibles, sous-scores potentiellement LLM ; cf. § 8 target_scoring_model.axes.solidite_des_preuves."
      - phrase: "Persona Marie (BA occasionnel) au centre stratégique"
        why: "Centre stratégique = équipes d'investissement légères (§ 4) ; Marie est porte d'entrée acquisition, pas centre"
        replace_public: "Pauline / équipe d'investissement légère au centre stratégique ; Marie en funnel_entry acquisition secondaire (cf. § 4 segments)"
      - phrase: "Score global mono-axe trônant en haut de l'UI"
        why: "Remplacé par modèle 2 axes orientation × solidité des preuves (chantier en cours)"
        replace_public: "Score subordonné. Dimensions + solidité des preuves + sources + contradictions + questions montrés en premier"
        internal_note: "Cf. § 6 in_progress + § 8 target_scoring_model."

