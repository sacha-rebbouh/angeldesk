# ============================================================
# 27. PERSONAS — STRATÉGIQUE + ACQUISITION
# ============================================================
# Aligné sur la doctrine du pivot 2026-05-20 (cf. § 3 ICP + § 4 segments +
# § 5 interdits + § 20 banned_framings + § 26 banned_phrasings_table +
# docs-doctrine/angeldesk-strategic-pivot.md).
# §27 documente le persona stratégique principal (Pauline = cœur de
# revenu, core_revenue_pool §4) ET le persona d'acquisition secondaire
# (Marie = funnel_entry §4, pack Starter).
# Bannis dans §27 : "investit au feeling", "DD VC en 1h", "ROI obscène",
# "2 jours d'analyste", claims de gain de temps non sourcés, "arguments
# d'Angel Desk" prescriptif. Cf. § 5 + § 20 + § 26.
persona:
  positioning_rule: >
    Le centre stratégique de §27 est Pauline (responsable d'investissement
    micro-fonds / chef de syndicat structuré), pas Marie. Marie reste
    documentée comme persona d'acquisition bottom-up via le pack Starter.
    Ne pas inverser ce centrage — c'était l'erreur du pré-pivot (cf. § 5
    interdit "Persona Marie au centre stratégique").

  primary_strategic_persona:
    name: Pauline
    role_label: "Responsable d'investissement (micro-fonds) ou chef de syndicat structuré"
    age: 34
    segment_alignment: "§ 4 segments.core (core_revenue_pool : micro-fonds VC pre-seed/seed ou angel club / syndicat structuré 5-10 membres)"
    deal_volume: "100-200 dossiers / an"
    investment_ticket_range: >
      Selon contexte : 200K€-2M€ par investissement (micro-fonds VC
      pre-seed/seed) ou 100-300K€ par investissement (chef de syndicat
      structuré).
    professional_context: >
      Pauline porte le besoin d'analyse rigoureuse SANS infrastructure
      d'analyse lourde. Elle pilote l'essai et défend l'achat auprès de
      l'associé responsable ou de l'équipe dirigeante (cf. CLAUDE.md
      ICP + docs-doctrine §3). Ce n'est pas un junior analyst qui subit
      l'outil. Doit justifier ses raisonnements devant associés,
      co-investisseurs ou LPs.
    pain_points:
      - "Volume de dossiers vs capacité analytique disponible : l'investissement sérieux exige plus que ce qu'une équipe légère produit seule."
      - "Mémos défendables devant associés / LPs / co-investisseurs sans armée d'analystes."
      - "Reproductibilité d'un dossier à l'autre (cohérence de méthode, traçabilité)."
      - "Vitesse de tri / pré-qualification sur le pipeline entrant."
      - "Les outils institutionnels (type PitchBook / CB Insights / AlphaSense) sont coûteux, orientés data/sourcing ou market intelligence, et ne couvrent pas seuls le workflow analytique visé."
      - "Risque d'angle mort sur les contradictions inter-documents (deck vs financials vs appel fondateur)."
    use_cases:
      - "Tri rapide / pré-qualification des dossiers entrants"
      - "Préparation de mémo d'investissement défendable"
      - "Préparation d'appel fondateur (questions prioritaires sourcées)"
      - "Vérification de cohérence dossier vs réponses fondateur pendant l'appel, lorsque le contexte pré-call est disponible (cf. § 10 runtime_context_paths)"
      - "Documentation traçable pour comité d'investissement / reporting LPs"
      - "Continuité de la trace analytique entre versions du dossier (V1 deck → V2 → V3 post-call), via analyses persistées et reanalysis lorsque disponibles"
    journey:
      note: >
        Parcours nominal. Étapes décrites avec la description publique
        des capacités (cf. § 7 reframes + § 26
        internal_terms_banned_in_public). Les noms in-app actuels
        (Deep Dive, AI Board, Live Coaching / coaching cards) sont signalés entre
        parenthèses pour cohérence avec in_app_legacy_feature_names ;
        statut décision produit en cours.
      steps:
        - "1. Création du dossier, dépôt des documents disponibles (deck, documents financiers, déclarations des fondateurs, échanges)."
        - "2. Lancement de l'analyse approfondie multi-couches (label in-app actuel : Deep Dive)."
        - "3. Examen des résultats : extraction qualifiée, analyses transverses (équipe, marché, concurrence, financier, technologique, juridique, stratégie commerciale, sortie), lentilles sectorielles activables contextuellement, synthèse structurée."
        - "4. Exploration du profil de signal, des dimensions, de la solidité des preuves, des contradictions détectées et des zones d'incertitude ; score agrégé subordonné tant que le chantier 2 axes n'est pas terminé (cf. § 8 target_scoring_model)."
        - "5. Chat contextuel pour creuser un point spécifique du dossier."
        - "6. Débat multi-modèle (label in-app actuel : AI Board) — modèles indépendants confrontent leurs lectures ; divergences persistantes = signaux à examiner."
        - "7. Préparation de l'appel fondateur (questions prioritaires sourcées, points à clarifier, contradictions à confronter)."
        - "8. Pendant l'appel fondateur : vérification des preuves en temps réel (label in-app actuel : Live Coaching), lorsque le contexte pré-call est disponible (cf. § 10 runtime_context_paths)."
        - "9. Après l'appel : rapport post-call + reanalysis lorsque disponible / déclenchée (cf. § 10 + § 20 living_dossier.status)."
        - "10. Préparation / assemblage d'un mémo défendable et préparation pour comité d'investissement / présentation aux co-investisseurs ou LPs."
    value_for_pauline:
      note: >
        Énoncé en effets recherchés, pas en claims chiffrés non sourcés.
        Pas de "DD VC en 1h", pas de "ROI obscène", pas de "2 jours
        d'analyste".
      effects:
        - "Vise à augmenter la capacité de traitement tout en maintenant une méthode plus traçable et plus défendable."
        - "Aide à préparer des mémos plus traçables et plus défendables devant associés / LPs / co-investisseurs."
        - "Vise à réduire certains angles morts par croisements documentaires lorsque les données disponibles le permettent."
        - "Continuité de la trace analytique entre versions du dossier via analyses persistées, post-call et reanalysis lorsque disponibles ; continuité mémoire UX à maturer (cf. § 20 living_dossier.status)."
        - "Trace analytique partagée au sein d'une équipe légère, cohérence inter-dossiers."
        - "Vérification des preuves en temps réel pendant l'appel fondateur, lorsque le contexte pré-call est disponible, aide à limiter le risque de complaisance face au framing du fondateur (cf. § 10)."
    pricing_band:
      note: "Selon segment §4 — Pauline peut être positionnée sur trois bandes selon le contexte d'exercice."
      bands:
        - "Chef de syndicat solo / BA très actif : ~200-500€ par dossier (cf. § 4 segments.core)."
        - "Angel club / syndicat structuré (5-10 membres) : ~500-1,500€ par dossier (cf. § 4 segments.core)."
        - "Micro-fonds VC pre-seed/seed : ~2,000-5,000€/mois (cf. § 4 segments.core)."
      no_roi_claim_rule: >
        Pas de claim ROI calculé. Le coût-bénéfice se mesure par
        l'investisseur en fonction de son volume, du ticket moyen, et
        de la valeur du temps d'équipe légère. Pas de claim type
        "X mois rentabilisés", pas de "ROI obscène".

  funnel_entry_persona:
    name: Marie
    role_label: "BA expérimenté/expert — acquisition bottom-up via pack Starter"
    segment_alignment: "§ 4 segments.funnel_entry (BA expérimentés occasionnels via pack Starter)"
    not_strategic_center: >
      Marie est documentée comme persona d'acquisition bottom-up, PAS
      comme centre stratégique. Le BA novice 2h/semaine est explicitement
      exclu du centre de conception (risque de transformation oracle —
      cf. doctrine § 3 ICP + § 5 interdits + § 26 banned_phrasings_table).
      Cette section §27 ne décrit donc PAS Marie en hero / promesse de
      valeur principale.
    professional_context: >
      BA expérimenté qui découvre l'outil via le pack Starter. Usage
      occasionnel, sensibilité prix élevée, ticket moyen 25-50K€ par
      investissement.
    pain_points:
      - "Découverte du produit dans un format accessible."
      - "Usage ponctuel (pas un workflow quotidien comme Pauline)."
      - "Sensibilité prix élevée — le pack Starter doit rester abordable pour un BA solo."
    pack: "Starter (cf. § 4 segments.funnel_entry pricing)"
    hypothesis_for_funnel_role: >
      Le segment Marie peut créer découverte, bouche-à-oreille et
      conversions vers usages récurrents (Pauline ou équipes
      d'investissement légères). Hypothèse GTM, pas porteur de la
      thèse de revenus stratégique seul.

  cross_section_alignment:
    note: >
      §27 reste aligné explicitement avec les sections amont. Toute
      reformulation de Pauline ou Marie doit passer par §3 + §4 +
      §26 sans introduire de claim banni.
    upstream_sources:
      - "§ 3 vision — Pauline porte le besoin, Marie est porte d'entrée acquisition."
      - "§ 4 segments — core_revenue_pool (Pauline) vs funnel_entry (Marie)."
      - "§ 5 interdits — pas 'investit au feeling', pas 'DD VC en 1h'."
      - "§ 20 banned_framings + claims_policy — pas 'ROI obscène', pas '2 jours d'analyste', pas '50+ deals comparables' sans qualification."
      - "§ 26 banned_phrasings_table — 'Vos analystes IA font le travail, vous décidez' banni, persona Marie au centre stratégique banni."
    banned_in_this_section:
      - "'Investit au feeling' (caricature BA + banni doctrine)."
      - "'DD qu'un analyste VC ferait en 2 jours' (gain de temps non sourcé, banni §5)."
      - "'ROI 4 ans rentabilisés' / 'Un mauvais deal évité à 25K€' (claim économique non sourcé, banni §20)."
      - "'50+ deals comparables' sans préciser le statut de la Funding Database (cible / en construction, §4 + §8)."
      - "'Négocie avec les arguments chiffrés d'Angel Desk' (prescriptif — la décision reste à l'investisseur)."
      - "'5-8 minutes' comme promesse de latence sans source (cf. § 10 latency_status pour la nuance code/spec)."

  doctrine_references:
    upstream_sources:
      - "§ 3 ICP + persona principale Pauline / Marie funnel"
      - "§ 4 segments (core_revenue_pool + funnel_entry)"
      - "§ 5 interdits"
      - "§ 20 banned_framings + claims_policy + non_moats_and_risks"
      - "§ 26 banned_phrasings_table + in_app_legacy_feature_names + canonical_public_phrase"
    downstream_surfaces:
      - "Pricing in-app (pack Starter pour Marie ; tiers core pour Pauline et autres lean teams)"
      - "Onboarding personnalisé par persona"
      - "Pitch deck / landing — utiliser Pauline en accroche principale, Marie en variante d'acquisition"
      - "§ 28 GTM — aligné (cf. §28). Cascade doctrinale TERMINÉE pour le périmètre repéré."
    cross_section_updates_applied:
      - "Après écriture §27 : statuts cascade docs-doctrine + reference.yaml §3 header mis à jour pour passer §27 en aligné."


# ============================================================
# 28. GO-TO-MARKET
# ============================================================
# Aligné sur la doctrine du pivot 2026-05-20 (cf. § 3 ICP + § 4 segments +
# § 5 interdits + § 20 banned_framings + § 26 availability_language_rule +
# banned_phrasings_table + § 27 personas + docs-doctrine).
# §28 documente des HYPOTHÈSES GTM, pas une stratégie commerciale prouvée.
# Les chiffres de sales cycle / conversion / channel performance sont à
# valider empiriquement. Surfaces marketing publiques soumises à
# availability_language_rule §26 tant que le gate de release actif n'est
# pas fermé.
# §28 NE DOIT PAS reprendre §21 / §22 / §29 sans audits pricing validés,
# ni §32 legal claims sans audit juridique, ni KPI §33 sans gouvernance
# métrique auditée.
go_to_market:
  positioning_rule: >
    §28 décrit des hypothèses GTM et un cadre de canaux d'acquisition.
    Ce n'est PAS une stratégie commerciale validée ni une prédiction
    de performance. Les chiffres de sales cycle sont indicatifs, à
    valider empiriquement. Toute surface marketing publique mentionnée
    (landing, pricing marketing externe, blog, pitch deck, com
    sortante, emails marketing) reste soumise à
    availability_language_rule §26 — aucun langage de disponibilité
    commerciale tant que le gate de release actif n'est pas fermé.

  segment_alignment:
    note: >
      GTM aligné sur §4 segments. Le centre revenus = core_revenue_pool ;
      la porte d'entrée acquisition bottom-up = funnel_entry (Marie) ;
      les expansions plus tardives = expansion_later. §28 doit traiter
      ces 3 segments comme distincts dans le ciblage et la copy.
    core_revenue_pool:
      description: "Cœur de revenus stratégique (cf. §4 segments.core). Persona principal §27 : Pauline (variantes selon segment)."
      items:
        - "BA très actifs / chefs de syndicat solos"
        - "Angel clubs / syndicats structurés (5-10 membres)"
        - "Micro-fonds VC"
        - "Family offices directs"
        - "Petits fonds thématiques / direct investing"
        - "Équipes M&A légères"
      persona_mapping_note: >
        Pauline (cf. §27 primary_strategic_persona) est portée par
        plusieurs segments du core_revenue_pool selon le contexte
        professionnel : chef de syndicat solo, chef de syndicat
        structuré, responsable d'investissement micro-fonds. Ces
        variantes sont des manifestations de la persona stratégique,
        pas des segments distincts en eux-mêmes.
    funnel_entry:
      description: "Acquisition bottom-up via pack Starter (cf. §4 + §27 funnel_entry_persona Marie). PAS le centre stratégique."
      items:
        - "BA expérimenté/expert via pack Starter (Marie)"
    expansion_later:
      description: "Segments à activer après traction sur core_revenue_pool, pas en priorité GTM phase 1."
      items:
        - "PE / M&A avec infrastructure DD existante"
        - "Fonds VC séries A+"

  acquisition_strategy:
    phase1_funnel_and_core:
      note: >
        Phase d'amorçage. HYPOTHÈSES de canaux, pas stratégie validée.
        À mesurer dès activation des premiers pilotes / dès exposition
        post-gate (cf. measurement_plan).
      strategy_hypothesis: "Hypothèse d'acquisition organique + contenu méthodologique"
      internal_pattern_note: >
        Pattern souvent appelé 'product-led growth' en discussion
        interne ; éviter ce terme en surface publique (vocabulaire GTM
        importé, peu lisible). En interne, OK.
      post_gate_gtm_note: >
        Toute activation publique de cette stratégie reste soumise à
        availability_language_rule §26 tant que le gate de release
        actif n'est pas fermé.
      channels:
        - id: angel_clubs_and_syndicates
          target_segment: "core_revenue_pool (BA très actifs / chefs de syndicat solos ; Angel clubs / syndicats structurés) + funnel_entry (BA expérimentés via Starter)"
          approach: >
            Démo en club / syndicat ; pilote limité sur dossiers réels,
            volume et modalités à définir. Pas de claim public d'offre
            commerciale tant que le gate de release actif n'est pas
            fermé (cf. §26 availability_language_rule + §21 pricing non
            aligné). Le label produit utilisé en interne est 'Deep Dive'
            (in-app legacy §26 in_app_legacy_feature_names).
          audience_role: >
            Le chef de syndicat est l'interlocuteur / opérateur
            principal ; la décision d'achat dépend de la structure du
            club ou syndicat (décision collective, mandat individuel,
            ou structure mixte).
          hypothesis: >
            Hypothèse de propagation au sein des clubs / syndicats (un
            chef de syndicat convaincu peut amener son équipe à
            l'utiliser). Effet de réseau NON DÉMONTRÉ — à mesurer.
          status: "Hypothèse GTM, à valider"
        - id: linkedin_thought_leadership
          target_segment: "core_revenue_pool + funnel_entry"
          approach: >
            Contenu sur la méthodologie d'analyse rigoureuse pour
            équipes d'investissement légères : qualification
            documentaire, contradictions détectées, zones d'incertitude,
            fraîcheur des données. PAS de claim ROI / vitesse oraculaire.
            Cohérent avec §26 banned_phrasings_table.
          status: "Hypothèse GTM, à valider"
        - id: accelerator_partnerships
          target_segment: >
            Réseaux investisseurs associés aux accélérateurs, lorsqu'ils
            existent et sont structurés (PAS 'BA membres
            d'accélérateurs' brut — les accélérateurs ont surtout
            startups, mentors, et parfois un réseau investisseur
            structuré, parfois pas).
          approach: >
            Présence dans les accélérateurs uniquement lorsque
            l'accélérateur dispose d'un réseau investisseur structuré ;
            support analytique présenté à ces réseaux investisseurs
            associés, sans recommandation ni endorsement implicite. Pas
            'outil recommandé' (sonne endorsement).
          no_partnership_claim: >
            Aucun partenariat acquis à date. Pas de mention publique de
            partenariat avec un accélérateur tant qu'il n'y a pas
            accord signé ET autorisation explicite de communication
            (cf. organization_naming_rule).
          status: "Hypothèse GTM, à valider"
        - id: lean_investment_team_communities
          target_segment: "core_revenue_pool (chefs de syndicat structurés, micro-fonds, family offices, équipes M&A légères)"
          approach: >
            Présence dans les communautés où ces personas se trouvent
            (France Angels, EBAN, communautés syndicat / micro-fonds /
            family office). Centré sur le centre stratégique, PAS sur
            la concentration BA solo (cf. §4 + §27).
          status: "Hypothèse GTM, à valider"
        - id: referral_program
          target_segment: "Tous segments — mécanisme cross-segment"
          approach: >
            Mécanique de parrainage à tester ; modalités, coût et
            conformité pricing à définir. Pas de claim 'meilleur
            canal' — un canal de découverte parmi d'autres,
            performance à mesurer.
          no_offer_commitment: >
            Aucune offre commerciale spécifique (crédit, avantage
            produit, mois gratuits) n'est fixée à date. Toute mention
            publique d'une offre référée nécessite design + conformité
            pricing + alignement avec availability_language_rule §26.
          status: "Hypothèse GTM, à valider"
        - id: ma_light_teams
          target_segment: "core_revenue_pool (Équipes M&A légères — cf. §4 segments)"
          approach: >
            Approche directe via communautés M&A boutique / cabinets
            indépendants. Outil positionné comme support analytique
            pour deal preparation, pas comme outil de pricing ou
            négociation.
          hypothesis: >
            Hypothèse : les équipes M&A légères partagent les pain
            points des équipes d'investissement légères (volume vs
            capacité analytique). À valider.
          status: "Hypothèse GTM, à valider"
    phase2_expansion:
      note: >
        Activable APRÈS traction démontrée sur core_revenue_pool. Pas
        en priorité phase 1 — segments avec cycles de vente longs et
        besoins custom non encore couverts par le produit.
      strategy_hypothesis: "Prospection ciblée + partenariats institutionnels à explorer (hypothèses phase 2)"
      channels:
        - id: vc_pe_funds_series_a_plus
          target_segment: "expansion_later (Fonds VC séries A+ / PE)"
          approach: >
            Démo ciblée aux équipes d'analyse / partners. À traiter
            après stabilisation produit et démonstration de valeur sur
            core.
          status: "Hypothèse GTM phase 2"
        - id: pe_ma_with_existing_dd_infra
          target_segment: "expansion_later (PE / M&A avec infrastructure DD existante — cf. §4)"
          approach: >
            Cycles de vente longs, besoins custom. À traiter après
            stabilisation produit et démonstration de valeur sur core.
          status: "Hypothèse GTM phase 2"
        - id: public_programs
          target_segment: "Canal d'intermédiation, pas un segment §4."
          approach: >
            Référencement éventuel comme support analytique dans des
            programmes institutionnels (BPI, autres).
          no_partnership_claim: >
            Aucun claim de partenariat acquis tant qu'il n'y a pas
            accord signé ET autorisation explicite de communication.
            Pas de mention publique avant accord effectif.
          status: "Hypothèse GTM phase 2"

  planning_assumptions:
    note: >
      Hypothèses internes de durée de cycle de vente par segment. AUCUNE
      cohorte observée à date. Ces durées ne sont PAS un runtime
      garanti, PAS une promesse commerciale, PAS du copy public. À
      VALIDER empiriquement (cf. measurement_plan).
    not_for_public_copy: true
    cycle_start_definition: >
      Le point de départ du cycle pour toutes les hypothèses ci-dessous
      est la PREMIÈRE OPPORTUNITÉ QUALIFIÉE — c'est-à-dire le premier
      contact ou signup avec intention manifeste d'évaluation produit.
      PAS une simple visite web, PAS un contact ambigu, PAS un download
      de whitepaper isolé.
    assumptions:
      - segment: "BA expérimenté (Marie / funnel_entry)"
        expected_range: "1-3 jours (essai → achat)"
        source_status: "hypothèse interne, aucune cohorte suffisante"
        not_for_public_copy: true
      - segment: "Chef de syndicat structuré / angel club"
        expected_range: "2-4 semaines (démo → essai sur dossier réel → décision)"
        source_status: "hypothèse interne, aucune cohorte suffisante"
        not_for_public_copy: true
      - segment: "Micro-fonds VC (core_revenue_pool)"
        expected_range: "1-3 mois (démo → essai → décision interne)"
        source_status: "hypothèse interne, aucune cohorte suffisante"
        not_for_public_copy: true
      - segment: "PE / M&A avec infrastructure DD existante / VC séries A+ (expansion_later)"
        expected_range: "3-6 mois (RFP → POC → intégration)"
        source_status: "hypothèse interne, phase 2, aucune cohorte"
        not_for_public_copy: true

  pricing_reference:
    note: >
      Pricing détaillé dans §4 segments (pack Starter pour
      funnel_entry ; bandes core_revenue_pool 200-500€/dossier syndicat
      solo, 500-1,500€/dossier club structuré, 2,000-5,000€/mois
      micro-fonds VC). §28 ne duplique PAS cette table — la source de
      vérité reste §4.
    cross_reference: "§4 segments + §27 primary_strategic_persona.pricing_band."

  pricing_section_alignment_status:
    status: >
      §21 pricing, §22 add-ons ET §29 unit economics — TOUS alignés
      (cf. §21 v3 + §22 v3 + §29 v3). La doctrine pricing transforme
      ces sections en matrices d'audit pour les claims runtime /
      Stripe / unit economics / feature access / refund, et interdit
      les claims publics non prouvés.
    rule_for_section_28: >
      §28 NE DOIT PAS reprendre les éléments pricing de §21 / §22 ni
      unit economics de §29 sans vérifier qu'ils ont passé les audits
      listés (runtime_pricing_source_of_truth, billing_integration_status,
      credit_pack_dual_source_to_audit, price_unit_policy_to_audit,
      etc.). Aucun claim public n'est autorisé tant qu'il n'a pas
      passé l'audit §21 / §22 / §29.
    cross_reference: "§21 + §22 + §29 alignés ; couple pricing désormais auto-cohérent."

  kpi_section_alignment_status:
    status: >
      §33 KPI — aligné (cf. §33 v2). §33 consolide la gouvernance des
      métriques sous forme de matrice (definition + owner + source +
      cadence + segment + statut + public_claim_status).
    scope_distinction:
      section_28_measurement_plan: >
        Grille provisoire de VALIDATION des hypothèses GTM listées en
        §28 acquisition_strategy + planning_assumptions.
      section_33_kpi_section: >
        Gouvernance KPI complète. §33 consolide §28 measurement_plan
        (validation hypothèses GTM) en y ajoutant la gouvernance
        complète. §33 N'ABSORBE PAS §28 — les deux coexistent.
    rule: >
      §28 measurement_plan reste source de vérité du contexte
      validation_hypothèses_GTM ; §33 est source de vérité de la
      gouvernance des métriques. Toute mise à jour de métrique
      partagée doit être propagée dans les deux sections.
    cross_reference: "§33 metrics_registry + relationship_to_section_28."

  legal_section_alignment_status:
    status: >
      §32 Legal & Compliance — aligné (cf. §32 v3). La doctrine §32
      interdit les claims juridiques non prouvés (IR-PME, EIS,
      'système d'audit trail officiel', 'Row-level security via
      userId', 'Pas de training sur les données utilisateur', 'export
      complet des données') et transforme §32 en matrice d'audit pour
      les claims runtime / infrastructure / data flow.
    rule_for_section_28: >
      §28 NE DOIT PAS reprendre les claims légaux / conformité de §32
      en copy GTM sans vérifier qu'ils ont passé l'audit §32. Aucun
      claim de conformité réglementaire spécifique (IR-PME, EIS,
      autre) n'est autorisé sans base juridique formelle et avis
      juridique externe.
    cross_reference: >
      §32 aligné. Cohérence avec §20
      auditability_positioning.not_a_legal_claim + §20 banned_framings.

  organization_naming_rule:
    note: >
      Les mentions d'organisations tierces dans §28 (France Angels,
      EBAN, Station F, Techstars, BPI, angel.co, autres accélérateurs
      / clubs / programmes publics) désignent des écosystèmes de
      référence pour cibler / contacter.
    rule: >
      AUCUN partenariat, AUCUNE affiliation, AUCUN référencement n'est
      acquis tant que rien n'est signé ; ET AUCUNE mention publique
      n'est autorisée sans : (a) accord signé ET (b) autorisation
      explicite de communication par l'organisation concernée. Un
      partenariat peut être signé sans être publiquement communicable
      — les deux conditions sont nécessaires.
    banned_implications:
      - "'Partenariat avec [Org]' sans accord signé + autorisation explicite de communication"
      - "'Recommandé par [Org]' sans accord signé + autorisation explicite de communication"
      - "'Référencé par [Org]' sans accord signé + autorisation explicite de communication"
      - "Toute formulation suggérant traction ou endorsement par naming seul"

  gtm_claims_policy:
    note: >
      Liste explicite des claims interdits dans toute copy GTM
      (landing, blog, pitch deck, com sortante, emails marketing).
      Repris de §5 + §20 + §26 banned_phrasings_table + §27
      banned_in_this_section.
    banned_in_gtm:
      - "ROI obscène / 'X mois rentabilisés' / 'Un mauvais deal évité à 25K€' (claim économique non sourcé, banni §20 + §26)."
      - "Disponibilité commerciale en marketing public : 'live now', 'produit lancé', 'service lancé', 'lancement public', 'available now', 'disponible dès maintenant', 'prêt à utiliser', 'release-complete' (cf. §26 availability_language_rule). Le mot 'live' brut N'EST PAS banni — Live Coaching, live sessions, statuts applicatifs runtime restent légitimes."
      - "'Le meilleur' / 'parfait' / 'surhumain' / 'imbattable' / 'infalsifiable' / superlatifs en accroche (cf. §5 interdits + §20 banned_framings)."
      - "'BA solo' au centre stratégique (cf. §27 — Marie est funnel_entry, Pauline est core)."
      - "'Effet de réseau garanti' / 'un BA convaincu = tout le club' (hypothèse non démontrée — à valider)."
      - "'5-8 minutes' / 'DD en 1h' / '2 jours d'analyste' (claims temps non sourcés, banni §26 banned_phrasings_table)."
      - "'Vos analystes IA font le travail, vous décidez' (sonne remplacement humain ET disponibilité — banni §26)."
      - "'Le BA convaincu est le meilleur vendeur' / 'meilleur canal' (superlatif non sourcé)."
      - "Présenter les suggestions de négociation comme consignes, garanties ou décisions à suivre — la décision reste à l'investisseur. Remplacement public : 'repères de négociation sourcés'."
      - "'Sublimation' / 'intelligence collective émergente' / 'wisdom of crowds' (registre magique, banni §5 + §9 limits)."
      - "Nombre brut '44 agents' / '22 experts sectoriels' / '60+ fichiers' en accroche (cf. §26 internal_terms_banned_in_public + quantified_claims_policy + §20 claims_policy)."
      - "'20 agents / 41 expertises disponibles' (claim pricing actuel non sourcé) — cf. §26 quantified_claims_policy + §20 claims_policy ; à requalifier ou retirer avant exposition publique."
      - "'5,000+ deals' (Funding Database) sans qualification 'cible / en construction' — cf. §4 + §8 + §26 quantified_claims_policy + §20 claims_policy ; toujours préciser le statut si mentionné."
      - "'Offre d'essai', 'mois gratuit', 'crédit offert', 'Deep Dive offert', 'free tier' = à ne pas publier tant que pricing / gate non validés (cf. §21 matrice d'audit + §26 availability_language_rule)."
      - "Comparaisons multiplicatives type '5-10x moins cher' / 'fait PLUS qu'un analyste' = à ne pas reprendre sans audit pricing + preuve méthodologique (cf. §21 + §29)."
      - "Claims légaux / conformité ('IR-PME', 'EIS', 'audit trail officiel', 'outil de référence pour la conformité') = bannis sans base juridique formelle + avis externe (cf. §20 + §32)."
      - "'Outil recommandé' / 'recommandé par [Org]' / 'référencé par [Org]' tant que rien n'est officiellement signé ET autorisé en communication (sonne endorsement / partenariat acquis)."

  measurement_plan:
    note: >
      §28 décrit des hypothèses GTM. Les valider requiert des métriques
      de cohorte sur volume représentatif. Liste minimale des
      métriques à instrumenter pour ne pas laisser 'à valider'
      décoratif.
    metrics:
      - id: activation
        definition: "Premier usage produit complet après création de compte."
        numerator: "Comptes ayant complété au moins une analyse approfondie multi-couches (Deep Dive) sur un dossier réel."
        denominator: "Comptes créés sur la fenêtre considérée."
        segment: "Découpé par funnel_entry (Marie) vs core_revenue_pool (variantes Pauline)."
        time_window: "J+7 / J+14 / J+30 après création de compte."
        data_source: "DB applicative (events analyse lancée + complétée)."
      - id: qualified_opportunity_rate
        definition: >
          Part des leads d'un canal qui deviennent opportunités
          qualifiées selon cycle_start_definition (première opportunité
          qualifiée = premier contact / signup avec intention manifeste
          d'évaluation produit).
        numerator: "Leads ayant atteint le statut opportunité qualifiée sur la fenêtre."
        denominator: "Total leads attribués au canal sur la fenêtre."
        segment: "Par canal d'acquisition × par segment cible."
        time_window: "Cohorte trimestrielle minimale."
        data_source: "Tracking source d'acquisition + CRM."
        aggregate_measures:
          - "Taux brut (numerator / denominator)"
          - "Comparaison inter-canaux (un canal peut générer beaucoup de leads mais peu de qualifiés)"
        rationale: >
          Permet de distinguer qualité vs volume d'un canal. À mesurer
          en complément de conversion_per_channel — un canal performant
          en volume peut être mauvais en qualité, et vice-versa.
      - id: conversion_per_channel
        definition: "Taux de progression lead → utilisateur actif → utilisateur payant, par canal d'acquisition."
        numerator: "Pour chaque canal listé en acquisition_strategy : conversions à chaque étape."
        denominator: "Leads attribués au canal sur la fenêtre."
        segment: "Par canal × par segment cible (funnel vs core)."
        time_window: "Cohorte trimestrielle minimale."
        data_source: "Tracking source d'acquisition + DB applicative."
      - id: sales_cycle_observed
        definition: "Durée écoulée entre première opportunité qualifiée et conversion payante."
        population: "Opportunités qualifiées converties dans la cohorte."
        measure: "Durée (jours) entre première opportunité qualifiée et conversion payante, par opportunité convertie."
        aggregates:
          - "Médiane (mesure centrale robuste aux outliers)"
          - "P75 / P90 (queue de distribution — combien de temps prennent les 25% / 10% les plus lents ?)"
          - "Moyenne (optionnelle, sensible aux outliers)"
        segment: "Par segment cible."
        time_window: "Cohorte par trimestre d'entrée dans le funnel."
        data_source: "CRM / DB applicative."
        cycle_start_definition: >
          Première opportunité QUALIFIÉE = premier contact / signup
          avec intention manifeste d'évaluation produit. PAS une simple
          visite web ni un contact ambigu.
      - id: cac_per_segment
        definition: "Coût d'acquisition par segment."
        numerator: "Coûts marketing + sales attribuables au segment sur la fenêtre."
        denominator: "Nouveaux utilisateurs payants du segment sur la fenêtre."
        segment: "Marie funnel_entry vs variantes Pauline core_revenue_pool."
        time_window: "Trimestriel minimum."
        data_source: "Comptabilité analytique + CRM."
      - id: recurring_usage
        definition: "Volume d'analyses par utilisateur payant, par mois."
        numerator: "Somme des analyses complétées par les utilisateurs payants actifs sur le mois."
        denominator: "Utilisateurs payants actifs sur le mois."
        segment: "Par segment + par tranche d'ancienneté."
        time_window: "Mensuel."
        data_source: "DB applicative."
        aggregate_measures:
          - "Moyenne par utilisateur actif"
          - "Médiane par utilisateur actif"
          - "% utilisateurs payants actifs vs total utilisateurs payants"
      - id: retention
        definition: "% d'utilisateurs payants actifs à J+30 / J+90 / J+180 / J+365."
        numerator: "Utilisateurs payants ayant utilisé le produit dans la fenêtre."
        denominator: "Utilisateurs payants initialement convertis dans la cohorte."
        segment: "Par cohorte d'entrée × par segment."
        time_window: "30 / 90 / 180 / 365 jours après conversion."
        data_source: "DB applicative."
      - id: funnel_progression
        definition: "Taux de passage Marie (funnel_entry pack Starter) → usage / compte rattaché au core_revenue_pool."
        numerator: "Comptes initialement funnel_entry requalifiés ou convertis vers un segment core_revenue_pool sur la fenêtre."
        denominator: "Comptes funnel_entry actifs en début de fenêtre."
        segment: "Marie → variantes Pauline / autres segments core."
        time_window: "Annuel."
        data_source: "DB applicative + CRM."
    public_claim_threshold:
      rule: >
        Aucun claim public de conversion, sales cycle, CAC, rétention,
        activation ou progression funnel tant que : (a) un volume
        représentatif d'opportunités qualifiées par segment a été
        observé — N à définir par segment ET par métrique, en fonction
        de la méthodologie statistique retenue (PAS de seuil standard
        prédéfini) ; (b) une cohorte documentée existe sur la métrique
        en question ; (c) la méthodologie de mesure est rendue
        auditable (définition opérationnelle de chaque métrique +
        scope temporel).
      before_threshold: >
        Avant ce seuil : chiffres strictement internes,
        not_for_public_copy: true ; pas de citation dans landing /
        pricing externe / blog / pitch deck / com sortante.
      cross_reference: >
        Cohérent avec §26 banned_phrasings_table (claims chiffrés non
        sourcés bannis) + §20 claims_policy (méthodologie de
        validation obligatoire).
    status: >
      Plan à instrumenter — aucune cohorte observée à date. Cibles
      chiffrées à définir après baseline.

  cross_section_alignment:
    note: >
      Toute copy GTM dérivée de §28 doit passer par §3 + §4 + §26 + §27
      sans introduire de claim banni. Audit obligatoire avant
      publication.
    upstream_sources:
      - "§3 vision + canonical_public_phrase (catégorie + promesse publique)"
      - "§4 segments (core_revenue_pool + funnel_entry + expansion_later)"
      - "§5 interdits"
      - "§20 banned_framings + claims_policy + auditability_positioning"
      - "§26 banned_phrasings_table + availability_language_rule + internal_terms_banned_in_public + quantified_claims_policy"
      - "§27 personas (Pauline core + Marie funnel) + banned_in_this_section"
    surfaces_to_audit_for_drift:
      - "Landing page (avant login) — soumise à availability_language_rule §26"
      - "Pricing marketing externe — pas de claim ROI / 'rentabilisé' ; tout élément issu de §21 / §22 / §29 doit avoir passé les audits listés dans ces matrices avant usage public"
      - "Blog — pas de claims oraculaires sur la rapidité ou la couverture"
      - "Pitch deck — slide 1 ne mentionne PAS 44 agents ni Evidence Engine ; persona Pauline en accroche, pas Marie"
      - "Emails marketing / com sortante — soumis à banned_in_gtm"
      - "Pages produit Live Coaching / AI Board / Deep Dive — labels in-app actuels, soumis à decision_required §26 in_app_legacy_feature_names"

  doctrine_references:
    upstream_sources:
      - "§3 ICP + canonical_public_phrase"
      - "§4 segments (core_revenue_pool + funnel_entry + expansion_later)"
      - "§5 interdits (tolérance zéro)"
      - "§20 banned_framings + claims_policy + non_moats_and_risks + auditability_positioning"
      - "§26 banned_phrasings_table + availability_language_rule + internal_terms_banned_in_public + quantified_claims_policy"
      - "§27 personas Pauline + Marie + banned_in_this_section"
    downstream_surfaces:
      - "Landing / Pricing externe / Blog / Pitch deck / Emails marketing"
