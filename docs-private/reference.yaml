# ============================================================
# 31. TRACTION & MÉTRIQUES
# ============================================================
# Aligné sur la doctrine du pivot 2026-05-20 (cf. §3 + §7 + §19 +
# §21 + §22 + §26 + §28 + §29 + §32 + docs-doctrine).
# §31 documente l'état traction interne sous forme de MATRICE D'AUDIT
# (snapshot à un instant t). §31 N'EST PAS un document de copy publique.
# §31 N'EST PAS un certificat de complétude produit ; §31 NE REMPLACE PAS
# §34 Roadmap (désormais alignée comme matrice d'hypothèses).
traction:
  positioning_rule: >
    §31 = état interne traction + product status. PAS de copy publique
    dérivée sans audit + §28 public_claim_threshold + §26
    quantified_claims_policy + §19 coverage_audit. Aucune accroche
    publique ne reprend les nombres bruts de §31 (44 agents, 22
    experts, 60+ fichiers, 40+ connecteurs, etc.) en hero.
  not_for_public_copy: true

  current_traction_to_verify:
    note: >
      Snapshot traction à un instant t. Chaque champ ci-dessous doit
      avoir une source vérifiable et un last_verified_at à chaque
      update. Les valeurs zéro restent des claims à vérifier vs la
      source de vérité runtime.
    users_to_verify:
      value: 0
      source: "À documenter : DB applicative (utilisateurs Clerk vs prisma.user.count())."
      owner: "À documenter : qui maintient ce snapshot ?"
      last_verified_at: "À documenter — date du dernier check vs DB."
    revenue_eur_to_verify:
      value: 0
      source: "À documenter : prisma.creditTransaction (revenu effectif). NUANCE : cohérent avec §21 billing_integration_status (pas de checkout Stripe actif, flow mailto:)."
      owner: "À documenter."
      last_verified_at: "À documenter."
    waitlist_to_verify:
      value: 0
      source: "À documenter : confirmer présence ou absence d'une table waitlist runtime."
      owner: "À documenter."
      last_verified_at: "À documenter."
    stage_status: "pre-gate (avant fermeture du gate de release actif — cf. §26 availability_language_rule)"
    snapshot_date: "À mettre à jour à chaque update §31."
    audit_required:
      - "Requête DB utilisateurs actifs vs utilisateurs créés."
      - "Requête DB CreditTransaction.amount (revenu effectif vs 0)."
      - "Confirmer absence ou présence d'une table waitlist runtime."

  product_claims_to_audit:
    note: >
      Liste interne des claims produit, classés par statut de
      vérification. Les nombres bruts (44 agents, 22 experts, 60+
      fichiers, 40+ connecteurs) sont des conventions internes (cf.
      §7 counting_note) — interdits en accroche (cf. §26
      banned_only_as_hero_or_accroche).
    runtime_surfaces_to_verify:
      note: >
        Briques observables côté code mais nécessitant un audit
        runtime explicite avant claim de complétude.
      items:
        - "Chat IA contextuel (cf. composants chat in-app)."
        - "Export PDF (cf. src/lib/pdf/*) — mentions légales et watermark à auditer pour la page user-facing."
    partially_implemented:
      note: >
        Briques avec implémentation partielle ou conditionnelle.
      items:
        - "Vérification des preuves en temps réel pendant l'appel fondateur (nom interne : Live Coaching v2). Disponibilité du contexte pré-call variable selon le chemin d'exécution (cf. §10 runtime_context_paths)."
        - "Surface API / webhooks à vérifier ; gate runtime identifié totalPurchased ≥ 125 (Expert+ lifetime — cf. §22 + §32 external_api_and_webhooks_to_audit). NUANCE : l'add-on API payant *49€/mois Standard lifetime* N'EST PAS implémenté. PAS *API commercialement disponible* — accès lifetime uniquement."
        - "Repères de négociation sourcés (anciennement *stratégie de négociation automatisée*). Code présent ; vocabulaire *automatisée* retiré (cf. §27 banned_in_this_section)."
        - "Système de crédits — runtime ACTIF (cf. §21 runtime_pricing_source_of_truth, src/services/credits/types.ts). NUANCE : checkout Stripe absent ; flow d'achat = mailto: (cf. §21 billing_integration_status) ; billing commercial non automatisé."
    doctrinal_claim_only:
      note: >
        Claims doctrinaux dont la mesure runtime n'a pas été auditée
        ou nécessite recomptage explicite.
      items:
        - "Architecture en 4 couches — 44 agents / composants selon convention §7 (3 + 13 + 22 + 6 ; thesis-reconciler conditionnel hors total). Convention historique d'architecture, à auditer côté code agent par agent."
        - "Mécanismes de mise en regard structurée des contradictions inter-agents (Consensus Engine — cf. §11)."
        - "Auto-critique itérative des sorties (Reflexion Engine — cf. §11)."
        - "5 directives anti-hallucination déployées dans les prompts agents concernés — couverture *60+ fichiers* À RECOMPTER (cf. §19 coverage_audit)."
        - "Débat multi-modèle (Board AI — cf. §9)."
        - "Lentilles sectorielles activables contextuellement : 21 spécialisées + 1 fallback general-expert (cf. §7). Claim brut *22 experts sectoriels* banni en accroche (cf. §26 banned_only_as_hero_or_accroche)."
    unknown_until_code_audit:
      note: >
        Briques ou claims dont l'état runtime nécessite audit code
        complet.
      items:
        - "Connecteurs Context Engine — claim *40+ connecteurs* à compter exhaustivement (grep src/services/context-engine/connectors/)."
        - "Waitlist runtime : présence et état de la table à vérifier (cf. current_traction_to_verify.waitlist_to_verify)."
        - "Repreneur / continuité opérationnelle : pas de claim, audit code à mener pour estimer la difficulté d'un takeover."
    banned_completeness_claims:
      - "*MVP fonctionnel complet* (claim de complétude non auditable)."
      - "*Orchestration complète* (idem)."
      - "*Stratégie de négociation automatisée* (terminologie *automatisée* retirée — suggère remplacement humain)."

  relationship_to_section_33:
    note: >
      §31 = snapshot traction + product status à un instant t. §33 =
      gouvernance KPI continue (désormais alignée). §31 NE REMPLACE
      PAS §33 ; §33 NE REMPLACE PAS §31.
    rule: >
      §31 documente l'état observable au snapshot ; §33 définit la
      gouvernance complète des métriques (owner, source, cadence,
      seuils, statut d'audit). Les chiffres §31 doivent être
      recalculés par §33 metrics avec leur cadence respective.
    cross_reference: "§33 relationship_to_section_31 + §28 kpi_section_alignment_status (aligné)."

  relationship_to_section_34:
    note: >
      §31 = état observable au snapshot ; §34 = matrice d'hypothèses
      roadmap (désormais alignée).
    rule: >
      §31 documente l'état observable ; §34 documente des hypothèses
      futures sous forme de matrice. §34 N'EST PAS une
      rétro-justification de §31. Les items §34 `existing_to_verify`
      renvoient aux statuts §31 product_claims_to_audit, PAS l'inverse.
    cross_reference: "§34 roadmap_items_to_audit + relationship_to_section_31."

  banned_in_public_copy:
    note: >
      Phrases / chiffres bannis pour toute copy publique dérivée de §31.
    items:
      - "Nombres bruts *44 agents* / *22 experts* / *60+ fichiers* / *40+ connecteurs* en accroche (cf. §26 banned_only_as_hero_or_accroche + quantified_claims_policy + §28 banned_in_gtm)."
      - "Noms internes *Board AI* / *Live Coaching* / *Consensus Engine* / *Reflexion Engine* en marketing public (cf. §26 internal_terms_banned_in_public.public_marketing_surfaces)."
      - "*Stratégie de négociation automatisée* (le mot *automatisée* suggère remplacement humain)."
      - "*MVP fonctionnel complet* / *orchestration complète* (claims de complétude non auditables)."
      - "*22 experts sectoriels* sans qualification *21 spécialisées + general-expert fallback* (cf. §7 reframes)."
      - "*API v1 commercialement disponible* (cf. partially_implemented — gate Expert+ lifetime, add-on payant non implémenté)."

  cross_section_alignment:
    upstream_sources:
      - "§3 + §7 reframes + counting_note"
      - "§19 coverage_audit"
      - "§21 + §22 + §29 (pricing matrices d'audit) + §21 billing_integration_status"
      - "§26 banned_phrasings_table + internal_terms_banned_in_public + quantified_claims_policy + availability_language_rule"
      - "§28 measurement_plan + public_claim_threshold + banned_in_gtm + kpi_section_alignment_status"
      - "§32 external_api_and_webhooks_to_audit + llm_logging_policy"
    code_audit_required:
      - "Comptage des fichiers contenant les 5 directives (cf. §19 coverage_audit) — claim *60+ fichiers* à recompter."
      - "Comptage des connecteurs Context Engine réellement actifs runtime — claim *40+* à auditer."
      - "Inventaire des 22 lentilles sectorielles (21 spécialisées + general-expert) et leur activation contextuelle."
      - "Audit code agent par agent : convention §7 vs runtime réel."
      - "Vérification snapshot users / revenue / waitlist vs DB."

  doctrine_references:
    used_by:
      - "Pitch deck slide *État produit* (soumis à banned_in_public_copy)"
      - "Investor brief interne (sans copy publique dérivée sans audit)"
      - "Recrutement / partenariats (claims chiffrés à auditer)"
    cross_section_updates_applied:
      - "§31 aligné ; §34 puis §33 ont ensuite été refondus. Cascade doctrinale TERMINÉE pour le périmètre repéré."


# ============================================================
# 32. LEGAL & COMPLIANCE
# ============================================================
# Aligné sur la doctrine du pivot 2026-05-20 (cf. § 3 + § 5 + § 20
# auditability_positioning.not_a_legal_claim + § 26 banned_phrasings_table
# + § 28 legal_section_alignment_status + docs-doctrine).
# §32 transforme la section en MATRICE D'AUDIT pour les claims runtime /
# infrastructure / data flow / juridiques. §32 N'EST PAS un document de
# conformité réglementaire et NE GARANTIT pas la conformité / privacy ;
# §32 INTERDIT les claims non prouvés et liste les surfaces à auditer.
# Bannis dans §32 : "audit trail officiel", "compatible IR-PME",
# "compatible EIS", "Row-level security via userId", "Pas de training
# sur les données utilisateur", "export complet des données", claims de
# conformité réglementaire spécifique sans base juridique formelle.
legal:
  positioning_rule: >
    §32 décrit des choix techniques observables sur la protection des
    données, la confidentialité runtime et le traitement par les
    fournisseurs LLM, sous forme de MATRICE D'AUDIT. §32 N'EST PAS un
    document de conformité réglementaire. Aucun claim de conformité à
    un régime spécifique (IR-PME, EIS, autre) ne peut figurer ici sans
    base juridique formelle et avis juridique externe. §32 ne se
    positionne PAS comme "système d'audit trail officiel des décisions
    d'investissement" — cf. §20 auditability_positioning.not_a_legal_claim.
    §32 NE GARANTIT pas la conformité ni la privacy ; §32 documente ce
    qu'il faut auditer et interdit les claims non prouvés.

  privacy_and_data_handling:
    note: >
      Choix techniques observables. Chaque ligne est un claim à
      VÉRIFIER côté code / infrastructure avant tout usage doctrinal
      externe (cf. code_audit_required).
    data_storage:
      current_claim_to_audit: "PostgreSQL hébergé sur Neon."
      target_claim_to_verify: "Région européenne — à confirmer par la configuration Neon réelle, par environnement (dev / staging / prod)."
      audit_required: "Vérifier la région de provisioning Neon et la documenter par environnement."
    data_processing:
      current_claim_to_audit: "Appels LLM routés via OpenRouter ; les données traversent les providers LLM ciblés par OpenRouter selon le modèle utilisé."
      audit_required: "Documenter par modèle le provider effectivement routé et sa data policy (cf. llm_data_policies)."
    data_retention:
      current_claim_to_audit: "Politique de rétention par défaut + suppression à la demande utilisateur."
      target_claim_to_verify: "TTL effectifs par entité (deal, analyse, document, transcript live, board events) + jobs de nettoyage automatique + procédure de suppression manuelle, documentés par environnement."
      audit_required: "Lister les TTL effectifs et procédures."
    right_to_deletion:
      current_claim_to_audit: "Chemins de suppression implémentés (deal + utilisateur)."
      target_claim_to_verify: "Couverture entité par entité à auditer — pas de claim 'suppression complète garantie'."
      code_references:
        - "src/app/api/deals/[dealId]/route.ts:266 — DELETE deal : vérifie l'ownership, supprime blobs best-effort, prisma.deal.delete via cascade Prisma."
        - "src/app/api/user/route.ts:7 — DELETE user (suppression plus large)."
      audit_required:
        entity_cascade:
          - "Analyses Tier 0/1/2/3, documents associés, transcripts Live Coaching, événements Board AI, métadonnées extraction, données dérivées persistées, exports PDF / blobs Vercel."
        derived_traces_to_include:
          - "Logs LLM persistés (cf. llm_logging_policy + LLM_LOG_RAW_TEXT)."
          - "Traces des appels directs hors router (cf. llm_data_policies.openrouter_layer.direct_callers_bypassing_router) — leurs logs et payloads doivent aussi être soumis à la suppression utilisateur."
          - "Caches éventuels (extractedText, ocrText, evidence signals, embeddings, comparables Funding DB référençant le deal)."
          - "Logs applicatifs avec données utilisateur (cf. application_logs_to_audit)."
          - "Exports RGPD générés précédemment (cf. data_portability_surface_to_audit)."
          - "Configurations webhooks et payloads associés (cf. external_api_and_webhooks_to_audit)."

  llm_data_policies:
    note: >
      L'utilisation d'OpenRouter implique un routage vers plusieurs
      fournisseurs LLM. Chaque provider applique sa propre data policy.
      Le filtrage des données et le ZDR (Zero Data Retention) dépendent
      de paramètres explicites de l'appel API et/ou de la configuration
      du compte OpenRouter.
    openrouter_layer:
      current_claim_to_audit: "OpenRouter peut conserver ou non les requêtes / réponses selon les paramètres data_collection / zdr et la configuration du compte."
      code_evidence:
        - "src/services/openrouter/router.ts:415 — appel OpenRouter routeur central : NE PASSE PAS 'data_collection: deny' ni 'zdr: true' côté requête."
      direct_callers_bypassing_router:
        note: >
          Plusieurs fichiers font des appels OpenRouter directs qui
          BYPASSENT le router central et potentiellement les garanties
          data_collection / zdr. Chaque appel direct doit être audité
          individuellement.
        files:
          - "src/agents/maintenance/db-completer/llm-extract.ts"
          - "src/agents/maintenance/db-sourcer/llm-parser.ts"
          - "src/agents/tier1/competitive-intel.ts"
          - "src/services/fact-checking/index.ts"
          - "src/services/benchmarks/dynamic-benchmarks.ts"
          - "src/services/context-engine/connectors/web-search.ts"
          - "src/services/pdf/image-ocr.ts"
          - "src/services/pdf/ocr-service.ts"
          - "scripts/* — scripts utilisant OpenRouter, à classer par environnement (prod / debug / maintenance)"
        audit_required: >
          Pour chaque fichier : vérifier que data_collection: deny /
          zdr: true / config équivalente est passée. Sinon, soit
          refactoriser via le router central, soit ajouter la config
          inline, soit documenter l'exemption.
      audit_required:
        - "Vérifier si une configuration account-level OpenRouter force data_collection: deny ou zdr."
        - "Si non : passer ces paramètres dans chaque appel via le code OU forcer la config compte."
        - "Versionner les snapshots de policy OpenRouter (capture datée)."
      doc_references:
        - "https://openrouter.ai/docs/guides/privacy/data-collection/"
        - "https://openrouter.ai/docs/guides/privacy/provider-logging"
        - "https://openrouter.ai/docs/guides/routing/provider-selection/"
    downstream_providers:
      rule: >
        Chaque provider downstream (Anthropic Claude, OpenAI, Google,
        etc.) a sa propre data policy. Aucun claim global "pas de
        training sur les données utilisateur" ne peut être fait sans
        (a) qualifier provider par provider, version par version de
        leur policy ; ET (b) prouver que le routage code force le
        filtrage data / provider selon ces policies.
      audit_required: >
        Maintenir une matrice provider × policy datée (snapshot), et
        vérifier qu'aucun provider effectivement routé n'a un opt-in
        training par défaut sur les requêtes Angel Desk SANS qu'une
        config code force le filtrage.
    user_data_in_prompts:
      caveat: >
        Les prompts envoyés aux providers contiennent les éléments du
        dossier utilisateur nécessaires à l'analyse. Ces données
        traversent les providers ciblés. La protection contre la
        ré-utilisation pour training dépend des policies provider ET
        de la configuration explicite du routage.
    banned_until_config_proven:
      - "Claim 'Pas de training sur les données utilisateur' — banni tant que la config code (data_collection: deny, zdr: true, ou équivalent account-level) n'est pas prouvée et auditée."
      - "Claim 'Les données de deals ne sont pas utilisées pour entraîner les modèles' — banni tant que la matrice provider × policy n'est pas versionnée."

  confidentiality_controls:
    note: "Contrôles d'isolation et d'accès. Tous claims à VÉRIFIER côté code avant usage doctrinal externe."
    isolation_model:
      note: >
        L'isolation actuelle entre utilisateurs / deals repose
        principalement sur du FILTRAGE APPLICATIF (userId / ownership
        dans les requêtes Prisma) + cascades Prisma au niveau ORM.
        AUCUNE preuve actuelle d'une policy RLS PostgreSQL au niveau DB.
      banned_terminology:
        - "'Row-level security' / 'RLS' — banni tant qu'une policy DB PostgreSQL RLS n'est pas démontrée et active. Aujourd'hui ce qui existe est du filtrage applicatif, pas une RLS DB."
      current_claim_to_audit: "Filtrage applicatif systématique par userId / ownership sur les requêtes Prisma."
      target_claim_to_verify: >
        Confirmer la présence systématique du filtre userId / ownership
        dans toutes les requêtes Prisma (lecture, mise à jour,
        suppression) sur les entités dealId / documentId / analysisId /
        liveSession, et identifier les exceptions admin / cron /
        maintenance + les contrôles d'accès associés.
    api_keys:
      current_claim_to_audit: "Schéma ApiKey contient userId, hash, préfixe, expiration / révocation."
      code_reference: "prisma/schema.prisma:2137 — modèle ApiKey."
      target_claim_to_verify: >
        Portée effective des clés (scoping par utilisateur unique vs
        partagée), mécanismes de rotation, procédure de révocation
        utilisateur-facing, et audit log d'utilisation par clé.
      audit_required: >
        Vérifier dans le code la chaîne : génération → stockage hash →
        vérification runtime → rotation → révocation → audit log.
    auth_layer:
      current_claim_to_audit: "Authentification via Clerk avec mode BYPASS_AUTH pour développement."
      target_claim_to_verify: "BYPASS_AUTH désactivé en production ; tracé par environnement."
      audit_required: "Vérifier la valeur de BYPASS_AUTH par environnement (dev / staging / prod) ; auditer la chaîne d'authentification Clerk en production."

  llm_logging_policy:
    note: >
      Le router LLM logge les appels. Comportement de redaction précis
      selon le code actuel.
    default_behavior:
      redacted_by_default:
        - "systemPrompt"
        - "userPrompt"
        - "response"
        - "errorMessage"
      metadata_retained:
        - "Hashes du contenu redacted"
        - "Length du contenu redacted"
        - "Autres metadata non-sensibles (modèle, latence, tokens, etc.)"
      code_references:
        - "src/services/llm-logger/index.ts:52 — comportement redaction par défaut"
        - "src/services/llm-logger/index.ts:97 — branche LLM_LOG_RAW_TEXT"
    raw_logging_flag:
      flag_name: "LLM_LOG_RAW_TEXT"
      when_true: >
        Les 4 champs ci-dessus (systemPrompt, userPrompt, response,
        errorMessage) sont logués en CLAIR sans redaction.
      rule: >
        LLM_LOG_RAW_TEXT DOIT être à false / désactivé en production.
        Audit par environnement obligatoire. Toute activation en prod
        même temporaire (debug) doit être tracée, avoir un TTL court,
        et déclencher purge planifiée des logs concernés.
      audit_required:
        - "Vérifier la valeur de LLM_LOG_RAW_TEXT par environnement (dev / staging / prod)."
        - "Confirmer que les logs LLM persistés sont aussi soumis aux TTL data_retention et aux suppressions utilisateur (cf. right_to_deletion)."
        - "Auditer les appels OpenRouter directs hors router (cf. direct_callers_bypassing_router) — utilisent-ils le même logger / redaction ?"

  application_logs_to_audit:
    note: >
      §32 ne couvre pas seulement les logs LLM. Les logs applicatifs
      (console.log, logger structuré, traces) peuvent contenir des
      données utilisateur. À auditer surface par surface.
    example_known_drift:
      file: "src/app/api/live-sessions/[id]/webhook/route.ts:692"
      issue: >
        Le webhook live logge un extrait de transcript via
        console.log(utterance.text.slice(0, 100)). Ces 100 premiers
        caractères contiennent du contenu utilisateur réel (déclarations
        fondateur). Ces logs vont dans la sortie du runtime (Vercel
        logs / etc.) et leur durée de vie / accès / suppression n'est
        PAS contrôlée par la cascade de suppression utilisateur.
    audit_required:
      - "Grep systémique pour tous les console.log, logger.info, logger.error, etc. qui logguent du texte utilisateur (utterance, déclarations, deck content, financials)."
      - "Pour chaque occurrence : décider si redaction nécessaire OU passage au logger structuré avec policy de redaction."
      - "Vérifier la durée de vie des logs runtime (Vercel / autre provider) et leur compatibilité avec le right_to_deletion."
      - "Documenter par environnement les logs persistés et leur scope."

  storage_and_encryption_scope_to_audit:
    note: >
      La page privacy publique affirme 'documents chiffrés AES-256-GCM
      en base'. À auditer précisément : sur QUOI s'applique le
      chiffrement, et QUOI N'EST PAS chiffré ou est dupliqué ailleurs.
    scopes_to_audit_separately:
      - id: vercel_blobs
        what: "Documents fichiers stockés sur Vercel Blob (storageUrl / storagePath)."
        audit_required: "Vérifier si Vercel Blob applique AES-256-GCM at-rest (provider-side) ET si Angel Desk applique chiffrement supplémentaire avant upload."
      - id: db_columns
        what: "Colonnes DB Postgres (Neon) — modèle Document et autres."
        audit_required: "Vérifier quelles colonnes contiennent du contenu utilisateur en clair vs chiffré (e.g. extractedText / ocrText / résultats analyse)."
      - id: extracted_text
        what: "Champ Document.extractedText (texte extrait par OCR / parsing)."
        audit_required: "Probablement en clair en DB. À vérifier. Si oui, l'affirmation publique 'AES-256-GCM en base' ne couvre pas ce champ."
      - id: ocr_text
        what: "Champ Document.ocrText ou équivalent OCR."
        audit_required: "Idem — probablement en clair en DB."
      - id: evidence_signals
        what: "Evidence signals / claims structurés persistés."
        audit_required: "Vérifier le stockage et les exceptions chiffrement."
      - id: llm_logs
        what: "Logs LLM persistés (cf. llm_logging_policy)."
        audit_required: "Vérifier chiffrement at-rest des logs."
      - id: local_storage_upload_recovery
        what: "Stockage local (browser) pour recovery uploads incomplets."
        audit_required: "Vérifier ce qui transite en localStorage / IndexedDB côté client, sa durée de vie, et son scope."
    banned_until_audit:
      - "Claim 'documents chiffrés AES-256-GCM en base' sans qualifier précisément quels champs sont chiffrés et lesquels ne le sont pas."
      - "Claim 'tout est chiffré' — banni tant que la matrice de chiffrement par entité n'est pas documentée."

  data_portability_surface_to_audit:
    note: >
      L'endpoint d'export utilisateur se présente comme conforme RGPD
      Art. 20 (portabilité), mais exclut explicitement des éléments
      importants. Claim 'export complet' INTERDIT tant que le scope
      réel n'est pas documenté publiquement.
    endpoint: "GET /api/user/export"
    rgpd_positioning: "Présenté comme RGPD Art. 20 (droit à la portabilité)."
    excluded_from_export:
      - "results blobs (résultats analyse en blob / fichier dérivé)"
      - "extractedText / ocrText (contenu extrait des documents)"
      - "fichiers documents (binaires originaux)"
      - "full API keys (le hash est exporté, pas la clé en clair — légitime sécurité)"
    rule: >
      Le claim public 'export complet des données' est INTERDIT. La
      page user-facing doit documenter clairement le scope réel de
      l'export (ce qui est inclus ET ce qui est exclu). L'utilisateur
      doit pouvoir demander manuellement les éléments exclus si
      nécessaire (procédure à définir).
    audit_required:
      - "Documenter le scope exact d'export (champs DB exportés ; champs exclus avec justification)."
      - "Documenter la procédure de demande manuelle pour les éléments exclus."
      - "Vérifier que la mention RGPD Art. 20 ne crée pas un claim de complétude."

  existing_user_facing_legal_surfaces_to_audit:
    note: >
      Surfaces user-facing existantes qui exposent déjà des claims
      légaux / data / sécurité. À auditer juridiquement et
      techniquement AVANT toute reprise publique de §32. Les claims
      actuels n'ont pas nécessairement été validés par avis juridique
      externe.
    surfaces:
      - file: "src/app/(dashboard)/legal/confidentialite/page.tsx"
        claims_exposed:
          - "DPO / RCS"
          - "Neon Francfort (région spécifique)"
          - "OpenRouter DPA / SCCs (Standard Contractual Clauses)"
          - "AES-256-GCM (chiffrement)"
          - "MFA"
          - "Politique cookies"
          - "Délais RGPD"
        audit_required: >
          Vérifier chaque claim juridiquement (DPA OpenRouter signé ?
          SCCs en vigueur ? Neon réellement à Francfort par
          environnement ? AES-256-GCM réellement appliqué et où ? MFA
          effectivement disponible ? Délais RGPD documentés et
          respectables ?). Aucune de ces affirmations n'a sa source
          vérifiée dans la doctrine actuelle.

  linkedin_consent_surface_to_audit:
    note: >
      Le dialog de consentement LinkedIn affirme une base légale RGPD
      Article 6.1.f (intérêt légitime) et la mention 'supprimables à
      tout moment'. Ces claims doivent être audités juridiquement, pas
      seulement techniquement.
    file: "src/components/shared/linkedin-consent-dialog.tsx:43"
    claims_exposed:
      - "Base légale RGPD Art. 6.1.f (intérêt légitime)"
      - "Données supprimables à tout moment"
    audit_required:
      legal: >
        Vérifier que le choix de la base 6.1.f est défendable par avis
        juridique externe (test de balance d'intérêts documenté, droit
        d'opposition disponible, finalité spécifique, etc.) — ce n'est
        PAS un acquis technique.
      technical: >
        Vérifier dans le code que la suppression 'à tout moment' est
        effectivement implémentée et atteint TOUS les endroits où la
        donnée LinkedIn collectée est persistée (incl. caches, copies
        dérivées, exports, logs).

  external_api_and_webhooks_to_audit:
    note: >
      Le produit expose une API v1 publique avec clés API utilisateur,
      et un système de webhooks. Surface critique pour la sécurité ET
      la conformité RGPD (droit à la suppression, contrôle d'accès).
    api_keys:
      hashing_algorithm: "PBKDF2 (à vérifier — algo, salt, nb d'itérations, longueur de hash)."
      revocation: "À auditer : procédure utilisateur-facing de révocation, immediate effect, audit log."
      last_used_at: "Champ ApiKey.lastUsedAt — à vérifier qu'il est bien mis à jour à chaque usage et exposé à l'utilisateur."
      rate_limits: "À auditer : rate limits par clé, par utilisateur, par endpoint ; comportement en cas de dépassement."
      audit_required:
        - "Vérifier l'algo de hashing PBKDF2 (nb d'itérations, salt, longueur)."
        - "Vérifier la procédure de révocation et son delay d'application."
        - "Vérifier la mise à jour lastUsedAt et son exposition utilisateur."
        - "Documenter les rate limits par tier / scope."
    webhooks:
      payloads: "À auditer : que contient le payload webhook côté Angel Desk ? Données utilisateur potentiellement sensibles ?"
      hmac_secret: "À auditer : signature HMAC du payload, rotation du secret, vérification côté receiver documentée."
      url_validation: "À auditer : Angel Desk valide-t-il l'URL receiver (HTTPS, pas de URL interne, pas de SSRF) ?"
      logs: "À auditer : payloads webhook persistés en logs ? Compatible right_to_deletion ?"
      user_deletion: "À auditer : suppression utilisateur supprime-t-elle aussi ses configurations webhooks et tous les payloads / logs associés ?"
    audit_required:
      - "Doc complète API + webhooks (sécurité, RGPD, suppression)."
      - "Tests d'intégration sur révocation clé / rotation HMAC / suppression utilisateur."

  regulatory_alignment_claims_policy:
    note: >
      §32 N'EST PAS un document de conformité réglementaire. §32 ne
      fait AUCUN claim de conformité à un régime spécifique sans base
      juridique formelle. La règle §20
      auditability_positioning.not_a_legal_claim s'applique strictement.
    banned_regulatory_claims:
      - "Conformité IR-PME (France) — bannie sans base juridique formelle ET avis juridique externe."
      - "Conformité EIS (Enterprise Investment Scheme, UK) — bannie sans base juridique formelle ET avis juridique externe."
      - "'Audit trail officiel' / 'système d'audit trail officiel des décisions d'investissement' — banni par §20 auditability_positioning.not_a_legal_claim."
      - "'Outil de référence pour la conformité' — banni (sonne endorsement réglementaire)."
      - "Tout claim de conformité à un régime réglementaire spécifique non documenté par avis juridique formel."
    public_value_alternative: >
      Ce que §32 PEUT décrire (cf. §20 auditability_positioning.public_value) :
      objectif produit de rattacher les affirmations factuelles
      critiques à leur source, leur date disponible (ou l'absence de
      date explicitée), leur fiabilité ; exposer les contradictions
      détectées ; matérialiser les zones d'incertitude ; tracer la
      fraîcheur des documents. Les sorties structurées (signaux
      d'alerte, scoring, contradictions, questions ouvertes) sont
      auditables quand disponibles. Utile pour revue interne, club
      deal, comité d'investissement ou reporting LP — SANS prétendre
      à conformité réglementaire spécifique.
    cross_reference: "§20 auditability_positioning.not_a_legal_claim + §28 legal_section_alignment_status + §26 banned_phrasings_table (claims légaux)."

  code_audit_required:
    note: >
      §32 contient des claims runtime / infrastructure / data flow qui
      doivent être audités côté code avant tout usage doctrinal externe.
      Ne PAS publier ces claims en surface publique tant que l'audit
      n'est pas documenté.
    items:
      - "Neon region par environnement (dev / staging / prod) — vérifier la configuration de provisioning."
      - "Liste des modèles LLM effectivement routés via OpenRouter et leur provider downstream."
      - "Matrice provider × policy data versionnée (snapshot daté) pour Anthropic, OpenAI, Google, et tout autre provider routé."
      - "Config data_collection: deny / zdr: true côté code OU account-level pour chaque appel OpenRouter (router central + 9 fichiers directs listés)."
      - "TTL effectifs par entité (deal, document, analysis, live transcript, board events) et jobs de nettoyage."
      - "Routes DELETE et cascade de suppression (deal → analyses → documents → transcripts → events → logs LLM → caches dérivés → exports → webhooks)."
      - "Filtre userId dans toutes les requêtes Prisma sur entités utilisateur (lecture / écriture / suppression). Identifier exceptions admin / cron / maintenance."
      - "Portée et rotation des clés API utilisateur (scoping par utilisateur ; mécanismes de révocation)."
      - "Désactivation BYPASS_AUTH en production (par environnement)."
      - "LLM_LOG_RAW_TEXT désactivé en production (par environnement)."
      - "Scope de chiffrement AES-256-GCM par entité (matrice complète)."
      - "Scope d'export RGPD Art. 20 par champ DB (inclus / exclu)."
      - "Logs applicatifs avec données utilisateur (console.log, logger.* — grep + redaction policy)."
      - "Webhooks : payloads, HMAC, URL validation, suppression utilisateur."
      - "DPA OpenRouter signé + SCCs en vigueur (claims page confidentialité)."

  doctrine_references:
    upstream_sources:
      - "§3 vision (canonical_public_phrase)"
      - "§5 interdits"
      - "§20 auditability_positioning.not_a_legal_claim + banned_framings + claims_policy"
      - "§26 banned_phrasings_table (claims légaux)"
      - "§28 legal_section_alignment_status (point d'entrée du flag §32 — aligné après écriture §32)"
    downstream_surfaces:
      - "Mentions légales / Conditions Générales d'Utilisation"
      - "Page sécurité / privacy publique (src/app/(dashboard)/legal/confidentialite/page.tsx — à auditer)"
      - "Dialog consentement LinkedIn (src/components/shared/linkedin-consent-dialog.tsx — à auditer)"
      - "FAQ enterprise / sécurité"
      - "Pitch deck slides sécurité (si applicable, sans claim réglementaire)"
      - "Documentation onboarding entreprise"
      - "Documentation API v1 + webhooks (sécurité + RGPD)"
    banned_in_this_section:
      - "'Compatible IR-PME' (sans base juridique formelle + avis juridique externe)."
      - "'Compatible EIS' (idem)."
      - "'Audit trail officiel' (banni §20 not_a_legal_claim)."
      - "'Système d'audit trail officiel des décisions' (idem)."
      - "'Outil de référence pour la conformité' (sonne endorsement réglementaire)."
      - "'Row-level security via userId' (banni — filtrage applicatif, pas RLS DB)."
      - "'Pas de training sur les données utilisateur' (banni tant que config OpenRouter data_collection: deny / zdr: true non prouvée pour tous les appels)."
      - "'Export complet des données' (banni — l'endpoint exclut explicitement des éléments)."
      - "'Documents chiffrés AES-256-GCM en base' sans matrice par entité documentée."
      - "Tout claim absolu sur les data policies LLM sans qualification provider × version."
      - "Tout claim de conformité à un régime réglementaire spécifique sans avis juridique formel."
    cross_section_updates_applied:
      - "reference.yaml §3 commentaire d'en-tête : §32 retiré de la liste aval ; §32 ajouté aux sections alignées."
      - "reference.yaml §26 cross_section_updates_closed : cascade doctrinale TERMINÉE pour le périmètre repéré."
      - "reference.yaml §27 doctrine_references.downstream_surfaces : §32 retiré de la liste aval."
      - "reference.yaml §28 legal_section_alignment_status : passé en aligné avec lien vers §32. §32 retiré de §28 doctrine_references.downstream_surfaces."
      - "docs-doctrine top note + cascade table + § 11 fichiers synchronisés mis à jour."
      - "changes-log.md : entrée détaillée §32 v3 + cleanup cascade."


# ============================================================
# 33. KPIs À SUIVRE — GOUVERNANCE MÉTRIQUES
# ============================================================
# Aligné sur la doctrine du pivot 2026-05-20 (cf. §3 + §5 + §7 + §19 +
# §20 + §21 + §22 + §26 + §27 + §28 + §29 + §31 + §32 + §34 +
# docs-doctrine).
# §33 consolide la gouvernance des métriques, dont certaines sont
# définies provisoirement en §28 measurement_plan (validation
# hypothèses GTM). §33 N'ABSORBE PAS §28 ; les deux coexistent.
# Aucune métrique §33 n'est exposable en surface publique sans audit +
# §28 public_claim_threshold + §20 claims_policy.
# Bannis dans §33 : claims précision/accuracy sans outcomes instrumenté,
# MRR/NRR/ARPU sans Stripe customer lifecycle, marges en public,
# nombres bruts en hero KPI, noms internes Board AI / Consensus Engine
# / Reflexion Engine en surface publique (Live Coaching reste
# restricted_by_§26 in_app_legacy).
kpis:
  positioning_rule: >
    §33 consolide la gouvernance des métriques, dont certaines sont
    définies provisoirement en §28 measurement_plan. §33 N'ABSORBE PAS
    §28 ; les deux coexistent. Pour chaque métrique : definition +
    owner_to_assign + data_source_to_verify + cadence + segment +
    statut d'instrumentation + public_claim_status. §33 N'EST PAS un
    script de copy publique ; aucune métrique n'est exposable sans
    audit. §33 NE REMPLACE PAS §31 product_claims_to_audit (état
    observable) ni §34 roadmap_items_to_audit (hypothèses) ; les
    quatre sections (§28 + §31 + §33 + §34) sont complémentaires.
  not_for_public_copy: true
  governance_status: "draft_until_metric_owners_assigned"

  public_claim_status_enum:
    note: >
      Enum des statuts publics applicables à chaque métrique. Aucune
      métrique ne peut être exposée publiquement avec un statut autre
      que `explicit_allow_after_audit`.
    values:
      banned_until_threshold_met:
        description: "Bannie en public tant que le public_claim_threshold §28+§20 n'est pas atteint."
      internal_only:
        description: "Réservée à un usage interne (ops/perf/dashboards privés). Jamais exposée publiquement."
      banned_in_public_copy:
        description: "Bannie en surface marketing/landing/pitch deck. Peut apparaître dans des contextes B2B audités (RFP, due diligence interne)."
      explicit_allow_after_audit:
        description: "Autorisée publiquement après audit explicite + cohorte documentée + méthodologie auditable."

  public_claim_threshold:
    rule: >
      Aucun KPI §33 n'est exposable en surface publique tant que :
      (a) la métrique a passé l'instrumentation runtime auditée ;
      (b) une cohorte représentative existe ; (c) la méthodologie de
      mesure est documentée et auditable ; (d) la cohérence avec §28
      measurement_plan.public_claim_threshold est vérifiée ; (e) un
      owner est assigné.
    cross_reference: "§28 measurement_plan.public_claim_threshold + §20 claims_policy."

  relationship_to_section_28:
    note: >
      §28 measurement_plan = grille provisoire de VALIDATION des
      hypothèses GTM (acquisition, conversion, sales cycle, CAC,
      usage, rétention, funnel). §33 consolide la gouvernance des
      métriques, dont certaines sont définies provisoirement en §28.
      §33 N'ABSORBE PAS §28 — les deux sections coexistent avec des
      rôles complémentaires.
    metrics_inherited_from_section_28:
      - "activation (§28 → §33 acquisition)"
      - "qualified_opportunity_rate (§28 → §33 acquisition)"
      - "conversion_per_channel (§28 → §33 acquisition)"
      - "sales_cycle_observed (§28 → §33 acquisition)"
      - "cac_per_segment (§28 → §33 acquisition)"
      - "recurring_usage (§28 → §33 engagement)"
      - "retention (§28 → §33 engagement)"
      - "funnel_progression (§28 → §33 engagement)"
    rule: >
      Pour chaque métrique partagée, §33 = source de vérité de la
      gouvernance ; §28 reste source de vérité du contexte
      validation_hypothèses_GTM. Aucune divergence de définition n'est
      autorisée — toute mise à jour doit être propagée dans les deux
      sections.

  relationship_to_section_31:
    note: >
      §31 = snapshot traction + product_claims_to_audit à un instant t.
      §33 = gouvernance KPI continue.
    rule: >
      Les chiffres de §31 (users_to_verify, revenue_eur_to_verify,
      waitlist_to_verify) doivent être recalculés par §33 metrics
      (signups_per_month, etc. — sous réserve d'instrumentation
      vérifiée) avec leur cadence respective. §31 reste un snapshot ;
      §33 produit la série temporelle gouvernée.

  relationship_to_section_34:
    note: >
      §34 = matrice d'hypothèses roadmap. §33 = mesure d'atteinte des
      items §34 une fois committés.
    rule: >
      Tout item §34 touchant aux métriques / activation / traction /
      objectifs / conversion / usage porte §33 dans
      blocked_until_audit. La levée du blocage suppose que la métrique
      §33 correspondante est instrumentée ET auditée ET a un owner
      assigné.

  kpi_governance:
    note: >
      Principes de gouvernance applicables à chaque métrique §33.
      Aucune métrique n'est mise en production (interne ou publique)
      sans satisfaire ces principes.
    principles:
      definition_required: "Énoncé opérationnel non ambigu (numerator / denominator / unit / scope temporel)."
      owner_required: "Personne ou équipe responsable de la métrique. Aucune métrique ne peut passer en `instrumentation_to_verify` ou `instrumented` sans owner assigné — gate gouvernance."
      data_source_required: "Source de donnée authoritative versionnée + référence code/infra."
      cadence_required: "Fréquence de calcul + fréquence de revue."
      segment_required: "Découpage par canal × segment cible §4 lorsque connu."
      status_required: "État d'instrumentation (cf. statuses)."
      public_claim_status_required: "Cf. public_claim_status_enum."
    statuses:
      - proposed: "Métrique proposée doctrinalement, pas d'évidence code à date."
      - proposed_until_code_evidence: "Métrique proposée + projet d'instrumentation identifié ; à valider par evidence code/infra."
      - instrumentation_to_verify: "Métrique avec évidence d'instrumentation identifiée, à valider sur cohorte."
      - blocked_until_audit: "Métrique dépend d'un audit §21 / §22 / §29 / §32 non clos."
      - candidate_not_calculable_as_saas: "Métrique standard SaaS non calculable dans le modèle pricing actuel (cf. §21 billing_integration_status)."
      - legacy_wording_retired: "Wording v0 retiré ; métrique potentiellement réintroduite après instrumentation prérequise."

  metrics_registry:
    note: "5 catégories, 19 métriques au TOTAL (pas par catégorie)."
    acquisition:
      items:
        - id: signups_per_month
          definition: "Nombre de comptes créés par mois calendaire."
          owner_to_assign: "À documenter"
          data_source_to_verify: "DB applicative (prisma.user.count par mois) — référence code à confirmer."
          cadence: "Mensuel"
          segment: "Par canal d'acquisition × segment cible §4 lorsque connu (cf. §28 acquisition_strategy)."
          status: proposed_until_code_evidence
          public_claim_status: banned_until_threshold_met
          cross_reference: "§28 measurement_plan.metrics.activation."
        - id: free_to_paid_conversion
          definition: "Taux de passage d'un utilisateur FREE_TIER (initialCredits = 5) à utilisateur ayant effectué un premier achat."
          owner_to_assign: "À documenter"
          data_source_to_verify: "DB applicative (CreditTransaction.userId vs User.createdAt). NUANCE : pas de Stripe checkout, flow mailto: (cf. §21 billing_integration_status)."
          cadence: "Mensuel"
          segment: "Par cohorte d'entrée × canal × segment cible §4."
          status: blocked_until_audit
          blocked_until_audit: ["§21 billing_integration_status", "§21 price_unit_policy_to_audit"]
          public_claim_status: banned_until_threshold_met
          cross_reference: "§21 free_tier_status + §28 measurement_plan.metrics.conversion_per_channel."
        - id: cac
          definition: "Coût d'acquisition par segment (cf. §28 cac_per_segment)."
          owner_to_assign: "À documenter"
          data_source_to_verify: "Comptabilité analytique + CRM (à instrumenter)."
          cadence: "Trimestriel minimum"
          segment: "Marie funnel_entry vs variantes Pauline core_revenue_pool (cf. §27) × canal."
          status: proposed
          public_claim_status: banned_until_threshold_met
          cross_reference: "§28 measurement_plan.metrics.cac_per_segment."
        - id: acquisition_source
          definition: "Répartition des signups par canal (organique, referral, paid)."
          owner_to_assign: "À documenter"
          data_source_to_verify: "Tracking source d'acquisition (à instrumenter)."
          cadence: "Mensuel"
          segment: "Par canal × segment cible §4 lorsque connu."
          status: proposed
          public_claim_status: banned_until_threshold_met

    engagement:
      items:
        - id: analyses_per_user_per_month
          definition: "Volume d'analyses (Deep Dive, Quick Scan deprecated, AI Board, Live Coaching) complétées par utilisateur payant par mois."
          owner_to_assign: "À documenter"
          data_source_to_verify: "DB applicative (events analyse complétée) — référence code à confirmer."
          cadence: "Mensuel"
          segment: "Par segment cible §4 + par tranche d'ancienneté."
          status: proposed_until_code_evidence
          public_claim_status: banned_until_threshold_met
          cross_reference: "§28 measurement_plan.metrics.recurring_usage."
          retired_wording: "Inclut Quick Scan deprecated (cf. §21 legacy_usage_surfaces_to_audit)."
        - id: debat_multi_modele_sessions_per_month
          definition: "Nombre de sessions de débat multi-modèle lancées par mois."
          internal_or_legacy_name: "Boards AI"
          public_marketing_status: "restricted_by_§26 (banned_in_marketing_public)"
          owner_to_assign: "À documenter"
          data_source_to_verify: "DB applicative (events Board AI runs) — référence code à confirmer."
          cadence: "Mensuel"
          segment: "Par tier d'utilisateur × segment cible §4."
          status: proposed_until_code_evidence
          public_claim_status: internal_only
        - id: live_coaching_sessions_per_month
          definition: "Nombre de sessions de vérification des preuves en temps réel (Live Coaching) par mois."
          internal_or_legacy_name: "Live Coaching"
          public_marketing_status: "restricted_by_§26 (in_app_legacy_feature_names.decision_required) — NOT banned partout."
          owner_to_assign: "À documenter"
          data_source_to_verify: "DB applicative (events Live session) — référence code à confirmer."
          cadence: "Mensuel"
          segment: "Par tier × segment cible §4."
          status: proposed_until_code_evidence
          public_claim_status: banned_in_public_copy
        - id: chat_messages_per_user_per_month
          definition: "Messages chat envoyés par utilisateur actif par mois."
          owner_to_assign: "À documenter"
          data_source_to_verify: "DB applicative (events chat message) — référence code à confirmer."
          cadence: "Mensuel"
          segment: "Par tier × segment cible §4."
          status: proposed_until_code_evidence
          public_claim_status: internal_only
        - id: retention_M1_M3_M6_M12
          definition: "% d'utilisateurs payants actifs à J+30 / J+90 / J+180 / J+365 après conversion."
          owner_to_assign: "À documenter"
          data_source_to_verify: "DB applicative (cf. §28 retention)."
          cadence: "Mensuel pour M1 ; trimestriel pour M3+."
          segment: "Par cohorte d'entrée × segment cible §4."
          status: proposed
          public_claim_status: banned_until_threshold_met
          cross_reference: "§28 measurement_plan.metrics.retention."
        - id: credit_utilization_components
          definition: >
            Métrique COMPOSITE découpée en sous-composants pour éviter
            de mélanger acquisition, free tier, expiration et refund.
            Le credit_utilization_rate brut (crédits utilisés / achetés)
            est trop ambigu et N'EST PAS un KPI unitaire §33.
          sub_components:
            credits_acheted_per_user:
              description: "Crédits achetés par utilisateur sur la fenêtre."
              data_source_to_verify: "DB CreditTransaction.amount + type=purchase."
            credits_free_granted_per_user:
              description: "Crédits gratuits accordés (FREE_TIER initialCredits + autres bonus)."
              data_source_to_verify: "DB + src/services/credits/usage-gate.ts:251."
            credits_expired_per_user:
              description: "Crédits expirés sans usage (cf. §21 credit_expiry.legal_audit_required)."
              data_source_to_verify: "DB + job d'expiration."
              legal_audit_required: "Cf. §21 + §32 — l'expiration forcée comme métrique de revenu nécessite avis juridique."
            credits_refunded_per_user:
              description: "Crédits remboursés suite à échec d'action (cf. §21 refund_and_credit_adjustment_policy_to_audit)."
