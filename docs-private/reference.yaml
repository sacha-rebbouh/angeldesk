    surfaces:
      - "src/lib/live/__tests__/live-coaching.test.ts — fige 'Actions à suivre', 'Confiance', '[BA]', confidenceDelta, 'coaching cards' dans les assertions de snapshot ou de string match."
      - "src/lib/live/__tests__/post-call-reanalyzer.test.ts — TYPE DRIFT À AUDITER : fige confidenceChange.before/after en strings ('medium' / 'high') alors que DeltaReport (src/lib/live/types.ts) type ces champs en number. Le test fige donc un comportement non conforme au type ; à corriger côté code OU type, et à mettre à jour le test en conséquence."
      - "src/app/api/coaching/context/__tests__/route-gate.test.ts — fige le contrat de soft-gate corpus."
      - "src/app/api/coaching/reanalyze/__tests__/route-gate.test.ts — fige le contrat de hard-gate corpus."
      - "src/lib/live/__tests__/context-compiler.test.ts — fige les champs de DealContext (à mettre à jour quand passage 2 axes)."

  spec_code_drift:
    note: >
      Écarts connus entre LIVE-COACHING-SPEC.md (spec ancienne) et le code
      réel. Documenter pour éviter qu'un lecteur de la spec ne déduise une
      réalité fausse.
    drifts:
      - "Visual processor : le chemin vidéo (WS_RELAY_URL + visual-frame route + visual-processor) existe bien. Ce qui est faux dans la spec, c'est le pipeline LLM multi-étapes Haiku/Sonnet — le code est single-stage HAIKU vision."
      - "Latence : spec vise <3s / <3.5s P95 ; code applique TIMEOUT_MS = 8s comme dernier filet ; monitoring alerte à 5s ; estimation Recall.ai+Deepgram ~1-3s (non mesurée directement par le code)."
      - "Modèles : YAML disait 'Claude Haiku 4.5' unique ; runtime utilise HAIKU pour utterance-router/auto-dismiss/coaching-engine/visual-processor et SONNET pour post-call-generator/transcript-condenser/post-call-reanalyzer (delta). En mode targeted/full, post-call-reanalyzer passe par AgentOrchestrator (modèles des agents concernés, pas SONNET unique)."
      - "Composants pipeline : YAML/spec listaient 6 composants ; runtime en a au moins 12 (ajout context-compiler, utterance-router, auto-dismiss, speaker-detector, sanitize, recall-client, ably-server)."
      - "Routing coaching : la formulation 'fondateur → coaching' est trop étroite. Le code (shouldTriggerCoaching) déclenche pour toute utterance substantielle non ba et non investor — donc founder, co-founder, lawyer, advisor, et participants non mappés."
      - "DealContext.scores : pas de 'timing' (uniquement global/team/market/product/financials) alors que le scoring synthesis §8 inclut Timing à 15%."
      - "Configuration langue : UI propose fr/en, DB stocke LiveSession.language, bot Deepgram hardcode language: 'multi' (cf. language_config_drift)."
      - "Configuration modèle : /api/live-sessions/[id] accepte llmModel en PATCH, mais le runtime utilise des symboliques HAIKU/SONNET par composant non consommés depuis ce champ (cf. model_config_drift)."
      - "Contexte par chemin : le mode 'cold' n'est pas uniforme — audio webhook ne se dégrade PAS sur corpus non prêt si dealId existe (cf. runtime_context_paths)."
      - "Test type drift : post-call-reanalyzer.test.ts fige confidenceChange.before/after en strings alors que DeltaReport les type en number (cf. tests_surfaces_to_update)."
    spec_status: "LIVE-COACHING-SPEC.md à reprendre dans une passe dédiée pour réconcilier avec le code réel."

  security_sanitization_status:
    note: >
      Sanitization de SÉCURITÉ (anti-injection prompt côté entrée +
      anti-réinjection LLM output côté sortie). Ce n'est pas du contrôle
      doctrinal du langage prescriptif.
    sanitizers:
      - "src/lib/live/sanitize.ts — sanitizeTranscriptText : strip ```, <system>, <user>, [INST] sur les transcripts avant inclusion dans les prompts ; max 2000 caractères."
      - "src/lib/live/visual-processor.ts — sanitizeLLMOutput : strip de marqueurs sur les sorties LLM (currentSlide, keyDataFromVisual, contradictions visuelles, recentSlideHistory)."
    coverage: >
      Couverture sécurité : protection contre l'injection prompt côté entrée
      transcripts + réinjection côté sorties visuelles. Ne couvre PAS le
      langage prescriptif (GO/NO-GO/PASS/etc.) ni les actionItems
      prescriptifs (cf. narrative_sanitization_status).

  narrative_sanitization_status:
    note: >
      Cohérence avec § 9 narrative_sanitization. Live Coaching n'a PAS de
      sanitizer doctrinal des formulations prescriptives.
    coverage_gap: >
      Les sorties coaching cards, post-call report, reanalysis et condenser
      ne sont pas filtrées pour le langage interdit (GO/NO-GO/PASS/etc.)
      ni pour les actionItems prescriptifs (owner: ba, etc.). Dette
      doctrinale à traiter dans le chantier scoring 2 axes + purge des
      prompts couche 3 (cf. § 6 in_progress).
    distinction_from_security: >
      À distinguer de security_sanitization_status ci-dessus : la sécurité
      anti-injection / anti-réinjection est appliquée ; le contrôle
      doctrinal du langage prescriptif ne l'est pas.


# ============================================================
# 11. PRODUIT DÉTAILLÉ — ENGINES
# ============================================================
# Aligné sur la doctrine du pivot 2026-05-20 (cf. § 3 + § 4 + § 5 + § 6 + § 7
# + § 8 + § 9 + § 10 + § 20 + docs-doctrine/angeldesk-strategic-pivot.md) et
# sur le code réel (src/agents/orchestration/consensus-engine.ts,
# src/agents/orchestration/reflexion.ts + schemas/).
# Engines = mécanismes de confrontation et de relecture sous le capot.
# Pas promesses publiques. Cf. § 20 confrontation_mechanisms.
# Bannis : vérité, intelligence collective, moteur de consensus comme
# accroche, auto-correction comme garantie, fiabilité absolue, "comité"
# personnifié, "Reviewer Big4".
# Références code par file + symbole.
engines:
  positioning_rule: >
    Consensus Engine et Reflexion Engine sont des mécanismes internes
    d'orchestration. Décrits ici comme runtime + limites. Pas en accroche
    publique (cf. § 20 confrontation_mechanisms). Le wording de § 11 est
    utilisé par § 20 — toute formulation publique passe par § 20, pas
    par le vocabulaire interne ci-dessous.

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # CONSENSUS ENGINE
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  consensus_engine:
    internal_name: "Consensus Engine"
    role: >
      Mécanisme d'arbitrage des contradictions détectées entre agents.
      Flux normal : débat structuré multi-rounds → arbitrage final si
      pas de consensus. Plusieurs optimisations (cache de résolutions,
      branche dédiée minor → autoResolveMinor, skip-to-arbitration sur
      asymétrie de confiance) peuvent court-circuiter ce flux. Produit
      une résolution structurée — pas une vérité tranchée.
    code_references:
      - "src/agents/orchestration/consensus-engine.ts"
      - "src/agents/orchestration/schemas/consensus-schemas.ts"

    detection_types:
      note: >
        Types de contradictions effectivement détectées par
        areConflicting(). Le code n'a PAS de champ `type` sur
        DetectedContradiction — la distinction est implicite via la
        nature de la valeur comparée. YAML originel listait `existence`
        et `interpretation` : ces types NE SONT PAS détectés par le code
        actuel.
      detected:
        - {type: numeric, detected_by: "areConflicting() — valueDiff > 0.3 sur valeurs numériques."}
        - {type: assessment, detected_by: "areConflicting() — opposition sur évaluation qualitative (e.g. 'exceptional' vs 'poor')."}
      not_currently_detected:
        - existence
        - interpretation

    detection_rule:
      note: "Règles précises de calculateConflictSeverity() (consensus-engine.ts)."
      conflict_detection: "areConflicting() : valueDiff > 0.3 sur valeurs numériques OU opposition d'assessment qualitatif."
      severity_thresholds:
        critical: "avgConfidence > 75 ET valueDiff > 0.5"
        major: "avgConfidence > 60 ET valueDiff > 0.4"
        moderate: "avgConfidence > 40 OU valueDiff > 0.3"
        minor: "sinon"
      assessment_constraint: >
        Pour les contradictions de type `assessment` (opposition
        qualitative), valueDiff = 0 par construction. La sévérité ne
        peut alors atteindre que `moderate` (si avgConfidence > 40) ou
        `minor` (sinon) — les niveaux `critical` et `major` exigent
        respectivement valueDiff > 0.5 et > 0.4, donc inatteignables
        sur un assessment.

    severity_levels:
      note: >
        Valeurs internes en lowercase dans le code
        (DetectedContradiction.severity). YAML originel utilisait
        uppercase — drift corrigé. Les actions par sévérité listées dans
        le YAML originel étaient en sur-promesse : le code n'a qu'une
        branche dédiée (minor → autoResolveMinor()).
      code_values: ["critical", "major", "moderate", "minor"]
      flow_per_severity:
        minor: "Branche dédiée — autoResolveMinor() : heuristique sans appel LLM (winner = plus haute confidence interne)."
        non_minor: >
          Flux unifié pour critical/major/moderate : cache de résolution
          → skip-to-arbitration si asymétrie de confiance (cf.
          optimizations) → débat structuré jusqu'à 3 rounds avec arrêt
          anticipé si consensus → arbitration si pas de consensus.
          Aucune action n'est spécifique à critical/major/moderate
          au-delà du passage minor → non-minor.

    status_lifecycle:
      note: "Cycle de vie d'une contradiction détectée (DetectedContradiction.status)."
      values:
        - {code_value: "detected", description: "Contradiction repérée, pas encore traitée."}
        - {code_value: "debating", description: "En cours de débat structuré."}
        - {code_value: "resolved", description: "Résolution produite (consensus, arbitration, auto_minor ou quick)."}
        - {code_value: "accepted", description: "Acceptation explicite hors débat via acceptContradiction(contradictionId, reason) — désaccord persistant assumé."}

    prompt_source_hierarchy:
      note: >
        Hiérarchie DEMANDÉE AU LLM dans les prompts de débat / arbitrage.
        PAS une pondération programmatique runtime — le code ne pondère
        pas automatiquement les sources par rank. Le LLM est instruit de
        respecter cette hiérarchie dans son raisonnement, sans garantie
        d'application stricte.
      ranks:
        - {rank: 1, source: "Deck (slides, citations exactes)"}
        - {rank: 2, source: "Modèle financier (sheet, row, value)"}
        - {rank: 3, source: "Context Engine (Crunchbase, Dealroom, LinkedIn — cf. § 12)"}
        - {rank: 4, source: "Funding Database (comparables, benchmarks ; cf. § 4 + § 8 — disponibilité partielle)"}
        - {rank: 5, source: "Inference (last resort, toujours flagué comme tel)"}

    optimizations:
      note: "Optimisations runtime documentées dans consensus-engine.ts."
      items:
        - id: resolution_cache
          what: >
            Map bornée des résolutions précédentes (taille max
            MAX_CACHE_SIZE). Éviction FIFO de la plus ancienne entrée
            insérée — pas LRU strict (pas de réordonnancement à l'accès).
          cache_key: >
            Identité cache = `topic` + claims triées sous la forme
            `agentName:claim`. Le cache n'inclut PAS les findingId,
            sources, valeurs brutes ni verificationContext — donc deux
            contradictions différentes au sens code peuvent partager
            la même clé si elles ont le même topic et les mêmes
            couples (agent, claim).
        - id: minor_auto_resolve
          what: "Branche dédiée pour sévérité minor — autoResolveMinor() : heuristique sans appel LLM (winner = plus haute confidence interne)."
        - id: skip_to_arbitration_quick_resolution
          what: "Court-circuit du débat multi-rounds si confidenceDiff > 35 ET maxConfidence > 80 (asymétrie forte de confiance entre agents). Déclenche un appel LLM rapide (QuickResolutionSchema : POSITION_A | POSITION_B | UNRESOLVED)."
        - id: skip_to_arbitration_fallback
          what: "Voie rapide de secours si la validation LLM du skip_to_arbitration_quick_resolution échoue (schéma Zod refusé, parsing error, etc.). PAS une optimisation autonome — fallback du chemin précédent."

    resolution_types:
      note: "Types de résolution renvoyés en fin de traitement (ContradictionResolution.resolvedBy)."
      values:
        - {value: consensus, description: "Résolution marquée 'consensus' lorsque hasConsensus() détecte une concession / finalPosition dans le débat structuré (cf. consensus_semantics — pas unanimité réelle, pas preuve de vérité)."}
        - {value: arbitration, description: "Arbitrage final après plusieurs rounds sans consensus."}
        - {value: accepted, description: "Acceptation explicite hors débat via acceptContradiction(contradictionId, reason). Désaccord persistant assumé, pas produit par debate()."}
        - {value: auto_minor, description: "Auto-résolution heuristique pour sévérité minor (cf. optimizations.minor_auto_resolve)."}
        - {value: quick, description: "Résolution rapide via skip_to_arbitration_quick_resolution ou son fallback."}

    consensus_semantics:
      note: >
        Important : "consensus" dans le code NE SIGNIFIE PAS unanimité
        réelle. hasConsensus() retourne true lorsqu'une position a
        `finalPosition === true`. Dans le runtime actuel, `finalPosition`
        n'est produit qu'au round 3 :
        - chemin enhanced : concession inférée par le code si
          confidenceChange < -15 ;
        - fallback legacy : true uniquement si le LLM renvoie
          `finalPosition === "concede"`.
        Les checks hasConsensus() après round 1 et round 2 existent
        dans le code mais sont en pratique inertes avec les schémas
        actuels (round 1 / round 2 ne définissent pas finalPosition).
      implication: >
        Une résolution de type `consensus` dans ContradictionResolution
        indique qu'une concession a été détectée ou inférée au round 3 —
        PAS que tous les agents sont d'accord, ni que la position
        retenue est juste. À ne pas brandir comme moat ou preuve de
        qualité. Cohérent avec § 9 limits (convergence ≠ justesse).

    limits:
      - "Le mécanisme arbitre des contradictions inter-agents ; il ne produit pas une vérité externe vérifiée. Un désaccord 'resolved' reste contestable."
      - "La détection dépend du seuil numérique (0.3) et de la formulation des sorties d'agents. Certaines divergences sémantiques peuvent ne pas être détectées par areConflicting()."
      - "La prompt_source_hierarchy est une instruction au LLM ; sa bonne application n'est pas garantie programmatiquement."
      - "Le statut 'accepted' signale un désaccord persistant assumé (déclenché explicitement via acceptContradiction) — pas une résolution silencieuse de debate()."
      - "Le flux unifié non-minor ne diffère pas par sévérité (critical/major/moderate produisent le même flux runtime au-delà du seuil minor)."
      - "Le marquage 'consensus' est un signal LLM-émis sur le round 3 (concession inférée ou émise), pas une unanimité (cf. consensus_semantics)."

    confidence_note: >
      Les champs de confiance manipulés par Consensus sont en 0-100.
      - ContradictionClaim.confidence vient de
        ScoredFinding.confidence.score (typé / commenté 0-100, pas
        validé par le schéma consensus lui-même).
      - Les sorties LLM côté débat (DebaterResponse.confidenceLevel)
        et arbitrage (ArbitratorResponse.finalValue.confidence) sont
        validées par schéma Zod en 0-100.
      Cohérent avec § 8 rule sur Confiance : ces champs sont techniques
      internes, ne doivent jamais devenir un axe produit public ni un
      label affiché en surface (cf. § 8
      user_facing_confidence_surfaces_to_audit).

    spec_code_drift:
      - "Severity casing : YAML originel UPPER ; code lowercase. v4 aligne."
      - "Detection types : YAML originel listait `existence` et `interpretation` ; code détecte uniquement `numeric` et `assessment`. v4 corrige."
      - "Actions par sévérité : YAML originel sur-promettait. v4 corrige (flux unifié non-minor)."
      - "Source hierarchy : pondération runtime supposée → instruction LLM-prompt (prompt_source_hierarchy)."
      - "Resolution cache : pas LRU strict ; Map bornée FIFO d'éviction de la plus ancienne entrée insérée."
      - "ContradictionResolution.resolvedBy : vrai nom de champ code (v3 portait resolutionType erroné)."
      - "Consensus semantics : 'consensus' ≠ unanimité (hasConsensus() = finalPosition===true, principalement émis au round 3)."
      - "Confidence range : 0-100 (z.number().min(0).max(100)) pour les sorties LLM ; ContradictionClaim.confidence hérite de ScoredFinding (typé/commenté 0-100, pas Zod-validé côté consensus)."
      - "Skip-to-arbitration : déclencheur + fallback séparés (quick_resolution / fallback)."

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # REFLEXION ENGINE
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  reflexion_engine:
    internal_name: "Reflexion Engine"
    role: >
      Critique structurée des sorties d'agents avant restitution.
      Détecte des faiblesses sur les sources, calculs et preuves,
      propose des corrections concrètes et récupère un qualityScore
      LLM-émis validé par schéma Zod (pas un calcul TS déterministe ;
      cf. quality_score). Mécanisme d'amélioration itérative ; pas
      garantie d'absence d'erreur.
    code_references:
      - "src/agents/orchestration/reflexion.ts"
      - "src/agents/orchestration/schemas/reflexion-schemas.ts"

    critique_types:
      note: "Types de critiques émises par la couche de relecture."
      values:
        - unsourced_claim
        - unverifiable_calculation
        - incomplete_red_flag
        - missing_data_not_flagged
        - missing_cross_reference
        - weak_conclusion
        - methodological_flaw
        - inconsistency

    critique_guidance:
      note: "Principes appliqués dans le prompt reflexion."
      principles:
        - "Chaque critique propose une correction concrète avec source."
        - "Si la sortie est complète et sourcée, retourner un array vide de critiques (pas de critique pour critiquer)."
        - "Respecter les 'NON DISPONIBLE' marqués par l'agent avec une raison valide."
        - "Critiquer le fond uniquement, jamais le style."
        - "Identifiants uniques par critique (CRT-001, CRT-002, ...)."

    quality_score:
      note: >
        Rubrique demandée au LLM dans le prompt reflexion. Le code
        valide le JSON de sortie par Zod (schemas/reflexion-schemas.ts)
        mais NE RECALCULE PAS les déductions côté TypeScript — c'est
        un score LLM-émis validé par schéma, PAS un calcul déterministe
        TS.
      rubric_communicated_to_llm:
        start: 100
        deductions: {CRITICAL: -15, HIGH: -10, MEDIUM: -5}
        bonus: "+5 par cross-référence présente et pertinente (max +10)"

    verdicts:
      note: "Verdicts internes émis par le LLM (cf. reflexion.ts), validés par schéma."
      values:
        - {code_value: ACCEPTABLE, score_range: "≥80"}
        - {code_value: NEEDS_REVISION, score_range: "50-79"}
        - {code_value: MAJOR_REVISION_REQUIRED, score_range: "<50"}

    ready_for_handoff:
      note: >
        Critère interne pour le passage à l'étape suivante. Nom de
        variable code actuel : readyForBA (franglais résiduel, dette
        tracée dans prompt_surfaces_to_audit).
      rule: "Score ≥ 70 ET aucune critique CRITICAL non résoluble / non corrigeable."

    triggering:
      note: >
        Seuils de déclenchement par tier, basés sur le champ `confidence`
        numérique interne (cf. confidence_note).
      thresholds_current:
        tier1: "Confiance < 60% → Reflexion obligatoire (default code : tier1ConfidenceThreshold = 60)."
        tier2: "Confiance < 50% → Reflexion obligatoire (default code : tier2ConfidenceThreshold = 50)."
        tier3:
          config_field: "tier3Enabled (default false)"
          effective_behavior: >
            Même si tier3Enabled = true dans la config, needsReflexion()
            contient un guard direct `if (tier === 3) return false;` —
            Tier 3 reste désactivé en pratique. À documenter comme
            drift / config field actuellement non effectif. À corriger
            côté code (retirer le guard) ou supprimer le champ config.
        critical_signals:
          config_field: "criticalRedFlagAlwaysReflect (default false)"
          effective_behavior: >
            Désactivé par défaut (commentaire code : 'was true — forced
            reflexion on every critical red flag, too expensive'). Si
            activé, la condition vérifie un assessment contenant
            'critical' OU un cas 'suspicious && value === 0'. PAS
            'source non vérifiable' comme indiqué dans le YAML originel.

    limits:
      - "La critique de relecture ne garantit pas l'absence d'erreur ; elle réduit certaines classes de faiblesses identifiables (sourcing, calculs explicites, signaux complets)."
      - "Le score qualité est une métrique LLM-émise validée par Zod, pas une mesure déterministe ni publique de vérité."
      - "Tier 3 (synthèse) n'est pas relu en pratique — décision d'orchestration assumée, cf. drift tier3Enabled."
      - "Une sortie 'ACCEPTABLE' (score ≥ 80) reste contestable par l'investisseur."

    confidence_note: >
      Le champ `confidence` utilisé pour les seuils tier1/tier2 et émis
      par chaque agent est technique interne (cf. § 8 rule sur Confiance).
      Ne doit jamais devenir un axe produit public ni un label affiché
      en surface. Cf. § 8 user_facing_confidence_surfaces_to_audit +
      § 10 confidence_surfaces_to_audit.

    spec_code_drift:
      - "Tier thresholds : YAML originel 70% / 60% ; code défaut 60% / 50% (`// was 70` et `// was 60` dans reflexion.ts). v4 documente les valeurs runtime."
      - "Tier 3 : champ config tier3Enabled non effectif (guard hardcodé dans needsReflexion). À corriger côté code."
      - "Critical signals : YAML originel disait 'toujours déclenché si source non vérifiable'. Condition réelle = assessment 'critical' OU 'suspicious && value === 0', et désactivé par défaut. v4 corrige."
      - "Quality score : YAML originel pouvait laisser croire à un calcul TS déterministe. C'est un score LLM-émis validé par Zod. v4 corrige."
      - "ready_for_ba : variable code (franglais résiduel BA). Documentée en dette code dans prompt_surfaces_to_audit. v4 doctrine utilise ready_for_handoff."

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # PROMPTS ET SCHÉMAS — SURFACES À AUDITER
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  prompt_surfaces_to_audit:
    note: >
      Prompts et schémas Engines portant encore de la dette doctrinale
      (vocabulaire 'Big4', 'Business Angel', 'BA', personnification du
      'comité d'investissement', formulations prescriptives 'Tranche
      rapidement', 'winner'). À auditer en cohérence avec la doctrine
      pivotée — la reformulation doctrinale du présent bloc § 11 ne
      modifie PAS automatiquement les prompts ni les schémas code.
    reflexion_surfaces:
      - "src/agents/orchestration/reflexion.ts — system prompt 'Senior Reviewer Big4' (Big4 banni cf. § 7) + mention 'Business Angel, decision de 50-200K€' (BA + chiffre à requalifier)."
      - "src/agents/orchestration/reflexion.ts — schéma critique avec champ `impactOnBA` (renommer impactOnHandoff)."
      - "src/agents/orchestration/reflexion.ts — schéma sortie avec champs `readyForBA` (renommer readyForHandoff) et `baNotice` (renommer handoffNotice)."
      - "src/agents/orchestration/schemas/reflexion-schemas.ts — schémas Zod portant les noms impactOnBA / readyForBA / baNotice à renommer en synchronie."
    consensus_surfaces:
      - "src/agents/orchestration/consensus-engine.ts — system prompts 'President du Comite d'Investissement' (debate et arbitration) + 'Business Angel va investir 50-200K€' à requalifier."
      - "src/agents/orchestration/consensus-engine.ts — system prompt 'Tranche rapidement' (quick resolution) — formulation prescriptive à atténuer."
      - "src/agents/orchestration/consensus-engine.ts — terminologie `winner` présente à plusieurs endroits : QuickResolutionSchema.winner (POSITION_A / POSITION_B / UNRESOLVED), ArbitratorResponseSchema.verdict.winner, ContradictionResolution.winner (interface code), et fallback arbitration prompt ('winner': 'agent name or synthesis'). À requalifier globalement (e.g. retained_position / retained_agent / unresolved)."
      - "src/agents/orchestration/schemas/consensus-schemas.ts — ArbitratorResponseSchema.baGuidance (champ baGuidance à renommer handoffGuidance) + tous les schémas Zod portant 'winner' à renommer en synchronie."

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # DETTE D'IMPLÉMENTATION
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  implementation_debt:
    note: >
      Dette tracée pour aligner code et doctrine. À ne pas reprendre en
      wording public tant que ces points ne sont pas résolus.
    items:
      - "Severity casing code : 'critical' / 'major' / 'moderate' / 'minor' (lowercase). Toute lecture ailleurs doit utiliser cette convention."
      - "Detection types : code ne détecte que 'numeric' et 'assessment' ; pas de champ `type` sur DetectedContradiction. `existence` et `interpretation` absents du runtime."
      - "Actions par sévérité : flux unifié non-minor à propager dans toute documentation interne."
      - "Source hierarchy = prompt-level instruction au LLM, pas pondération runtime déterministe."
      - "Tier 3 Reflexion : guard hardcodé `if (tier === 3) return false;` rend tier3Enabled inopérant. À corriger côté code."
      - "criticalRedFlagAlwaysReflect : default false, condition différente de ce que disait le YAML originel."
      - "Variable code `readyForBA` → renommer `readyForHandoff` (cf. prompt_surfaces_to_audit.reflexion_surfaces)."
      - "Champs schémas `impactOnBA` / `baNotice` à renommer en synchronie."
      - "Terminologie `winner` (présente dans QuickResolutionSchema, ArbitratorResponseSchema, ContradictionResolution, fallback arbitration prompt) à requalifier."
      - "Champ `baGuidance` (ArbitratorResponseSchema) à renommer `handoffGuidance`."
      - "Resolution cache : caractère FIFO d'éviction (pas LRU). Cache key = topic + sorted(agentName:claim) — pas une égalité profonde de toute la contradiction."
      - "Consensus semantics : hasConsensus() après round 1 et round 2 pratiquement inerte (finalPosition pas produit avant round 3). À éclaircir côté code (retirer les checks inertes ou produire finalPosition plus tôt)."
      - "Champ `confidence` partout : à requalifier en surface publique (cf. § 8 + § 10 confidence_surfaces_to_audit)."

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # RÉFÉRENCES DOCTRINE
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  doctrine_references:
    used_by:
      - "§ 20 current_control_surfaces.confrontation_mechanisms (Consensus + Reflexion + Devil's Advocate)."
      - "§ 9 narrative_sanitization (couverture partielle dans Board AI)."
    consistent_with:
      - "§ 8 rule sur Confiance (jamais axe produit public)."
      - "§ 9 limits (convergence ≠ justesse)."
    cross_section_updates_applied:
      - "§ 20.references_status.sections_to_realign_before_public_reuse : § 11 retiré après validation v4 de cette section."
      - "§ 20.implementation_debt.surfaces : ligne § 11 (Engines) retirée après validation v4 de cette section."


