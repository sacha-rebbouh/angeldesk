      - "src/app/(dashboard)/deals/[dealId]/live/components/coaching-feed.tsx — copy 'Coaching', 'cartes de coaching', 'Fil de coaching' (à reprendre en label public, cf. positioning_rule)"
      - "src/app/(dashboard)/deals/[dealId]/live/components/live-session-launcher.tsx"
      - "src/app/(dashboard)/deals/[dealId]/live/components/post-call-report.tsx — copy 'Actions à suivre' (prescriptif), 'Évolution de la confiance' (axe produit interdit cf. § 8)"
      - "src/app/(dashboard)/deals/[dealId]/live/components/post-call-reanalysis.tsx"
      - "src/app/(dashboard)/deals/[dealId]/live/components/ably-provider.tsx — copy connexion/erreurs"
      - "src/app/(dashboard)/deals/[dealId]/live/components/analysis-questions-tab.tsx — vue questions ouvertes du dossier"
      - "src/app/(dashboard)/deals/[dealId]/live/components/participant-mapper.tsx — mapping BA/fondateur/participants"
      - "src/app/(dashboard)/deals/[dealId]/live/components/session-controls.tsx — contrôles de session"
      - "src/app/(dashboard)/deals/[dealId]/live/components/session-status-bar.tsx — barre de statut session"

  prompt_surfaces_to_audit:
    note: >
      Prompts et schémas Live Coaching portant encore de la dette doctrinale
      à auditer (formulations prescriptives, mentions BA, vocabulaire
      franglais, actionItems + owner: ba prescriptifs, directives confidence
      anti-hallucination dans les prompts non-classifieur).
    surfaces:
      - "src/lib/live/utterance-router.ts — prompt de classification avec champ confidence numérique (clarté de la catégorie). PAS de directives anti-hallucination ; vocabulaire 'BA', 'fondateur', 'strategy_reveal' à auditer."
      - "src/lib/live/coaching-engine.ts — system prompt cards (descriptions card_types, vocabulaire 'cards', 'claims', 'utterances') + directives anti-hallucination >90% confident + self-audit confidence."
      - "src/lib/live/visual-processor.ts — prompt vision avec mentions 'BA', 'question incisive', newInsights + directives anti-hallucination + self-audit confidence."
      - "src/lib/live/post-call-generator.ts — prompt génération rapport : actionItems avec owner: ba, mention 'Actions à suivre', directive confidenceDelta (avant/après en numbers /100)."
      - "src/lib/live/post-call-reanalyzer.ts — prompt re-analyse : directive confidenceChange (avant/après en numbers selon DeltaReport type ; cf. tests_surfaces_to_update pour le drift type)."
